  document.getElementById('btnSaveTheme').onclick=()=>{
    openModal('Sauver ce thème',`<div class="field"><label>Nom du thème</label><input id="themeName" placeholder="mon thème" maxlength="30"></div><div class="row"><button class="btn" id="themeSaveGo">Sauver</button></div>`,(body)=>{
      body.querySelector('#themeSaveGo').onclick=()=>{ const n=(body.querySelector('#themeName').value||'').trim(); if(!n){ toast('Donne un nom','err'); return; } saveMyTheme(n,{...s}); closeModal(); toast('Thème « '+n+' » sauvé','ok'); drawMyThemes(); };
    });
  };
  // contraste
  const cr=contrastRatio(d.accent);
  const chint=document.getElementById('contrastHint');
  chint.textContent=cr>=4.5?'✓ Bon contraste de l\'accent sur fond sombre.':(cr>=3?'⚠ Contraste moyen — texte fin peu lisible.':'✗ Contraste faible — choisis un accent plus clair.');
  chint.style.color=cr>=4.5?'#5ec98f':(cr>=3?'#e0b05e':'#e08a7e');
  // mes thèmes sauvegardés
  function drawMyThemes(){
    const box=document.getElementById('myThemesBox'); const list=myThemes();
    if(!list.length){ box.innerHTML='<p class="hint" style="font-size:11px;">Aucun thème perso sauvegardé.</p>'; return; }
    box.innerHTML='<div class="hint" style="font-size:11px;margin-bottom:6px;">Mes thèmes :</div>'+list.map(t=>`<div class="mytheme-row"><span>${esc(t.name)}</span><span><button class="btn ghost small" data-apply="${esc(t.name)}">appliquer</button> <button class="btn ghost small" data-del="${esc(t.name)}">✕</button></span></div>`).join('');
    box.querySelectorAll('[data-apply]').forEach(b=>b.onclick=()=>{ const t=myThemes().find(x=>x.name===b.dataset.apply); if(t){ d.style={...DEFAULT_STYLE,...t.style}; toast('Thème appliqué','ok'); mountDesignTab(el,p,d); } });
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ deleteMyTheme(b.dataset.del); drawMyThemes(); });
  }
  drawMyThemes();

  live();
  mountActionBar(el,p,d);
}

// ===== éditeur d'interface : ordre + visibilité des blocs du profil =====
const BLOCK_META={ music:'🎵 Musique', socials:'🔗 Icônes sociales', discord:'💬 Carte Discord', gamehub:'🎮 Game Hub', customtext:'📝 Texte libre', links:'🔘 Boutons de liens', likes:'❤️ Likes', poll:'📊 Sondage', secret:'🔒 Secret', games:'🕹️ Défis', guestbook:'📖 Livre d\'or' };
const DEFAULT_BLOCK_ORDER=['music','socials','discord','gamehub','customtext','links','likes','poll','secret','games','guestbook'];
// résout la config de blocs d'un profil, en complétant les blocs manquants (compat ascendante)
function resolveBlocks(style){
  const cfg=(style&&Array.isArray(style.blocks))?style.blocks.slice():[];
  const seen=new Set(cfg.map(b=>b.k));
  DEFAULT_BLOCK_ORDER.forEach(k=>{ if(!seen.has(k)) cfg.push({k,on:true}); });
  return cfg.filter(b=>BLOCK_META[b.k]);
}
function renderBlocks(p,parts){
  return resolveBlocks(p.style).filter(b=>b.on!==false).map(b=>parts[b.k]||'').join('\n    ');
}
function profileHTML(p,isOwner){
  // séparer : plateformes sociales connues -> icônes en ligne ; "link" générique -> boutons
  const socialLinks=(p.links||[]).filter(l=>l.platform && l.platform!=='link');
  const buttonLinks=(p.links||[]).filter(l=>!l.platform || l.platform==='link');
  const socialHtml=socialLinks.map(l=>{const plat=PLATFORMS[l.platform]||PLATFORMS.link;
    if(l.copy) return `<a href="#" class="copy-link" data-copy="${esc(l.raw||'')}" title="${plat.name} — cliquer pour copier" style="color:${plat.color}">${iconFor(l.platform)}</a>`;
    return `<a href="${esc(l.url)}" target="_blank" rel="noopener" title="${plat.name}" style="color:${plat.color}">${iconFor(l.platform)}</a>`;
  }).join('');
  const buttonHtml=buttonLinks.map(l=>{const plat=PLATFORMS[l.platform]||PLATFORMS.link;
    if(l.copy) return `<a class="link copy-link" href="#" data-copy="${esc(l.raw||'')}"><span class="ico" style="color:${plat.color}">${iconFor(l.platform)}</span><span class="lbl"><span class="plat">${plat.name}</span><span class="txt">${esc(l.label||plat.name)} · copier</span></span><span class="arrow">⧉</span></a>`;
    return `<a class="link" href="${esc(l.url)}" target="_blank" rel="noopener"><span class="ico" style="color:${plat.color}">${iconFor(l.platform)}</span><span class="lbl"><span class="plat">${plat.name}</span><span class="txt">${esc(l.label||plat.name)}</span></span><span class="arrow">→</span></a>`;
  }).join('');
  const defs=badgeDefsCache||[];
  const RARITY_LABEL={common:'Commun',rare:'Rare',epic:'Épique',legendary:'Légendaire'};
  const badgesHtml=(p.badges||[]).map(bid=>{ const def=defs.find(d=>d.id===bid); if(!def||!def.enabled) return '';
    return `<span class="badge-pill rarity-${def.rarity}" style="color:${def.color}" title="${esc(def.name)} · ${RARITY_LABEL[def.rarity]||def.rarity}"><span class="bico">${badgeIconSvg(def.icon)}</span><span class="bname">${esc(def.name)}</span></span>`;
  }).filter(Boolean).join('');
  const av=p.avatar?`<img src="${esc(p.avatar)}" alt="">`:(p.username||'?')[0].toUpperCase();
  const totalViews=(p.views||0)+(p.viewsBonus||0);
  const linkedAvatar=p.discordAvatar||'';
  const linkedName=p.discordGlobalName||p.discordUsername||'';
  // carte Discord : identité OAuth (statique, fiable) + présence Lanyard live si dispo
  // le point de statut ne s'affiche QUE si une présence Lanyard réelle va être récupérée
  // (jamais de faux "hors ligne" par défaut sur une simple identité OAuth liée).
  const discordCard=(p.discordId||linkedName)?`<div class="discord-card" id="discordCard">
      <div class="dav">${linkedAvatar?`<img src="${esc(linkedAvatar)}" alt="">`:''}${p.discordId?'<div class="dstatus offline"></div>':''}</div>
      <div class="dinfo"><div class="dname">${esc(linkedName||'Discord')}</div><div class="dact">${p.discordId?'chargement...':'compte Discord lié'}</div></div>
    </div>`:'';
  return `<div class="tiltwrap"><div class="profilebox" id="tiltBox">
    <div class="avatar-wrap">
      <div class="avatar-ring"><div class="avatar">${av}</div></div>
    </div>
    <div class="identity">
      <div class="name-row"><span class="name" id="nameEl">${esc(p.username)}</span>${isStaffPlus(session)&&isDemo(p)?`<span class="badge-demo">${p.accountType}</span>`:''}</div>
      <div class="id-row"><span class="uid-chip" id="uidChip" title="copier l'UID">UID ${p.uid}</span><span class="tag">${esc(p.tag)}</span></div>
      ${badgesHtml?`<div class="badge-strip">${badgesHtml}</div>`:''}
      ${p.bio?`<p class="bio" id="bioEl" data-full="${esc(p.bio)}"></p>`:''}
      <div class="stat-row">${p.effects.hideViews?'':`<span class="stat-pill">👁 <b id="viewCount">${totalViews}</b> vues</span>`}<span class="stat-pill presence-live" id="presencePill" style="display:none;"></span></div>
      ${achievementsStripHTML(p)}
    </div>
    ${renderBlocks(p,{music:p.music?'<div id="vinylMount"></div>':'',socials:socialHtml?`<div class="social-inline">${socialHtml}</div>`:'',discord:discordCard,gamehub:'<div id="gameHubBlock"></div>',customtext:p.customText?`<div class="customtext">${esc(p.customText)}</div>`:'',links:buttonHtml?`<div class="links">${buttonHtml}</div>`:'',likes:`<div style="display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:2px;">${likeBtnHTML(p)}</div>`,poll:'<div id="pollBlock"></div>',secret:'<div id="secretBlock"></div>',games:'<div id="gameBlock"></div>',guestbook:'<div id="guestbookBlock"></div>'})}
    ${isOwner?'<button class="btn ghost small" id="editBtn">✎ éditer mon profil</button>':''}
    <button class="sharebtn" id="shareBtn">🔗 copier le lien de ce profil</button>
    <footer>uid ${p.uid} · xvy</footer>
  </div></div>`;
}

// bouton like (cœur)
function likeBtnHTML(p){
  const liked=hasLiked(p.uid);
  return `<button class="likebtn${liked?' liked':''}" id="likeBtn" title="${liked?'Retirer le like':'Aimer ce profil'}">
    <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21.2l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    <b id="likeCount">${p.likes||0}</b></button>`;
}

async function render(){
  document.querySelectorAll('.previewtag').forEach(e=>e.remove());
  if(!badgeDefsCache){ try{ badgeDefsCache=await listBadgeDefs(); }catch(e){ badgeDefsCache=[]; } }
  renderTopbar();
  const app=document.getElementById('app');

  if(view==='auth'){
    resetVisual(); app.className='card';
    app.innerHTML=`<div class="panel"><div class="tabs"><button id="tL" class="active">Connexion</button><button id="tS">Créer un compte</button></div><div id="af"></div>${formError?`<div class="error">${formError}</div>`:''}</div>`;
    let mode='login';
    const form=()=>{ document.getElementById('af').innerHTML=`
      <div class="field"><label>pseudo</label><input id="au" autocomplete="username"></div>
      <div class="field"><label>mot de passe</label><input id="ap" type="password" autocomplete="${mode==='login'?'current-password':'new-password'}"></div>
      ${mode==='signup'?'<p class="hint">Le 1er compte créé devient uid 1 et admin. Sécurité basique (entre potes).</p>':''}
      <button class="btn" id="as">${mode==='login'?'Se connecter':'Créer mon compte'}</button>`;
      document.getElementById('as').onclick=async()=>{
        const u=document.getElementById('au').value.trim(),p=document.getElementById('ap').value;
        if(!u||!p){ formError='Remplis les deux champs.'; return render(); }
        formError=''; document.getElementById('as').textContent='...';
        const res=mode==='login'?await login(u,p):await createAccount(u,p);
        if(res.ok){ session=res.profile; saveSession(session); view='profile'; viewingUid=session.uid; render(); }
        else{ formError=res.error; render(); }
      };
    };
    document.getElementById('tL').onclick=()=>{mode='login';formError='';document.getElementById('tL').classList.add('active');document.getElementById('tS').classList.remove('active');form();};
    document.getElementById('tS').onclick=()=>{mode='signup';formError='';document.getElementById('tS').classList.add('active');document.getElementById('tL').classList.remove('active');form();};
    form(); return;
  }

  if(view==='edit'){
    if(!session){ view='auth'; return render(); }
    const p=session;
    if(!editDraft || editDraft.uid!==p.uid) editDraft=freshDraft(p);
    const d=editDraft;
    applyVisual({...p, theme:d.theme, accent:d.accent, opacity:d.opacity, wallpaper:d.wallpaper, effects:d.effects, style:d.style});
    app.className='dash';
    app.innerHTML=`<div class="dash-layout">${sidebarHTML(editTab)}<div class="dash-content" id="dashContent"></div></div>`;
    document.querySelectorAll('.dash-navbtn').forEach(b=>{ b.onclick=()=>{ editTab=b.dataset.tab; render(); }; });
    document.getElementById('dashViewProfile').onclick=()=>{ view='profile'; viewingUid=p.uid; render(); };
    document.getElementById('dashShare').onclick=()=>{ const url=location.origin+location.pathname+'?uid='+p.uid; navigator.clipboard.writeText(url).then(()=>toast('Lien copié','ok')).catch(()=>{}); };
    document.getElementById('dashBack').onclick=()=>{ editDraft=null; view='profile'; viewingUid=p.uid; render(); };
    const contentEl=document.getElementById('dashContent');
    if(editTab==='overview') mountOverviewTab(contentEl,p,d);
    else if(editTab==='design') mountDesignTab(contentEl,p,d);
    else if(editTab==='gaming') mountGamingTab(contentEl,p,d);
    else if(editTab==='interface') mountInterfaceTab(contentEl,p,d);
    else if(editTab==='links') mountLinksTab(contentEl,p,d);
    else if(editTab==='effects') mountEffectsTab(contentEl,p,d);
    else if(editTab==='stats') mountStatsTab(contentEl,p);
    else mountCustomizeTab(contentEl,p,d);
    return;
  }

  if(view==='admin'){
    if(!isStaffPlus(session)){ view='profile'; return render(); }
    resetVisual(); app.className='directory';
    app.innerHTML=`<div class="panel"><h2>⚡ Panel <span class="rolechip role-${session.role}">${ROLE_LABELS[session.role]}</span></h2>
      <div class="subtabs" id="subtabs"></div>
      <div id="adminContent"></div></div>`;
    const st=document.getElementById('subtabs');
    const tabs=[['users','Membres']];
    if(can(session,'view_admin_logs')) tabs.push(['logs','Journal']);
    if(can(session,'manage_badge_defs')) tabs.push(['badges','Badges']);
    if(can(session,'delete_profiles')) tabs.push(['trash','Corbeille']);
    if(can(session,'create_demo')) tabs.push(['demo','Démo']);
    tabs.forEach(([id,label])=>{ const b=document.createElement('button'); b.textContent=label; if(id===adminSubtab) b.className='active'; b.onclick=()=>{ adminSubtab=id; render(); }; st.appendChild(b); });
    const content=document.getElementById('adminContent');

    if(adminSubtab==='users'){
      content.innerHTML=`<div class="field" style="margin-bottom:10px;"><input id="adminSearch" placeholder="🔍 rechercher un membre..."></div>
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;margin-bottom:10px;"><input type="checkbox" id="showDemoToggle"> afficher les comptes demo/test</label>
        <div id="adminList" style="display:flex;flex-direction:column;gap:8px;"></div>`;
      const list=await listDirectory();
      const al=document.getElementById('adminList');
      let showDemo=false;
      const draw=(filter)=>{
        al.innerHTML='';
        list.filter(p=>(showDemo||!isDemo(p))&&(!filter||p.username.toLowerCase().includes(filter)||String(p.uid)===filter)).forEach(p=>{
          const row=document.createElement('div'); row.className='adminrow'+(p.banned?' banned':'');
          row.innerHTML=`<div class="info"><div class="u">${esc(p.username)} <span class="rolechip role-${p.role}">${ROLE_LABELS[p.role]}</span>${isDemo(p)?`<span class="badge-demo">${p.accountType}</span>`:''}</div><div class="m">uid ${p.uid} · ${(p.views||0)+(p.viewsBonus||0)} vues ${p.banned?'· BANNI':''}</div></div><div class="aact"></div>`;
          const act=row.querySelector('.aact');
          const mk=(label,fn,cls)=>{ const b=document.createElement('button'); b.textContent=label; b.onclick=fn; if(cls)b.className=cls; act.appendChild(b); return b; };
          mk('gérer',()=>openUserModal(p,list));
          al.appendChild(row);
        });
        if(!al.children.length) al.innerHTML='<p class="hint">Aucun résultat.</p>';
      };
      draw('');
      document.getElementById('adminSearch').oninput=(e)=>draw(e.target.value.trim().toLowerCase());
      document.getElementById('showDemoToggle').onchange=(e)=>{ showDemo=e.target.checked; draw(document.getElementById('adminSearch').value.trim().toLowerCase()); };
      return;
    }

    if(adminSubtab==='logs'){
      if(!can(session,'view_admin_logs')){ content.innerHTML='<p class="hint">Accès refusé.</p>'; return; }
      content.innerHTML='<p class="hint">Chargement des logs...</p>';
      const logs=await getLogs(80);
      content.innerHTML=logs.length?'':'<p class="hint">Aucune action enregistrée.</p>';
      logs.forEach(l=>{ const d=new Date(l.created_at).toLocaleString('fr-CH'); const row=document.createElement('div'); row.className='logrow'; row.style.marginBottom='6px';
        row.innerHTML=`<span class="la">${esc(l.actor_name||'?')}</span> → <b>${esc(l.action)}</b> ${l.target_name?('sur <span class="la">'+esc(l.target_name)+'</span>'):''}<br><span class="lt">${d}${l.old_value!=null?(' · '+esc(l.old_value)+' → '+esc(l.new_value||'')):''}</span>`;
        content.appendChild(row); });
      return;
    }

    if(adminSubtab==='badges'){
      if(!can(session,'manage_badge_defs')){ content.innerHTML='<p class="hint">Accès refusé (super-admin uniquement).</p>'; return; }
      const defs=await listBadgeDefs(); badgeDefsCache=defs;
      content.innerHTML='<div id="badgeDefList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div><button class="btn small" id="newBadgeBtn">+ créer un badge</button>';
      const bl=document.getElementById('badgeDefList');
      defs.forEach(d=>{ const row=document.createElement('div'); row.className='adminrow';
        row.innerHTML=`<span class="badge rarity-${d.rarity}" style="color:${d.color};width:24px;height:24px">${badgeIconSvg(d.icon)}</span><div class="info"><div class="u">${esc(d.name)}</div><div class="m">${d.id} · ${d.rarity} ${d.enabled?'':'· désactivé'}</div></div><div class="aact"></div>`;
        const act=row.querySelector('.aact');
        const ed=document.createElement('button'); ed.textContent='éditer'; ed.onclick=()=>openBadgeDefModal(d); act.appendChild(ed);
        const del=document.createElement('button'); del.textContent='×'; del.className='d'; del.onclick=()=>confirmModal('Supprimer le badge "'+d.name+'" ?',async()=>{ await deleteBadgeDef(d.id); badgeDefsCache=null; toast('Badge supprimé','ok'); render(); }); act.appendChild(del);
        bl.appendChild(row); });
      document.getElementById('newBadgeBtn').onclick=()=>openBadgeDefModal(null);
      return;
    }

    if(adminSubtab==='trash'){
      if(!can(session,'delete_profiles')){ content.innerHTML='<p class="hint">Accès refusé.</p>'; return; }
      const del=await listDeleted();
      content.innerHTML=del.length?'':'<p class="hint">Corbeille vide.</p>';
      del.forEach(p=>{ const row=document.createElement('div'); row.className='adminrow banned';
        row.innerHTML=`<div class="info"><div class="u">${esc(p.username)}</div><div class="m">uid ${p.uid} · supprimé</div></div><div class="aact"></div>`;
        const act=row.querySelector('.aact');
        const res=document.createElement('button'); res.textContent='restaurer'; res.onclick=async()=>{ await adminRestore(p.uid); await logAdmin('restore',p); toast('Compte restauré','ok'); render(); }; act.appendChild(res);
        if(can(session,'delete_profiles')){ const hd=document.createElement('button'); hd.textContent='suppr. définitive'; hd.className='d'; hd.onclick=()=>confirmModal('Supprimer DÉFINITIVEMENT '+p.username+' ? Irréversible.',async()=>{ await adminHardDelete(p.uid); await logAdmin('hard_delete',p); toast('Supprimé définitivement','err'); render(); }); act.appendChild(hd); }
        content.appendChild(row); });
      return;
    }

    if(adminSubtab==='demo'){
      if(!can(session,'create_demo')){ content.innerHTML='<p class="hint">Accès refusé (super-admin uniquement).</p>'; return; }
      const showInDir=!!(await getSetting('show_demo_in_directory'));
      content.innerHTML=`
        <p class="hint">Génère des profils de test réalistes (pseudo, avatar, bio, liens) marqués <code>demo_account</code>/<code>test_account</code> en base. Exclus des vraies statistiques par défaut, invisibles de l'annuaire public sauf option ci-dessous.</p>
        <div class="row" style="margin:12px 0;">
          <select id="demoType" style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text);padding:12px;">
            <option value="demo">demo_account</option>
            <option value="test">test_account</option>
          </select>
        </div>
        <div class="row">
          <button class="btn small" id="seed10">Seed 10</button>
          <button class="btn small" id="seed50">Seed 50</button>
          <button class="btn small" id="seed100">Seed 100</button>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;margin:14px 0;"><input type="checkbox" id="showDirToggle" ${showInDir?'checked':''}> afficher ces comptes dans l'annuaire public</label>
        <h3>Lots générés</h3>
        <div id="demoBatches" style="display:flex;flex-direction:column;gap:8px;margin:8px 0;"></div>
        <button class="btn danger" id="cleanupAll" style="width:100%;margin-top:8px;">🧹 Supprimer tous les comptes demo/test</button>
      `;
      const doSeed=async(n)=>{
        const type=document.getElementById('demoType').value;
        toast('Génération de '+n+' comptes...','ok');
        try{
          const res=await seedDemoAccounts(n,type,session.uid);
          await logAdmin('seed_demo_accounts',null,null,res.count+' comptes ('+type+'), lot '+res.batchId);
          toast(res.count+' comptes générés','ok'); render();
        }catch(e){ toast('Erreur pendant la génération','err'); }
      };
      document.getElementById('seed10').onclick=()=>doSeed(10);
      document.getElementById('seed50').onclick=()=>doSeed(50);
      document.getElementById('seed100').onclick=()=>doSeed(100);
      document.getElementById('showDirToggle').onchange=async(e)=>{
        await setSetting('show_demo_in_directory',e.target.checked);
        await logAdmin('set_show_demo_in_directory',null,!e.target.checked,e.target.checked);
        toast('Préférence enregistrée','ok');
      };
      document.getElementById('cleanupAll').onclick=()=>confirmModal('Supprimer DÉFINITIVEMENT tous les comptes demo/test ? Irréversible.',async()=>{
        const all=await listDemoAccounts();
        await deleteAllDemoAccounts();
        await logAdmin('cleanup_demo_accounts',null,null,all.length+' comptes supprimés');
        toast(all.length+' comptes supprimés','err'); render();
      });
      const demoList=await listDemoAccounts();
      const batches={};
      demoList.forEach(p=>{ const key=p.seedBatch||'(sans lot)'; (batches[key]=batches[key]||[]).push(p); });
      const bl=document.getElementById('demoBatches');
      const keys=Object.keys(batches).sort().reverse();
      if(!keys.length){ bl.innerHTML='<p class="hint">Aucun compte demo/test pour le moment.</p>'; }
      keys.forEach(key=>{
        const rows=batches[key];
        const row=document.createElement('div'); row.className='adminrow';
        const d=key==='(sans lot)'?key:new Date(key).toLocaleString('fr-CH');
        row.innerHTML=`<div class="info"><div class="u">${rows.length} comptes</div><div class="m">lot ${esc(d)} · ${esc(rows[0].accountType)}</div></div><div class="aact"></div>`;
        const act=row.querySelector('.aact');
        const del=document.createElement('button'); del.textContent='supprimer le lot'; del.className='d';
        del.onclick=()=>confirmModal('Supprimer ce lot de '+rows.length+' comptes demo/test ?',async()=>{
          if(key==='(sans lot)'){ for(const p of rows) await adminHardDelete(p.uid); }
          else await deleteDemoBatch(key);
          await logAdmin('cleanup_demo_batch',null,null,rows.length+' comptes ('+key+')');
          toast('Lot supprimé','ok'); render();
        });
        act.appendChild(del);
        bl.appendChild(row);
      });
      return;
    }
    return;
  }

  if(view==='previewProfile'){
    const p=window.__previewProfile; if(!p){ view='edit'; return render(); }
    applyVisual(p); app.className='card';
    const inner=profileHTML(p,false);
    app.innerHTML=inner;
    // barre retour éditeur
    const bar=document.createElement('div'); bar.className='previewtag'; bar.textContent='◂ aperçu — clique pour revenir à l\'éditeur'; bar.style.cursor='pointer';
    bar.onclick=()=>{ view='edit'; render(); };
    document.body.appendChild(bar);
    const oldTag=document.querySelectorAll('.previewtag'); if(oldTag.length>1){ oldTag[0].remove(); }
    // activer effets sur l'aperçu
    const bioEl=document.getElementById('bioEl'); if(bioEl){ bioEl.textContent=bioEl.dataset.full||''; }
    startParticles(p.effects.particles,p.accent); applyCursor(p.cursorUrl); setupTilt(p.effects.tilt!==false);
    setupMusic(p);
    if(p.discordId) loadDiscord(p.discordId);
    mountGameHub(p);
    const sb=document.getElementById('shareBtn'); if(sb) sb.style.display='none';
    return;
  }

  if(view==='directory'){
    resetVisual(); const list=await listDirectory(); app.className='directory';
    const showDemo=isStaffPlus(session) ? true : !!(await getSetting('show_demo_in_directory'));
    const visible=list.filter(p=>!p.banned && (showDemo || !isDemo(p)));
    const realCount=list.filter(p=>!p.banned && !p.excludeFromStats).length;
    app.innerHTML=`<h2 style="font-family:'Space Grotesk';font-size:18px;margin-bottom:4px;">Membres (${realCount})</h2>`;
    if(!visible.length){ app.innerHTML+='<p class="hint">Aucun membre. Sois le premier → uid 1.</p>'; }
    visible.forEach(p=>{ const e=document.createElement('div'); e.className='direntry';
      const av=p.avatar?`<img src="${esc(p.avatar)}" alt="">`:(p.username||'?')[0].toUpperCase();
      const demoTag=isStaffPlus(session)&&isDemo(p)?`<span class="badge-demo">${p.accountType}</span>`:'';
      e.innerHTML=`<div class="av">${av}</div><div><div>${esc(p.username)}${p.isAdmin?' ⚡':''}${demoTag}</div><div class="hint">${esc(p.tag)}</div></div><span class="uidbadge">uid ${p.uid}</span>`;
      e.onclick=()=>{ view='profile'; viewingUid=p.uid; render(); }; app.appendChild(e); });
    return;
  }

  // profile
  let uid=viewingUid||getUrlUid()||(session?session.uid:null);
  if(!uid){
    resetVisual(); app.className='card';
    app.innerHTML=`<div class="panel"><h2>xvy</h2><p class="hint">Crée ton compte pour devenir uid 1, ou explore les membres.</p><div class="row"><button class="btn" id="gA">Connexion / inscription</button><button class="btn ghost" id="gD">Membres</button></div></div>`;
    document.getElementById('gA').onclick=()=>{view='auth';render();}; document.getElementById('gD').onclick=()=>{view='directory';render();}; return;
  }
  const p=await getProfile(uid);
  if(!p){ resetVisual(); app.className='card'; app.innerHTML=`<div class="panel"><p class="hint">Profil uid ${uid} introuvable.</p><button class="btn ghost" id="gD2">Membres</button></div>`; document.getElementById('gD2').onclick=()=>{view='directory';render();}; return; }
  if(p.banned && !isStaffPlus(session)){ resetVisual(); app.className='card'; app.innerHTML=`<div class="panel"><p class="hint">Ce profil n'est pas disponible.</p><button class="btn ghost" id="gD3">Membres</button></div>`; document.getElementById('gD3').onclick=()=>{view='directory';render();}; return; }
  applyVisual(p);
  const isOwner=session&&session.uid===p.uid;
  app.className='card'; app.innerHTML=profileHTML(p,isOwner);
  // liens "copier au clic" (ex. pseudo Discord) : copient au lieu d'ouvrir
  document.querySelectorAll('#app [data-copy]').forEach(el=>{
    el.addEventListener('click',ev=>{ ev.preventDefault(); const v=el.getAttribute('data-copy')||'';
      navigator.clipboard.writeText(v).then(()=>toast('Copié : '+v,'ok')).catch(()=>{ prompt('Copie :',v); }); });
  });
  if(isOwner) document.getElementById('editBtn').onclick=()=>{view='edit';render();};
  // bouton like (1 par navigateur, réversible)
  const likeBtn=document.getElementById('likeBtn');
  if(likeBtn){
    let busy=false;
    likeBtn.onclick=async()=>{
      if(busy) return; busy=true;
      const cnt=document.getElementById('likeCount');
      const willLike=!hasLiked(p.uid);
      // optimiste
      likeBtn.classList.toggle('liked',willLike);
      likeBtn.querySelector('svg').setAttribute('fill',willLike?'currentColor':'none');
      if(willLike) likeBtn.classList.add('pop'); setTimeout(()=>likeBtn.classList.remove('pop'),380);
      let cur=parseInt(cnt.textContent,10)||0; cnt.textContent=Math.max(0,cur+(willLike?1:-1));
      setLiked(p.uid,willLike);
      try{ const n=await rpcLike(p.uid,willLike?1:-1); if(n!=null){ cnt.textContent=n; p.likes=n; } }
      catch(e){ /* on garde l'affichage optimiste */ }
      busy=false;
    };
  }
  const uidChip=document.getElementById('uidChip');
  if(uidChip) uidChip.onclick=()=>{ navigator.clipboard.writeText(String(p.uid)).then(()=>toast('UID copié','ok')).catch(()=>{}); };
  document.getElementById('shareBtn').onclick=()=>{
    const shareUrl=location.origin+location.pathname+'?uid='+p.uid;
    const b=document.getElementById('shareBtn'); const orig=b?b.textContent:'';
    navigator.clipboard.writeText(shareUrl).then(()=>{ if(b){ b.textContent='✓ lien copié !'; setTimeout(()=>b.textContent=orig,1800); } }).catch(()=>{ prompt('Copie ce lien :',shareUrl); });
  };
  // typewriter bio
  const bioEl=document.getElementById('bioEl');
  if(bioEl && p.effects.typewriter){
    const full=bioEl.dataset.full||''; bioEl.innerHTML='<span class="tw-cursor"></span>'; let i=0;
    const tick=()=>{ if(i<=full.length){ bioEl.innerHTML=esc(full.slice(0,i))+'<span class="tw-cursor"></span>'; i++; setTimeout(tick,38); } else { bioEl.textContent=full; } };
    setTimeout(tick,300);
  } else if(bioEl){ bioEl.textContent=bioEl.dataset.full||''; }
  // particles
  startParticles(p.effects.particles, p.accent);
  // music
  setupMusic(p);
  // views: incrémenter si ce n'est pas mon propre profil, max 1 vue / navigateur / profil / 30 min
  // (évite qu'un simple rafraîchissement compte une nouvelle vue)
  if(!isOwner && !p.excludeFromStats && viewCooldownOk(p.uid)){
    incrementViews(p.uid); markViewed(p.uid);
    const nv=(p.views||0)+(p.viewsBonus||0)+1; const vc=document.getElementById('viewCount'); if(vc) vc.textContent=nv;
    trackEvent(p.uid,'view',{viewer_uid:session?session.uid:null,viewer_name:session?session.username:null,ref:document.referrer||''});
  }
  // curseur personnalisé
  applyCursor(p.cursorUrl);
  // tilt 3D
  setupTilt(p.effects.tilt!==false);
  // discord presence via Lanyard
  if(p.discordId) loadDiscord(p.discordId);
  // features xvy : présence live, sondage, secret, mini-jeux, livre d'or, succès, tracking clics
  mountPresence(p);
  mountGameHub(p);
  mountPoll(p);
  mountSecret(p);
  mountGameBlock(p,isOwner);
  mountGuestbook(p,isOwner);
  trackLinkClicks(p,isOwner);
  if(isOwner) checkAchievements(p);
}

// Applique la traduction EN après chaque rendu complet (couvre tous les return anticipés)
const _xvyRender=render;
render=function(){ const r=_xvyRender.apply(this,arguments); Promise.resolve(r).then(()=>applyLang()).catch(()=>{}); return r; };

// ===== xvy features : anti-refresh vues, analytics, présence live, guestbook, succès, mini-jeux, sondage, secret =====
const VIEW_COOLDOWN_MS=30*60*1000; // 1 vue max par navigateur / profil / 30 min
function viewCooldownOk(uid){ try{ const t=parseInt(localStorage.getItem('xvy_seen_'+uid)||'0',10); return (Date.now()-t)>VIEW_COOLDOWN_MS; }catch(e){ return true; } }
function markViewed(uid){ try{ localStorage.setItem('xvy_seen_'+uid,String(Date.now())); }catch(e){} }

const isMobileDevice=()=>/Android|iPhone|iPad|Mobi/i.test(navigator.userAgent);
// événement analytics (best-effort, jamais bloquant)
function trackEvent(profileUid,type,meta){
  pgFetch('/profile_events',{method:'POST',body:JSON.stringify({profile_uid:profileUid,event_type:type,meta:meta||{},device:isMobileDevice()?'mobile':'desktop'})}).catch(()=>{});
}
// clics sur les liens du profil → analytics
function trackLinkClicks(p,isOwner){
  if(isOwner) return;
  document.querySelectorAll('#app .links a, #app .social-inline a').forEach(a=>{
    a.addEventListener('click',()=>{ const lbl=a.querySelector('.plat'); trackEvent(p.uid,'link_click',{label:(lbl?lbl.textContent:(a.getAttribute('title')||'lien')),url:a.getAttribute('href')||''}); });
  });
}

// ----- succès automatiques (achievements) -----
const ACH_DEFS=[
  {id:'starter',emo:'🌱',name:'Premiers pas',desc:'Avatar + bio + 1 lien'},
  {id:'links5',emo:'🔗',name:'Connecté',desc:'5 liens ou plus'},
  {id:'discord',emo:'💬',name:'Discord lié',desc:'Compte Discord lié'},
  {id:'v10',emo:'👁',name:'Découvert',desc:'10 vues'},
  {id:'v100',emo:'🔥',name:'Populaire',desc:'100 vues'},
  {id:'v1000',emo:'🌟',name:'Star',desc:'1000 vues'},
  {id:'likes10',emo:'❤️',name:'Aimé',desc:'10 likes'},
  {id:'gb5',emo:'📖',name:'Livre d\'or actif',desc:'5 messages reçus'},
  {id:'gamer',emo:'🎮',name:'Joueur',desc:'A joué à un mini-jeu'},
];
function achievementsStripHTML(p){
  const earned=(p.achievements||[]).map(id=>ACH_DEFS.find(a=>a.id===id)).filter(Boolean);
  if(!earned.length) return '';
  return `<div class="ach-strip">${earned.map(a=>`<span class="ach-pill" title="${esc(a.name)} — ${esc(a.desc)}">${a.emo}</span>`).join('')}</div>`;
}
async function checkAchievements(p){
  const tv=(p.views||0)+(p.viewsBonus||0);
  let gbCount=0; try{ const r=await pgFetch('/guestbook?profile_uid=eq.'+p.uid+'&select=id&limit=100'); gbCount=(r||[]).length; }catch(e){}
  let played=false; try{ const r=await pgFetch('/game_scores?player_uid=eq.'+p.uid+'&select=id&limit=1'); played=(r||[]).length>0; }catch(e){}
  const tests={
    starter:!!p.avatar&&!!p.bio&&(p.links||[]).length>=1,
    links5:(p.links||[]).length>=5,
    discord:!!(p.discordId||p.discordGlobalName),
    v10:tv>=10, v100:tv>=100, v1000:tv>=1000,
    likes10:(p.likes||0)>=10, gb5:gbCount>=5, gamer:played
  };
  const have=new Set(p.achievements||[]);
  const fresh=ACH_DEFS.filter(a=>tests[a.id]&&!have.has(a.id));
  if(!fresh.length) return;
  const next=[...have,...fresh.map(a=>a.id)];
  try{
    await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({achievements:next})});
    p.achievements=next; if(session&&session.uid===p.uid) session.achievements=next;
    fresh.forEach((a,i)=>setTimeout(()=>toast(a.emo+' Succès débloqué : '+a.name,'ok'),400+i*900));
  }catch(e){}
}

// ----- présence live (Supabase Realtime) -----
let presenceChannel=null;
function mountPresence(p){
  const el=document.getElementById('presencePill'); if(!el) return;
  const client=getSbAuth(); if(!client) return;
  if(presenceChannel){ try{ presenceChannel.unsubscribe(); }catch(e){} presenceChannel=null; }
  const key=session?('u'+session.uid):('a'+Math.random().toString(36).slice(2,10));
  const ch=client.channel('presence-profile-'+p.uid,{config:{presence:{key}}});
  presenceChannel=ch;
  const update=()=>{ try{ const n=Object.keys(ch.presenceState()||{}).length; if(n>0){ el.textContent='👀 '+n+' en ce moment'; el.style.display=''; } else el.style.display='none'; }catch(e){} };
  ch.on('presence',{event:'sync'},update);
  ch.subscribe(status=>{ if(status==='SUBSCRIBED') ch.track({t:Date.now()}); });
}

// ----- sondage sur le profil -----
async function mountPoll(p){
  const box=document.getElementById('pollBlock'); if(!box) return;
  const poll=p.poll; if(!poll||!poll.q||!(poll.opts||[]).length){ box.innerHTML=''; return; }
  const pollId=poll.id||'p1';
  let votes=[]; try{ votes=await pgFetch('/poll_votes?profile_uid=eq.'+p.uid+'&poll_id=eq.'+encodeURIComponent(pollId)+'&select=choice&limit=2000')||[]; }catch(e){}
  const counts=poll.opts.map((_,i)=>votes.filter(v=>v.choice===i).length);
  const total=counts.reduce((a,b)=>a+b,0);
  let voted=false; try{ voted=localStorage.getItem('xvy_voted_'+p.uid+'_'+pollId)==='1'; }catch(e){}
  const showResults=voted;
  box.innerHTML=`<div class="xvy-block"><h4>📊 ${esc(poll.q)}</h4>
    ${poll.opts.map((o,i)=>{
      const pct=total?Math.round(counts[i]/total*100):0;
      return `<button class="poll-opt" data-i="${i}" ${showResults?'disabled':''}>
        ${showResults?`<span class="fillbar" style="transform:scaleX(${pct/100});"></span>`:''}
        <span class="row-in"><span>${esc(o)}</span>${showResults?`<span>${pct}% (${counts[i]})</span>`:''}</span>
      </button>`;
    }).join('')}
    <div class="hint" style="font-size:10px;">${total} vote${total>1?'s':''}</div></div>`;
  applyLang(box);
  if(!showResults){
    box.querySelectorAll('.poll-opt').forEach(b=>{
      b.onclick=async()=>{
        const i=parseInt(b.dataset.i,10);
        try{
          await pgFetch('/poll_votes',{method:'POST',body:JSON.stringify({profile_uid:p.uid,poll_id:pollId,choice:i})});
          try{ localStorage.setItem('xvy_voted_'+p.uid+'_'+pollId,'1'); }catch(e){}
          toast('Vote enregistré ✓','ok'); mountPoll(p);
        }catch(e){ toast('Erreur, réessaie.','err'); }
      };
    });
  }
}

// ----- contenu secret déblocable -----
function mountSecret(p){
  const box=document.getElementById('secretBlock'); if(!box) return;
  const s=p.secret; if(!s||!s.text){ box.innerHTML=''; return; }
  let unlocked=false; try{ unlocked=localStorage.getItem('xvy_secret_'+p.uid)==='1'; }catch(e){}
  if(unlocked){ box.innerHTML=`<div class="xvy-block secret-box"><h4>🔓 Contenu secret</h4><div style="font-size:13px;white-space:pre-wrap;">${esc(s.text)}</div></div>`; return; }
  box.innerHTML=`<div class="xvy-block secret-box"><h4>🔒 Contenu secret</h4>
    <p class="hint" style="margin-bottom:8px;">${s.hint?esc(s.hint):'Trouve le mot de passe pour débloquer.'}</p>
    <div style="display:flex;gap:6px;justify-content:center;"><input id="secretPw" type="password" placeholder="mot de passe"><button class="btn small" id="secretGo">Débloquer</button></div></div>`;
  const tryUnlock=()=>{
    const v=(document.getElementById('secretPw').value||'').trim();
    if(v && s.pw && v.toLowerCase()===String(s.pw).toLowerCase()){
      try{ localStorage.setItem('xvy_secret_'+p.uid,'1'); }catch(e){}
      toast('🔓 Contenu débloqué !','ok'); mountSecret(p);
    } else toast('Mauvais mot de passe','err');
  };
  applyLang(box);
  document.getElementById('secretGo').onclick=tryUnlock;
  document.getElementById('secretPw').onkeydown=e=>{ if(e.key==='Enter') tryUnlock(); };
}

// ----- mini-jeux : le formatage/leaderboard s'appuie sur le registre extensible GAME_REGISTRY -----
const GAME_DEFS=GAME_REGISTRY;
// liste des jeux jouables (status 'live')
const LIVE_GAMES=Object.keys(GAME_REGISTRY).filter(k=>GAME_REGISTRY[k].status==='live');
// ===== Game Hub : rendu public (identité gaming, sous-onglets) =====
function ghStars(n){ n=Math.max(0,Math.min(5,+n||0)); return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n); }
function ghHasContent(g){
  return g.status||g.lfg||g.platforms.length||Object.values(g.ids).some(Boolean)||g.genres.length||g.mode||g.difficulty||
    g.nowPlaying.name||g.favorites.length||g.backlog.length||g.wishlist.length||g.completed.length||g.dropped.length||
    Object.values(g.setup).some(Boolean)||g.reviews.length||g.links.length;
}
function mountGameHub(p){
  const box=document.getElementById('gameHubBlock'); if(!box) return;
  const g=mergeGaming(p.gaming);
  const isOwner=session&&session.uid===p.uid;
  if((!g.enabled||!ghHasContent(g)) && !isOwner){ box.innerHTML=''; return; }
  if(!g.enabled && isOwner){ box.innerHTML=`<div class="ghub"><div class="ghub-top"><span class="gh-title">🎮 Game Hub</span></div><div class="ghub-body"><p class="gh-empty">Ton Game Hub est masqué. Active-le dans l'éditeur → onglet 🎮 Gaming.</p></div></div>`; return; }

  // sections disponibles
  const tabs=[];
  const hasOverview=g.platforms.length||g.genres.length||g.mode||g.difficulty||Object.values(g.ids).some(Boolean);
  if(hasOverview) tabs.push(['overview','Overview']);
  if(g.nowPlaying.name) tabs.push(['now','Now Playing']);
  if(g.favorites.length||g.backlog.length||g.wishlist.length||g.completed.length||g.dropped.length) tabs.push(['games','Games']);
  if(Object.values(g.setup).some(Boolean)) tabs.push(['setup','Setup']);
  if(g.lfg||g.status||Object.values(g.ids).some(Boolean)||g.links.length) tabs.push(['pwm','Play With Me']);
  if(g.reviews.length) tabs.push(['reviews','Reviews']);
  if(!tabs.length){ if(isOwner){ box.innerHTML=`<div class="ghub"><div class="ghub-top"><span class="gh-title">🎮 Game Hub</span></div><div class="ghub-body"><p class="gh-empty">Remplis ton Game Hub dans l'éditeur → onglet 🎮 Gaming.</p></div></div>`; } else box.innerHTML=''; return; }

  const st=g.status&&GH_STATUS[g.status];
  let active=tabs[0][0];
  function chips(items,cls){ return `<div class="gh-chips">${items.map(x=>`<span class="gh-chip${cls?' '+cls:''}">${x}</span>`).join('')}</div>`; }
  function gameList(arr,dot){ return `<div class="gh-list">${arr.map(x=>`<div class="gh-li"><span class="gh-tagdot" style="background:${dot}"></span>${esc(x.name||x)}</div>`).join('')}</div>`; }
  function sectionHTML(tab){
    if(tab==='overview'){
      let h='';
      if(g.platforms.length){ h+=`<div class="gh-sec-title">Plateformes</div>${chips(g.platforms.map(k=>GH_PLATFORMS[k]||k))}`; }
      if(g.mode||g.difficulty){ const t=[]; if(g.mode) t.push(GH_MODES[g.mode]||g.mode); if(g.difficulty) t.push(GH_DIFF[g.difficulty]||g.difficulty); h+=`<div class="gh-sec-title">Style de jeu</div>${chips(t,'accent')}`; }
      if(g.genres.length){ h+=`<div class="gh-sec-title">Genres préférés</div>${chips(g.genres)}`; }
      const ids=Object.entries(g.ids).filter(([k,v])=>v);
      if(ids.length){ h+=`<div class="gh-sec-title">IDs gaming</div>`+ids.map(([k,v])=>`<div class="gh-id-row" data-copy="${esc(v)}"><span>${GH_IDS[k]||k}</span><span class="gh-id-val">${esc(v)} ⧉</span></div>`).join(''); }
      return h;
    }
    if(tab==='now'){
      const n=g.nowPlaying;
      return `<div class="gh-now"><div class="gh-cover">${n.cover?`<img src="${esc(n.cover)}" class="gh-cover" alt="">`:'🎮'}</div><div><div class="gh-np-name">${esc(n.name)}</div>${n.note?`<div class="gh-np-note">${esc(n.note)}</div>`:''}</div></div>`;
    }
    if(tab==='games'){
      let h='';
      if(g.favorites.length){ h+=`<div class="gh-sec-title">⭐ Top jeux</div><div class="gh-games">${g.favorites.map(f=>`<div class="gh-game">${esc(f.name||f)}${f.rating?`<span class="gh-stars">${ghStars(f.rating)}</span>`:''}</div>`).join('')}</div>`; }
      if(g.nowPlaying.name){ h+=`<div class="gh-sec-title">🎯 Du moment</div>${gameList([g.nowPlaying],'var(--accent)')}`; }
      if(g.backlog.length){ h+=`<div class="gh-sec-title">📥 Backlog</div>${gameList(g.backlog,'#7a8fc9')}`; }
      if(g.wishlist.length){ h+=`<div class="gh-sec-title">💜 Wishlist</div>${gameList(g.wishlist,'#b57edc')}`; }
      if(g.completed.length){ h+=`<div class="gh-sec-title">✅ Terminés</div>${gameList(g.completed,'#5ec98f')}`; }
      if(g.dropped.length){ h+=`<div class="gh-sec-title">🚫 Abandonnés</div>${gameList(g.dropped,'#e08a7e')}`; }
      return h;
    }
    if(tab==='setup'){
      const s=g.setup; const specs=[['CPU',s.cpu],['GPU',s.gpu],['RAM',s.ram],['Écran',s.monitor],['Souris',s.mouse],['Clavier',s.keyboard],['Casque',s.headset],['Résolution',s.res],['Sensibilité',s.sens],['DPI',s.dpi]].filter(x=>x[1]);
      let h=specs.length?`<div class="gh-specs">${specs.map(([k,v])=>`<div class="gh-spec"><span>${k}</span><span>${esc(v)}</span></div>`).join('')}</div>`:'';
      if(s.crosshair){ h+=`<div class="gh-sec-title">Crosshair code</div><div class="gh-id-row" data-copy="${esc(s.crosshair)}"><span>Valorant</span><span class="gh-id-val">${esc(s.crosshair)} ⧉</span></div>`; }
      return h;
    }
    if(tab==='pwm'){
      let h='';
      if(g.lfg){ h+=`<div class="gh-lfg">🔵 <b>Cherche des mates</b>${g.lfgNote?' — '+esc(g.lfgNote):''}</div>`; }
      if(st){ h+=`<div class="gh-sec-title">Disponibilité</div><div class="gh-chips"><span class="gh-chip accent">${st[0]} ${st[1]}</span></div>`; }
      const ids=Object.entries(g.ids).filter(([k,v])=>v);
      if(ids.length){ h+=`<div class="gh-sec-title">Ajoute-moi</div>`+ids.map(([k,v])=>`<div class="gh-id-row" data-copy="${esc(v)}"><span>${GH_IDS[k]||k}</span><span class="gh-id-val">${esc(v)} ⧉</span></div>`).join(''); }
      if(g.links.length){ h+=`<div class="gh-sec-title">Liens utiles</div>`+g.links.map(l=>`<div class="gh-li">🔗 <a href="${esc(l.url)}" target="_blank" rel="noopener" style="color:var(--accent);">${esc(l.label||l.url)}</a></div>`).join(''); }
      return h||'<p class="gh-empty">Aucune info pour le moment.</p>';
    }
    if(tab==='reviews'){
      return g.reviews.map(r=>`<div class="gh-review"><div class="gh-rv-head"><b>${esc(r.game)}</b><span class="gh-stars" style="color:var(--accent)">${ghStars(r.rating)}</span></div>${r.text?`<div class="gh-rv-text">${esc(r.text)}</div>`:''}</div>`).join('');
    }
    return '';
  }
  function draw(){
    box.innerHTML=`<div class="ghub">
      <div class="ghub-top"><span class="gh-title">🎮 Game Hub</span>${st?`<span class="gh-status">${st[0]} ${st[1]}</span>`:''}</div>
      <div class="ghub-tabs">${tabs.map(([k,l])=>`<button class="ghub-tab${k===active?' on':''}" data-t="${k}">${l}</button>`).join('')}</div>
      <div class="ghub-body" id="ghBody">${sectionHTML(active)}</div>
    </div>`;
    box.querySelectorAll('.ghub-tab').forEach(b=>b.onclick=()=>{ active=b.dataset.t; draw(); });
    box.querySelectorAll('#ghBody [data-copy]').forEach(el=>el.onclick=()=>{ const v=el.getAttribute('data-copy'); navigator.clipboard.writeText(v).then(()=>toast('Copié : '+v,'ok')).catch(()=>{}); });
    applyLang(box);
  }
  draw();
}

// RECORDS PERSONNELS : on ne lit QUE les scores du propriétaire du profil (player_uid = profile_uid).
async function fetchLeaderboard(uid,game){
  const dir=GAME_DEFS[game].better==='asc'?'score.asc':'score.desc';
  try{ return await pgFetch('/game_scores?profile_uid=eq.'+uid+'&player_uid=eq.'+uid+'&game=eq.'+game+'&order='+dir+',created_at.asc&limit=5')||[]; }catch(e){ return []; }
}
function lbHTML(rows,game){
  if(!rows.length) return '<div class="hint" style="font-size:11px;">aucun record pour l\'instant</div>';
  const f=GAME_DEFS[game].fmt;
  return rows.map((r,i)=>`<div class="lb-row"><span>${['🥇','🥈','🥉','4.','5.'][i]} ${f(r.score)}</span></div>`).join('');
}
// OWNERSHIP : seul le propriétaire du profil voit/édite la config des défis. Les visiteurs
// ne voient que les jeux activés par le propriétaire et ne peuvent que jouer (leurs scores).
async function mountGameBlock(p,isOwner){
  const box=document.getElementById('gameBlock'); if(!box) return;
  const cfg={...DEFAULT_GAMES,...(p.games||{}),enabled:{...DEFAULT_GAMES.enabled,...((p.games||{}).enabled||{})}};
  const activeGames=LIVE_GAMES.filter(g=>cfg.enabled[g]);
  if(!activeGames.length && !isOwner){ box.innerHTML=''; return; } // rien à montrer aux visiteurs
  const title=cfg.title||(isOwner?'🎮 Mes records':'🎮 Records de '+p.username);
  const sub=isOwner?'Tes meilleurs scores perso — joue pour les battre.':'Records personnels de '+esc(p.username)+' — joue pour t\'amuser (non enregistré ici).';
  const boards=await Promise.all(activeGames.map(g=>fetchLeaderboard(p.uid,g)));
  const btns=activeGames.map((g,i)=>`<button class="game-btn" data-game="${g}">${GAME_REGISTRY[g].name}<div id="lb-${g}" style="margin-top:6px;">${lbHTML(boards[i],g)}</div></button>`).join('');

async function saveScore(p,game,score){
  if(!session){ toast('Connecte-toi et joue sur ton profil pour enregistrer tes records','err'); return false; }
  if(session.uid!==p.uid){ toast('Records personnels — joue sur TON profil pour les enregistrer'); return false; }
  try{
    await pgFetch('/game_scores',{method:'POST',body:JSON.stringify({profile_uid:session.uid,player_uid:session.uid,player_name:session.username,game,score})});
    const rows=await fetchLeaderboard(p.uid,game);
    const el=document.getElementById('lb-'+game); if(el) el.innerHTML=lbHTML(rows,game);
    if(!(p.achievements||[]).includes('gamer')) checkAchievements(p);
    const best=rows[0]; if(best && +best.score===+score) toast('🏅 Nouveau record perso !','ok');

function openGame(p,game){
  if(game==='reaction'){
    openModal('⚡ Réflexe — clique dès que c\'est vert',
      `<div class="game-arena" id="arena"><div class="big">Clique pour démarrer</div><div class="hint">attends le vert, puis clique le plus vite possible</div></div>`,
      (body)=>{
        const a=body.querySelector('#arena'); let st='idle', t0=0, timer=null;
        a.onclick=()=>{
          if(st==='idle'){ st='wait'; a.className='game-arena wait'; a.innerHTML='<div class="big">Attends…</div>';
            timer=setTimeout(()=>{ st='go'; a.className='game-arena go'; a.innerHTML='<div class="big">CLIQUE !</div>'; t0=performance.now(); },800+Math.random()*2500);
          } else if(st==='wait'){ clearTimeout(timer); st='idle'; a.className='game-arena'; a.innerHTML='<div class="big">Trop tôt 😅</div><div class="hint">clique pour réessayer</div>';
          } else if(st==='go'){ const ms=performance.now()-t0; st='idle'; a.className='game-arena';
            a.innerHTML='<div class="big">'+Math.round(ms)+' ms</div><div class="hint">clique pour rejouer</div>';
            saveScore(p,'reaction',Math.round(ms));
          }
        };
      });
  } else {
    openModal('🖱️ Clics par seconde — 5 secondes',
      `<div class="game-arena" id="arena"><div class="big">Clique pour démarrer</div><div class="hint">clique le plus vite possible pendant 5 s</div></div>`,
      (body)=>{
        const a=body.querySelector('#arena'); let running=false, clicks=0, tEnd=0, raf=null;
        a.onclick=()=>{
          if(!running){ running=true; clicks=0; tEnd=performance.now()+5000;
            const tick=()=>{ const left=tEnd-performance.now();
              if(left<=0){ running=false; cancelAnimationFrame(raf); const cps=+(clicks/5).toFixed(1);
                a.innerHTML='<div class="big">'+cps+' cps</div><div class="hint">'+clicks+' clics — clique pour rejouer</div>';
                saveScore(p,'cps',cps); return; }
              a.innerHTML='<div class="big">'+clicks+'</div><div class="hint">'+(left/1000).toFixed(1)+' s restantes</div>';
              raf=requestAnimationFrame(tick); };
            raf=requestAnimationFrame(tick);
          } else clicks++;
        };
      });
  }
}

function setupTilt(enabled){

// ===== Discord OAuth2 (librairie officielle Supabase, flux PKCE, sans bot ni serveur) =====
// L'échange du code se fait côté Supabase (le client secret n'est JAMAIS exposé au navigateur).
// Ce client Supabase Auth sert UNIQUEMENT au login Discord ; l'auth de l'app reste maison.
let sbAuth=null;
function getSbAuth(){
  if(sbAuth) return sbAuth;
  if(!window.supabase || !window.supabase.createClient) return null;
  sbAuth=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{ detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'pkce', storageKey:'xdez_sb_oauth' }
  });
  return sbAuth;
}
// Vérifie côté Supabase si le provider Discord est activé (évite d'envoyer l'utilisateur
// sur une page d'erreur 400 quand le provider n'est pas configuré).
async function isDiscordEnabled(){
  try{ const r=await fetch(SUPABASE_URL+'/auth/v1/settings',{headers:{'apikey':SUPABASE_KEY}}); const j=await r.json(); return !!(j&&j.external&&j.external.discord); }
  catch(e){ return true; } // en cas d'échec réseau, on tente quand même
}
async function startDiscordLink(){
  if(!session){ toast("Connecte-toi d'abord",'err'); return; }
  const client=getSbAuth();
  if(!client){ toast('Librairie Supabase non chargée (réseau ?)','err'); return; }
  if(!(await isDiscordEnabled())){ toast("Discord n'est pas encore activé dans Supabase — voir la configuration à faire",'err'); return; }
  try{ localStorage.setItem('xdez_discord_return',JSON.stringify({uid:session.uid})); }catch(e){}
  const { error }=await client.auth.signInWithOAuth({
    provider:'discord',
    options:{ redirectTo: location.origin+location.pathname }
  });
  if(error){
    localStorage.removeItem('xdez_discord_return');
    if(/provider is not enabled|not enabled|unsupported/i.test(error.message||''))
      toast("Discord n'est pas activé dans Supabase (voir la config)",'err');
    else toast('Erreur Discord : '+(error.message||'inconnue'),'err');
  }
}
// Au retour d'OAuth, la lib échange le code (PKCE) automatiquement ; on lit la session,
// on extrait l'identité Discord et on la lie au profil. On ne conserve pas la session Auth.
async function handleDiscordCallback(){
  const isReturn = location.search.indexOf('code=')>=0 || location.hash.indexOf('access_token')>=0 || location.hash.indexOf('error')>=0;
  let ret=null; try{ ret=JSON.parse(localStorage.getItem('xdez_discord_return')||'null'); }catch(e){}
  if(!isReturn && !ret) return false;
  const client=getSbAuth();
  if(!client){ return false; }
  if(location.hash.indexOf('error')>=0){
    localStorage.removeItem('xdez_discord_return');
    history.replaceState(null,'',location.pathname);
    toast('Discord : connexion annulée ou refusée','err');
    return false;
  }
  let sess=null;
  try{ const { data }=await client.auth.getSession(); sess=data && data.session; }catch(e){}
  if(!sess || !ret || !ret.uid){ return false; }
  try{
    const u=sess.user||{};
    const m=u.user_metadata||{};
    const ident=(u.identities||[]).find(i=>i.provider==='discord');
    const discordId=m.provider_id||m.sub||(ident&&ident.id)||'';
    const globalName=(m.custom_claims&&m.custom_claims.global_name)||'';
    const username=m.full_name||m.name||m.user_name||m.preferred_username||'';
    const avatar=m.avatar_url||m.picture||'';
    if(discordId){
      await pgFetch('/profiles?uid=eq.'+ret.uid,{method:'PATCH',body:JSON.stringify({discord_id:discordId,discord_username:username,discord_global_name:globalName||username,discord_avatar:avatar})});
      toast('Compte Discord lié ✓','ok');
    } else { toast('Liaison Discord incomplète (identité manquante)','err'); }
  }catch(e){ toast('Liaison Discord échouée','err'); }
  try{ await client.auth.signOut(); }catch(e){}       // on ne garde pas la session Supabase Auth
  localStorage.removeItem('xdez_discord_return');
  history.replaceState(null,'',location.pathname);
  return true;
}

// ===== effects engine =====
let particleRAF=null;
function startParticles(enabled, accent){
  const cv=document.getElementById('particles'); if(!cv) return;
  if(particleRAF){ cancelAnimationFrame(particleRAF); particleRAF=null; }
  const ctx=cv.getContext('2d');
  if(!enabled){ ctx.clearRect(0,0,cv.width,cv.height); return; }
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize(); window.onresize=resize;
  const intensity=(window.__animIntensity==null?1:window.__animIntensity);
  if(intensity<=0){ ctx.clearRect(0,0,cv.width,cv.height); return; }
  const N=Math.min(60, Math.floor(innerWidth/22*intensity));
  const parts=Array.from({length:N},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2+.6,vy:Math.random()*.5+.15,vx:(Math.random()-.5)*.3,a:Math.random()*.5+.2}));
  const col=accent||'#8fb39d';
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{ p.y+=p.vy; p.x+=p.vx; if(p.y>cv.height){p.y=-5;p.x=Math.random()*cv.width;} 
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fillStyle=col; ctx.globalAlpha=p.a; ctx.fill(); });
    ctx.globalAlpha=1; particleRAF=requestAnimationFrame(draw);
  }
  draw();
}

function setupMusic(p){
  teardownMusic();
  const mount=document.getElementById('vinylMount');
  if(!mount || !p.music) return;
  const fx=p.effects||{};
  const autoplayWanted=fx.autoplay!==false;
  const rotateWanted=fx.discRotate!==false;
  const coverUrl=fx.musicCover||p.avatar||'';
  const manualTitle=fx.musicTitle||'';

  mount.innerHTML=`<div class="vinyl-player">
    <div class="vinyl-disc-wrap">
      <div class="vinyl-disc" id="vinylDisc">${coverUrl?`<img src="${esc(coverUrl)}" alt="">`:''}<div class="vinyl-hole"></div></div>
      <button class="vinyl-playbtn" id="vinylBtn" aria-label="lecture/pause">${iconPlaySvg()}</button>
    </div>
    <div class="vinyl-meta">
      <div class="vinyl-title" id="vinylTitle">${esc(manualTitle||'♪ chargement...')}</div>
      <div class="vinyl-progress"><div class="vinyl-progress-bar" id="vinylProgress"></div></div>
      <div class="vinyl-hint" id="vinylHint" style="display:none;">▸ cliquer pour lancer le son</div>
    </div>
  </div>`;

  const disc=document.getElementById('vinylDisc'), btn=document.getElementById('vinylBtn');
  const titleEl=document.getElementById('vinylTitle'), progEl=document.getElementById('vinylProgress'), hintEl=document.getElementById('vinylHint');
  function setPlayingUI(playing){ disc.classList.toggle('spinning', !!playing && rotateWanted); btn.innerHTML=playing?iconPauseSvg():iconPlaySvg(); }
  function hideHint(){ hintEl.style.display='none'; }
  function showHint(){ hintEl.style.display='block'; }
  function tick(){ if(mediaPlayer){ const pct=mediaPlayer.getProgress(); if(pct!=null) progEl.style.width=(Math.max(0,Math.min(1,pct))*100)+'%'; } vinylProgressRAF=requestAnimationFrame(tick); }
  tick();

  let unlockArmed=false;
  function armUnlockOnFirstInteraction(){
    if(unlockArmed) return; unlockArmed=true;
    const unlock=()=>{ if(!mediaPlayer) return; const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); };
    document.addEventListener('click',unlock,{once:true});
    document.addEventListener('touchstart',unlock,{once:true});
  }
  function attemptAutoplay(){
    const res=mediaPlayer.play();
    if(res && typeof res.catch==='function'){ res.catch(()=>{ showHint(); armUnlockOnFirstInteraction(); }); }
    else { setTimeout(()=>{ if(mediaPlayer && !mediaPlayer.playing){ showHint(); armUnlockOnFirstInteraction(); } },1200); }
  }

  const ytId=ytIdFromUrl(p.music);
  if(ytId){
    const host=document.createElement('div'); host.id='ytHost'; host.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-100px;top:-100px;'; document.body.appendChild(host);
    mediaPlayer={ kind:'yt', playing:false, ytPlayer:null,
      play(){ if(this.ytPlayer) this.ytPlayer.playVideo(); },
      pause(){ if(this.ytPlayer) this.ytPlayer.pauseVideo(); },
      getProgress(){ if(!this.ytPlayer||typeof this.ytPlayer.getDuration!=='function') return null; const d=this.ytPlayer.getDuration(); if(!d) return 0; return (this.ytPlayer.getCurrentTime()||0)/d; }
    };
    const makePlayer=()=>{
      mediaPlayer.ytPlayer=new YT.Player('ytHost',{ videoId:ytId, playerVars:{autoplay:0,loop:1,playlist:ytId}, events:{
        onReady:(e)=>{ e.target.setVolume(45); if(!manualTitle){ const t=e.target.getVideoData(); if(t&&t.title) titleEl.textContent='♪ '+t.title; } if(autoplayWanted) attemptAutoplay(); },
        onStateChange:(e)=>{ const playing=e.data===1; mediaPlayer.playing=playing; setPlayingUI(playing); if(playing) hideHint(); }
      }});
    };
    if(window.YT&&window.YT.Player) makePlayer();
    else{ const tag=document.createElement('script'); tag.src='https://www.youtube.com/iframe_api'; document.head.appendChild(tag); window.onYouTubeIframeAPIReady=makePlayer; }
  } else {
    const audioEl=new Audio(p.music); audioEl.loop=true; audioEl.volume=.45; audioEl.preload='auto';
    if(!manualTitle) titleEl.textContent='♪ '+decodeURIComponent((p.music.split('/').pop()||'musique').split('?')[0]);
    mediaPlayer={ kind:'audio', playing:false, el:audioEl,
      play(){ return audioEl.play(); },
      pause(){ audioEl.pause(); },
      getProgress(){ if(!audioEl.duration) return 0; return audioEl.currentTime/audioEl.duration; }
    };
    audioEl.addEventListener('play',()=>{ mediaPlayer.playing=true; setPlayingUI(true); hideHint(); });
    audioEl.addEventListener('pause',()=>{ mediaPlayer.playing=false; setPlayingUI(false); });
    if(autoplayWanted) attemptAutoplay();
  }

  btn.onclick=()=>{ if(!mediaPlayer) return; if(mediaPlayer.playing) mediaPlayer.pause(); else { const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); hideHint(); } };
}
function showSplash(username, cb){
  const existing=document.getElementById('splash'); if(existing) existing.remove();
  const s=document.createElement('div'); s.id='splash';
  s.innerHTML='<div class="stitle">'+esc(username||'xvy')+'</div><div class="ssub">[ clique pour entrer ]</div>';
  document.body.appendChild(s);
  const enter=()=>{ s.classList.add('hide'); setTimeout(()=>s.remove(),600); if(mediaPlayer){ const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); } if(cb)cb(); };
  s.onclick=enter;
}

(async function(){
  // 1) retour d'un login OAuth Discord (tokens dans le hash) → lier au profil
  await handleDiscordCallback();
  // 2) restaurer la session persistée (corrige la déconnexion au refresh)
  const restored=await restoreSession();
  if(restored) session=restored;
  // 3) déterminer la vue initiale
  viewingUid=getUrlUid(); view='profile';
  if(!viewingUid && session) viewingUid=session.uid;
  // splash uniquement si on arrive directement sur un profil partagé
  if(viewingUid){
    try{ const pre=await getProfile(viewingUid); if(pre && !pre.banned && pre.effects && pre.effects.splash){ showSplash(pre.username); } }catch(e){}
  }
  await render();
})();
