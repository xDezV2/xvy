<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>xdez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --accent:#8fb39d; --bg:#0d0f13; --text:#edece8; --text-dim:#9a9ea6;
    --op-card:1; --op-links:1; --op-avatar:1; --op-text:1; --op-wall:1; --op-overlay:1;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; min-height:100dvh; overflow-x:hidden; }

  #wallpaper{ position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; opacity:0; transition:opacity .5s ease; }
  #wallpaper.active{ opacity:var(--op-wall); }
  #wallpaperVideo{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .5s ease; }
  #wallpaperVideo.active{ opacity:var(--op-wall); }
  #wallpaper-overlay{ position:fixed; inset:0; z-index:1; pointer-events:none; background:linear-gradient(to bottom, rgba(13,15,19,.5), rgba(13,15,19,.78)); opacity:var(--op-overlay); transition:opacity .3s ease; }
  body.no-wall #wallpaper-overlay{ background:radial-gradient(600px circle at 30% 20%, color-mix(in srgb,var(--accent) 10%,transparent), transparent 60%), radial-gradient(500px circle at 70% 80%, color-mix(in srgb,var(--accent) 7%,transparent), transparent 60%); }

  .topbar{ position:fixed; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:8px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
  .topbar .who{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar .acts{ display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .topbar button{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 10px; border-radius:8px; cursor:pointer; transition:all .15s ease; backdrop-filter:blur(10px); }
  .topbar button:hover, .topbar button:active{ color:var(--text); border-color:var(--accent); }
  .topbar button.admin{ color:#e0b05e; border-color:rgba(224,176,94,.4); }

  .wrap{ position:relative; z-index:5; min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:70px 18px 40px; }
  .card{ width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:20px; animation:rise .5s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }

  /* themes */
  .theme-glass .profilebox{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(20px); border-radius:24px; padding:32px 24px; }
  .theme-glass .link{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(10px); }
  .theme-neon .profilebox{ background:rgba(10,4,20,.5); border:1px solid var(--accent); border-radius:20px; padding:32px 24px; box-shadow:0 0 30px color-mix(in srgb,var(--accent) 40%,transparent), inset 0 0 20px color-mix(in srgb,var(--accent) 10%,transparent); }
  .theme-neon .name{ text-shadow:0 0 12px var(--accent); }
  .theme-neon .link{ background:rgba(10,4,20,.6); border:1px solid color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-neon .link:hover{ box-shadow:0 0 16px color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-minimal .profilebox{ background:rgba(20,22,27,.7); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:30px 24px; }
  .theme-minimal .link{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
  .theme-mono .profilebox{ background:rgba(8,10,8,.8); border:1px solid #2a3a2a; border-radius:8px; padding:28px 22px; font-family:'JetBrains Mono',monospace; }
  .theme-mono .name{ font-family:'JetBrains Mono',monospace; }
  .theme-mono .link{ background:rgba(12,16,12,.7); border:1px solid #2a3a2a; border-radius:6px; }
  .theme-sunset .profilebox{ background:linear-gradient(160deg, rgba(60,20,40,.55), rgba(20,15,40,.55)); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(16px); border-radius:26px; padding:32px 24px; }
  .theme-sunset .link{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); }

  .profilebox{ width:100%; display:flex; flex-direction:column; align-items:center; gap:16px; opacity:var(--op-card); }
  .avatar{ width:96px; height:96px; border-radius:50%; background:linear-gradient(160deg, color-mix(in srgb,var(--accent) 30%,#1a1d22), #0f1113); border:2px solid color-mix(in srgb,var(--accent) 40%,transparent); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:600; color:var(--text); overflow:hidden; opacity:var(--op-avatar); }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  .identity{ text-align:center; display:flex; flex-direction:column; gap:8px; align-items:center; opacity:var(--op-text); }
  .name{ font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; letter-spacing:-.3px; position:relative; cursor:default; }
  .badge-admin{ font-size:11px; color:#e0b05e; font-family:'JetBrains Mono',monospace; border:1px solid rgba(224,176,94,.4); padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle; }
  .badge-demo{ font-size:11px; color:#b57edc; font-family:'JetBrains Mono',monospace; border:1px dashed rgba(181,126,220,.5); padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle; text-transform:uppercase; letter-spacing:.5px; }
  .status{ display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 45%,transparent);} 70%{box-shadow:0 0 0 7px transparent;} 100%{box-shadow:0 0 0 0 transparent;} }
  @media (prefers-reduced-motion:reduce){ .dot{animation:none;} }
  .tag{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,transparent); border:1px solid color-mix(in srgb,var(--accent) 25%,transparent); padding:4px 12px; border-radius:999px; }
  .bio{ font-size:13.5px; color:var(--text-dim); max-width:320px; line-height:1.55; }
  .customtext{ font-size:14px; color:var(--text); max-width:320px; line-height:1.6; white-space:pre-wrap; opacity:var(--op-text); text-align:center; }

  .links{ width:100%; display:flex; flex-direction:column; gap:10px; margin-top:2px; opacity:var(--op-links); }
  .link{ display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:12px; color:var(--text); text-decoration:none; font-size:14px; font-weight:500; transition:transform .15s ease, border-color .15s ease; }
  .link:hover, .link:active{ transform:translateY(-2px); border-color:var(--accent); }
  .link .ico{ width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .link .ico svg{ width:100%; height:100%; }
  .link .lbl{ display:flex; flex-direction:column; gap:1px; overflow:hidden; }
  .link .plat{ font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.5px; }
  .link .txt{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .link .arrow{ margin-left:auto; color:var(--text-dim); font-size:16px; }

  .sharebtn{ margin-top:4px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); background:none; border:1px dashed rgba(255,255,255,.15); padding:8px 14px; border-radius:8px; cursor:pointer; transition:all .15s ease; }
  .sharebtn:hover{ color:var(--accent); border-color:var(--accent); }
  footer{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#565a63; text-align:center; }

  .panel{ width:100%; max-width:400px; background:rgba(20,22,27,.9); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(20px); border-radius:20px; padding:26px; display:flex; flex-direction:column; gap:16px; animation:rise .4s ease; }
  .panel h2{ font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; }
  .panel h3{ font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:var(--text-dim); margin-top:4px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
  .field input, .field textarea{ background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.12); border-radius:10px; color:var(--text); padding:12px 14px; font-size:15px; font-family:'Inter',sans-serif; outline:none; width:100%; transition:border-color .15s ease; }
  .field input:focus, .field textarea:focus{ border-color:var(--accent); }
  .field textarea{ resize:vertical; min-height:64px; }
  .row{ display:flex; gap:8px; } .row>*{ flex:1; }

  .btn{ background:var(--accent); color:#0a0d0a; border:none; border-radius:10px; padding:13px 16px; font-size:15px; font-weight:600; cursor:pointer; transition:opacity .15s ease, transform .1s ease; font-family:'Inter',sans-serif; }
  .btn:hover{ opacity:.9; } .btn:active{ transform:scale(.98); }
  .btn.ghost{ background:transparent; border:1px solid rgba(255,255,255,.15); color:var(--text); }
  .btn.ghost:hover{ border-color:var(--accent); }
  .btn.danger{ background:transparent; border:1px solid #c96a5e; color:#c96a5e; }
  .btn.danger:hover{ background:rgba(201,106,94,.1); }
  .btn.small{ padding:8px 12px; font-size:12px; border-radius:8px; }

  .tabs{ display:flex; gap:6px; }
  .tabs button{ flex:1; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); padding:10px; border-radius:10px; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; font-weight:500; }
  .tabs button.active{ background:var(--accent); color:#0a0d0a; border-color:transparent; font-weight:600; }

  .error{ color:#e08a7e; font-size:12.5px; font-family:'JetBrains Mono',monospace; line-height:1.4; }
  .hint{ color:var(--text-dim); font-size:11.5px; line-height:1.5; }

  .chooser{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:flex; align-items:center; gap:7px; padding:8px 12px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.12); border-radius:10px; cursor:pointer; font-size:13px; transition:all .15s ease; }
  .chip:hover{ border-color:var(--accent); }
  .chip .ico{ width:18px; height:18px; } .chip .ico svg{ width:100%; height:100%; }

  .swatches{ display:flex; gap:8px; flex-wrap:wrap; }
  .swatch{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s ease; }
  .swatch:hover{ transform:scale(1.1); } .swatch.active{ border-color:var(--text); }

  .themegrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
  .themecell{ padding:14px 8px; border-radius:12px; text-align:center; cursor:pointer; font-size:12px; font-weight:600; border:2px solid transparent; transition:all .15s ease; }
  .themecell.active{ border-color:var(--text); }

  .slider{ display:flex; flex-direction:column; gap:4px; }
  .slider .lbl{ display:flex; justify-content:space-between; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }
  .slider input[type=range]{ width:100%; accent-color:var(--accent); }

  .linkeditor{ display:flex; flex-direction:column; gap:8px; }
  .linkrow{ display:flex; gap:6px; align-items:center; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:8px; }
  .linkrow .plat-ico{ width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .linkrow .plat-ico svg{ width:100%; height:100%; }
  .linkrow input{ flex:1; background:transparent; border:none; color:var(--text); font-size:13px; outline:none; min-width:0; }
  .linkrow .rm{ background:none; border:none; color:#c96a5e; font-size:20px; cursor:pointer; padding:0 6px; flex-shrink:0; }

  .directory{ width:100%; max-width:400px; display:flex; flex-direction:column; gap:8px; animation:rise .4s ease; }
  .direntry{ display:flex; align-items:center; gap:12px; padding:12px 14px; background:rgba(20,22,27,.8); border:1px solid rgba(255,255,255,.1); border-radius:12px; cursor:pointer; transition:all .15s ease; backdrop-filter:blur(10px); }
  .direntry:hover{ border-color:var(--accent); transform:translateX(2px); }
  .direntry .av{ width:40px; height:40px; border-radius:50%; background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 30%,#1a1d22),#0f1113); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:600; flex-shrink:0; overflow:hidden; }
  .direntry .av img{ width:100%; height:100%; object-fit:cover; }
  .direntry .uidbadge{ margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); }

  .adminrow{ display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:10px; }
  .adminrow.banned{ border-color:rgba(201,106,94,.4); opacity:.6; }
  .adminrow .info{ flex:1; overflow:hidden; }
  .adminrow .info .u{ font-weight:600; font-size:14px; }
  .adminrow .info .m{ font-size:10.5px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }
  .adminrow .aact{ display:flex; gap:4px; }
  .adminrow .aact button{ font-size:11px; padding:6px 8px; border-radius:6px; cursor:pointer; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--text-dim); }
  .adminrow .aact button:hover{ border-color:var(--accent); color:var(--text); }
  .adminrow .aact button.d{ border-color:rgba(201,106,94,.4); color:#c96a5e; }

  .loading{ color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:13px; }
  @media (max-width:420px){ .card, .panel, .directory{ max-width:100%; } .name{ font-size:24px; } .topbar button{ padding:6px 8px; font-size:10px; } }

  /* guns.lol-style effects */
  #splash{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:rgba(8,9,12,.92); backdrop-filter:blur(8px); cursor:pointer; transition:opacity .6s ease; }
  #splash.hide{ opacity:0; pointer-events:none; }
  #splash .stitle{ font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:700; letter-spacing:1px; color:var(--text); }
  #splash .ssub{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink{ 0%,100%{opacity:.4;} 50%{opacity:1;} }
  #particles{ position:fixed; inset:0; z-index:2; pointer-events:none; }
  .views{ display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
  .tw-cursor{ display:inline-block; width:2px; height:1em; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:blink .9s step-end infinite; }
  /* lecteur vinyle */
  .vinyl-player{ display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; margin:2px 0; }
  .vinyl-disc-wrap{ position:relative; width:150px; height:150px; }
  .vinyl-disc{ width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative; box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 0 6px rgba(0,0,0,.35), 0 0 0 7px rgba(255,255,255,.06); background:radial-gradient(circle at center, #161616 0 17%, #050505 17% 19%, #1c1c1c 19% 100%); animation:vinylspin 6s linear infinite; animation-play-state:paused; }
  .vinyl-disc.spinning{ animation-play-state:running; }
  .vinyl-disc img{ width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
  .vinyl-disc::after{ content:''; position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.18), transparent 55%); pointer-events:none; }
  @keyframes vinylspin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion:reduce){ .vinyl-disc{ animation:none; } }
  .vinyl-hole{ position:absolute; top:50%; left:50%; width:13px; height:13px; background:var(--bg); border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 0 2px rgba(255,255,255,.15); z-index:2; }
  .vinyl-playbtn{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:rgba(10,10,12,.78); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; z-index:5; transition:transform .15s ease, background .15s ease; }
  .vinyl-playbtn:hover{ transform:translate(-50%,-50%) scale(1.08); background:rgba(10,10,12,.92); }
  .vinyl-playbtn svg{ width:20px; height:20px; }
  .vinyl-meta{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .vinyl-title{ font-size:12.5px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .vinyl-progress{ width:170px; height:3px; border-radius:999px; background:rgba(255,255,255,.12); overflow:hidden; }
  .vinyl-progress-bar{ height:100%; width:0%; background:var(--accent); transition:width .2s linear; }
  .vinyl-hint{ font-size:10.5px; color:var(--accent); font-family:'JetBrains Mono',monospace; opacity:.9; cursor:pointer; animation:blink 1.4s ease-in-out infinite; }

  /* social icons inline (guns.lol style) */
  .social-inline{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:2px 0; opacity:var(--op-links); }
  .social-inline a{ width:26px; height:26px; color:var(--text-dim); transition:transform .15s ease, color .15s ease, filter .15s ease; }
  .social-inline a:hover{ transform:translateY(-3px) scale(1.15); }
  .social-inline a svg{ width:100%; height:100%; }
  /* badges */
  .badges{ display:inline-flex; gap:5px; margin-left:7px; vertical-align:middle; }
  .badge{ display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; }
  .badge svg{ width:100%; height:100%; }
  .badge.verified{ color:#4a9eff; } .badge.founder{ color:#e0b05e; } .badge.staff{ color:#e05e9e; } .badge.og{ color:#5ec9b8; } .badge.premium{ color:#b57edc; }
  /* tilt */
  .tiltwrap{ perspective:900px; width:100%; display:flex; justify-content:center; }
  .profilebox{ transition:transform .12s ease; transform-style:preserve-3d; }
  /* discord presence */
  .discord-card{ display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; background:rgba(88,101,242,.12); border:1px solid rgba(88,101,242,.3); width:100%; }
  .discord-card .dav{ width:38px; height:38px; border-radius:50%; position:relative; flex-shrink:0; }
  .discord-card .dav img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .discord-card .dstatus{ position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid #16181d; }
  .dstatus.online{ background:#3ba55d; } .dstatus.idle{ background:#faa81a; } .dstatus.dnd{ background:#ed4245; } .dstatus.offline{ background:#747f8d; }
  .discord-card .dinfo{ overflow:hidden; } .discord-card .dname{ font-size:13px; font-weight:600; } .discord-card .dact{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* live preview badge in editor */
  .previewtag{ position:fixed; top:52px; left:50%; transform:translateX(-50%); z-index:15; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); background:rgba(0,0,0,.5); border:1px solid var(--accent); padding:3px 10px; border-radius:999px; backdrop-filter:blur(6px); }

  /* === HUD futuriste === */
  .badge{ position:relative; }
  .badge::after{ content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) translateY(4px); background:rgba(10,12,16,.95); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; padding:5px 9px; border-radius:7px; white-space:nowrap; opacity:0; pointer-events:none; transition:all .18s cubic-bezier(.2,.8,.2,1); border:1px solid rgba(255,255,255,.15); box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:30; }
  .badge::before{ content:''; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:rgba(10,12,16,.95); opacity:0; transition:opacity .18s ease; }
  .badge:hover::after{ opacity:1; transform:translateX(-50%) translateY(0); }
  .badge:hover::before{ opacity:1; }
  .badge:hover{ filter:drop-shadow(0 0 6px currentColor); transform:scale(1.15); }
  .badge{ transition:transform .15s ease, filter .15s ease; }
  .rarity-legendary{ animation:shimmer 2.5s linear infinite; }
  @keyframes shimmer{ 0%,100%{filter:drop-shadow(0 0 2px currentColor);} 50%{filter:drop-shadow(0 0 8px currentColor);} }

  /* modal */
  .modal-bg{ position:fixed; inset:0; z-index:200; background:rgba(6,7,10,.75); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadein .2s ease; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }
  .modal{ width:100%; max-width:440px; max-height:85vh; overflow-y:auto; background:linear-gradient(160deg, rgba(24,27,34,.98), rgba(16,18,24,.98)); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); animation:rise .3s ease; }
  .modal h2{ font-family:'Space Grotesk',sans-serif; font-size:19px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .modal .close{ margin-left:auto; cursor:pointer; color:var(--text-dim); background:none; border:none; font-size:22px; }

  /* toast */
  #toastWrap{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .toast{ background:rgba(20,24,30,.96); border:1px solid var(--accent); color:var(--text); padding:11px 18px; border-radius:10px; font-size:13px; font-family:'Inter',sans-serif; box-shadow:0 6px 24px rgba(0,0,0,.5); animation:toastin .3s ease; backdrop-filter:blur(10px); max-width:90vw; }
  .toast.err{ border-color:#e05e5e; } .toast.ok{ border-color:#5ec98f; }
  @keyframes toastin{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  /* role chip */
  .rolechip{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 7px; border-radius:5px; text-transform:uppercase; letter-spacing:.5px; }
  .role-user{ color:var(--text-dim); border:1px solid rgba(255,255,255,.15); }
  .role-staff{ color:#e05e9e; border:1px solid rgba(224,94,158,.4); }
  .role-admin{ color:#e0b05e; border:1px solid rgba(224,176,94,.4); }
  .role-superadmin{ color:#4a9eff; border:1px solid rgba(74,158,255,.5); box-shadow:0 0 8px rgba(74,158,255,.2); }

  /* admin subtabs */
  .subtabs{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
  .subtabs button{ background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-family:'JetBrains Mono',monospace; }
  .subtabs button.active{ background:var(--accent); color:#0a0d0a; border-color:transparent; }
  .logrow{ font-family:'JetBrains Mono',monospace; font-size:11px; padding:8px 10px; background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.06); border-radius:8px; line-height:1.5; }
  .logrow .la{ color:var(--accent); } .logrow .lt{ color:var(--text-dim); }

  /* ============================================================
     HUD v2 — carte profil premium (avatar + badges + UID séparés)
     ============================================================ */
  .avatar-wrap{ position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .avatar-ring{ position:relative; width:104px; height:104px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:conic-gradient(from 180deg, color-mix(in srgb,var(--accent) 65%,transparent), transparent 55%, color-mix(in srgb,var(--accent) 45%,transparent));
    box-shadow:0 0 24px color-mix(in srgb,var(--accent) 22%,transparent); }
  .avatar-ring::before{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--bg); z-index:0; }
  .avatar-wrap .avatar{ position:relative; z-index:1; width:96px; height:96px; margin:0; border:none;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.45); }
  /* badges = ligne dédiée, pills icône + NOM toujours lisible, jamais recouvert par l'avatar */
  .badge-strip{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; max-width:330px; margin:2px auto 0; }
  .badge-pill{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px 5px 9px; border-radius:999px;
    background:rgba(255,255,255,.05); border:1px solid color-mix(in srgb,currentColor 30%,rgba(255,255,255,.12));
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; cursor:default;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
  .badge-pill:hover{ transform:translateY(-2px); border-color:currentColor; box-shadow:0 5px 16px color-mix(in srgb,currentColor 28%,transparent); }
  .badge-pill .bico{ width:15px; height:15px; display:flex; flex-shrink:0; }
  .badge-pill .bico svg{ width:100%; height:100%; }
  .badge-pill .bname{ color:var(--text); white-space:nowrap; }
  .badge-pill.rarity-legendary{ animation:shimmer 2.5s linear infinite; }
  @media (max-width:420px){ .badge-strip{ max-width:90vw; } }
  /* n'affiche l'ancienne infobulle .badge que si data-tip présent (évite les boîtes vides en admin) */
  .badge:not([data-tip])::after, .badge:not([data-tip])::before{ display:none; }

  .name-row{ display:flex; align-items:center; gap:8px; justify-content:center; flex-wrap:wrap; }
  .name-row .name{ font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; letter-spacing:-.3px; }
  .id-row{ display:flex; align-items:center; gap:8px; justify-content:center; flex-wrap:wrap; }
  .uid-chip{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); padding:3px 10px; border-radius:999px; letter-spacing:.5px; cursor:pointer; transition:all .15s ease; }
  .uid-chip:hover{ color:var(--text); border-color:var(--accent); }
  .stat-row{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:2px; }
  .stat-pill{ display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
    background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.08); padding:5px 11px; border-radius:999px; }
  .stat-pill b{ color:var(--text); font-weight:600; }

  /* boutons premium */
  .btn{ position:relative; box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 22%,transparent); }
  .btn:hover{ box-shadow:0 6px 22px color-mix(in srgb,var(--accent) 32%,transparent); }
  .btn.ghost, .btn.danger{ box-shadow:none; }
  .btn-discord{ display:flex; align-items:center; justify-content:center; gap:9px; width:100%; background:#5865F2; color:#fff; border:none;
    border-radius:10px; padding:12px 16px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
    box-shadow:0 4px 16px rgba(88,101,242,.35); transition:transform .1s ease, box-shadow .15s ease; }
  .btn-discord:hover{ box-shadow:0 6px 22px rgba(88,101,242,.5); } .btn-discord:active{ transform:scale(.98); }
  .btn-discord svg{ width:20px; height:20px; }

  /* loader propre */
  .loader-dots{ display:inline-flex; gap:5px; align-items:center; }
  .loader-dots i{ width:7px; height:7px; border-radius:50%; background:var(--accent); animation:ld 1s ease-in-out infinite; }
  .loader-dots i:nth-child(2){ animation-delay:.15s; } .loader-dots i:nth-child(3){ animation-delay:.3s; }
  @keyframes ld{ 0%,100%{opacity:.25; transform:translateY(0);} 50%{opacity:1; transform:translateY(-4px);} }
  @media (prefers-reduced-motion:reduce){ .loader-dots i{ animation:none; opacity:.6; } }
</style>

function generateDemoUsername(taken){
  let u; let tries=0;
  do{ u=randPick(DEMO_ADJ)+randPick(DEMO_NOUN)+randDigits(); tries++; }while(taken.has(u.toLowerCase())&&tries<50);

function generateDemoLinks(username){
  const n=1+Math.floor(Math.random()*2);
  const pool=[...DEMO_PLATFORM_POOL]; const picked=[];
  for(let i=0;i<n && pool.length;i++){ const idx=Math.floor(Math.random()*pool.length); picked.push(pool.splice(idx,1)[0]); }
  return picked.map(platform=>{
    const raw=platform==='link'?('https://example.com/'+username.toLowerCase()):(platform==='discord'?username.toLowerCase():username.toLowerCase());
    return {platform,label:(PLATFORMS[platform]||PLATFORMS.link).name,raw,url:normalizeUrl(platform,raw)};
  });
}

async function sha256(s){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }

// ===== disponibilité pseudo / uid (correction du faux "déjà pris") =====
// Comparaison en JS insensible à la casse, sans ilike (donc aucun faux positif
// dû aux jokers %/_ dans un pseudo) et en excluant TOUJOURS le compte courant.
async function isUsernameAvailable(name, excludeUid){
  const target=(name||'').trim().toLowerCase();
  if(!target) return false;
  const r=await pgFetch('/profiles?select=uid,username');
  return !(r||[]).some(row=>row.username.toLowerCase()===target && row.uid!==excludeUid);
}
async function isUidAvailable(uid, excludeUid){
  const n=parseInt(uid,10); if(!n||n<1) return false;
  // pas de filtre deleted_at : un uid tenu par un compte en corbeille reste pris.
  const r=await pgFetch('/profiles?uid=eq.'+n+'&select=uid');
  return !(r||[]).some(row=>row.uid!==excludeUid);
}
async function createAccount(u,p){
  const uname=(u||'').trim();
  if(uname.length<2) return {ok:false,error:'Pseudo trop court (2 caractères min).'};
  if(!(await isUsernameAvailable(uname,null))) return {ok:false,error:'Ce pseudo est déjà pris.'};
  const hash=await sha256(p);
  try{
    const r=await pgFetch('/profiles',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({username:uname,password_hash:hash,tag:'@'+uname.toLowerCase(),bio:'Nouveau membre.',accent:ACCENTS[0],links:[],wallpaper:'',theme:'glass',avatar:'',custom_text:'',opacity:DEFAULT_OP,music:'',effects:DEFAULT_EFFECTS,badges:[],cursor_url:'',discord_id:''})});
    return {ok:true,profile:mapRow(r[0])};
  }catch(e){ return {ok:false,error:'Ce pseudo est déjà pris.'}; }
}
async function login(u,p){
  const uname=(u||'').trim().toLowerCase();
  if(!uname) return {ok:false,error:'Compte introuvable.'};
  const all=await pgFetch('/profiles?select=*');
  const row=(all||[]).find(x=>x.username.toLowerCase()===uname);
  if(!row) return {ok:false,error:'Compte introuvable.'};
  if(row.banned) return {ok:false,error:'Ce compte est banni.'};
  if(row.deleted_at) return {ok:false,error:'Ce compte n\'existe plus.'};
  if(await sha256(p)!==row.password_hash) return {ok:false,error:'Mot de passe incorrect.'};
  return {ok:true,profile:mapRow(row)};
}

const SESSION_KEY='xdez_session_v1';
function saveSession(p){ try{ localStorage.setItem(SESSION_KEY,JSON.stringify({uid:p.uid,hash:p.hash})); }catch(e){} }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }
async function restoreSession(){
  let raw; try{ raw=localStorage.getItem(SESSION_KEY); }catch(e){ return null; }
  if(!raw) return null;
  let s; try{ s=JSON.parse(raw); }catch(e){ clearSession(); return null; }
  if(!s||!s.uid){ clearSession(); return null; }
  try{
    const p=await getProfile(s.uid);
    // session invalide si le compte a disparu, est banni, supprimé, ou si le hash a changé
    if(!p || p.banned || p.deletedAt || p.hash!==s.hash){ clearSession(); return null; }
    return p;
  }catch(e){ return null; } // souci réseau : on ne restaure pas mais on ne casse pas non plus
}

function toast(msg, type){ let w=document.getElementById('toastWrap'); if(!w){ w=document.createElement('div'); w.id='toastWrap'; document.body.appendChild(w); } const t=document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=msg; w.appendChild(t); setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); },2600); }

function openModal(title, bodyHtml, onReady){
  closeModal();
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML=`<div class="modal"><h2>${title}<button class="close" id="modalClose">×</button></h2><div id="modalBody">${bodyHtml}</div></div>`;
  bg.onclick=(e)=>{ if(e.target===bg) closeModal(); };
  document.body.appendChild(bg);
  document.getElementById('modalClose').onclick=closeModal;

function getUrlUid(){ const u=new URLSearchParams(location.search).get('uid'); return u?parseInt(u,10):null; }
function normalizeUrl(platform,val){
  val=(val||'').trim(); if(!val) return '';
  if(/^https?:\/\//i.test(val)) return val;
  const maps={twitch:'https://twitch.tv/',youtube:'https://youtube.com/',tiktok:'https://tiktok.com/@',instagram:'https://instagram.com/',twitter:'https://x.com/',kick:'https://kick.com/',github:'https://github.com/',telegram:'https://t.me/',spotify:'https://open.spotify.com/',steam:'https://steamcommunity.com/id/'};
  const clean=val.replace(/^@/,'');
  if(platform==='discord') return val.startsWith('discord')?('https://'+val):('https://discord.gg/'+clean);
  return (maps[platform]||'https://')+clean;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function applyVisual(p){
  const r=document.documentElement;
  r.style.setProperty('--accent',p.accent||'#8fb39d');
  const o=p.opacity||DEFAULT_OP;
  r.style.setProperty('--op-card',(o.card??100)/100);
  r.style.setProperty('--op-links',(o.links??100)/100);
  r.style.setProperty('--op-avatar',(o.avatar??100)/100);
  r.style.setProperty('--op-text',(o.text??100)/100);
  r.style.setProperty('--op-wall',(o.wallpaper??100)/100);
  r.style.setProperty('--op-overlay',(o.overlay??DEFAULT_OP.overlay)/100);
  applyBackground(p);
  const bgType=(p.effects&&p.effects.bgType)||'image';
  const hasBg=bgType==='video'?!!(p.effects&&p.effects.bgVideo):!!p.wallpaper;
  document.body.className='theme-'+(p.theme||'glass')+(hasBg?'':' no-wall');
}
function resetVisual(){
  const r=document.documentElement;
  ['card','links','avatar','text','wall'].forEach(k=>r.style.setProperty('--op-'+k,1));
  r.style.setProperty('--op-overlay',1);
  r.style.setProperty('--accent','#8fb39d');
  applyWallpaper('');
  const v=document.getElementById('wallpaperVideo');
  if(v){ v.pause(); v.classList.remove('active'); v.removeAttribute('src'); v.dataset.src=''; }
  document.body.className='theme-glass no-wall';
}
function applyWallpaper(url){
  const w=document.getElementById('wallpaper');
  if(url){ w.style.backgroundImage='url("'+url+'")'; w.classList.add('active'); document.body.classList.remove('no-wall'); }
  else{ w.classList.remove('active'); w.style.backgroundImage=''; document.body.classList.add('no-wall'); }
}
// fond image OU vidéo : la vidéo est toujours muette/loop/playsinline ; l'image sert d'affiche
// de secours si la vidéo ne charge pas ou si l'autoplay est bloqué (ex: certains navigateurs mobiles).
function applyBackground(p){
  const type=(p.effects&&p.effects.bgType)||'image';
  const videoUrl=(p.effects&&p.effects.bgVideo)||'';
  const posterUrl=p.wallpaper||'';
  const v=document.getElementById('wallpaperVideo');
  if(type==='video' && videoUrl){
    applyWallpaper('');
    if(posterUrl) v.poster=posterUrl; else v.removeAttribute('poster');
    if(v.dataset.src!==videoUrl){ v.dataset.src=videoUrl; v.src=videoUrl; v.load(); }
    v.muted=true;
    v.classList.add('active');
    document.body.classList.remove('no-wall');
    v.onerror=()=>{
      v.classList.remove('active');
      if(posterUrl){ applyWallpaper(posterUrl); } else { document.body.classList.add('no-wall'); }
    };
    const pr=v.play();
    if(pr && typeof pr.catch==='function') pr.catch(()=>{ /* autoplay bloqué : le poster reste affiché, pas d'erreur visible */ });
  } else {
    v.classList.remove('active'); v.pause(); v.removeAttribute('src'); v.dataset.src='';
    applyWallpaper(p.wallpaper);
  }
}

// ===== tilt / cursor / discord =====
function setupTilt(){
  const box=document.getElementById('tiltBox'); if(!box) return;
  if(window.matchMedia('(pointer: coarse)').matches) return; // pas de tilt sur mobile
  const wrap=box.closest('.tiltwrap');
  wrap.addEventListener('mousemove',e=>{ const r=box.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; const dx=(e.clientX-cx)/r.width, dy=(e.clientY-cy)/r.height; box.style.transform=`rotateY(${dx*7}deg) rotateX(${-dy*7}deg)`; });
  wrap.addEventListener('mouseleave',()=>{ box.style.transform='rotateY(0) rotateX(0)'; });
}
function applyCursor(url){
  if(url){ document.body.style.cursor='url("'+url+'"), auto'; }
  else { document.body.style.cursor=''; }
}
// ===== Discord OAuth2 (librairie officielle Supabase, flux PKCE, sans bot ni serveur) =====
// L'échange du code se fait côté Supabase (le client secret n'est JAMAIS exposé au navigateur).
// Ce client Supabase Auth sert UNIQUEMENT au login Discord ; l'auth de l'app reste maison.
let sbAuth=null;
function getSbAuth(){
  if(sbAuth) return sbAuth;
  if(!window.supabase || !window.supabase.createClient) return null;
  sbAuth=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{ detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'pkce', storageKey:'xdez_sb_oauth' }
  });
  return sbAuth;
}
// Vérifie côté Supabase si le provider Discord est activé (évite d'envoyer l'utilisateur
// sur une page d'erreur 400 quand le provider n'est pas configuré).
async function isDiscordEnabled(){
  try{ const r=await fetch(SUPABASE_URL+'/auth/v1/settings',{headers:{'apikey':SUPABASE_KEY}}); const j=await r.json(); return !!(j&&j.external&&j.external.discord); }
  catch(e){ return true; } // en cas d'échec réseau, on tente quand même
}
async function startDiscordLink(){
  if(!session){ toast("Connecte-toi d'abord",'err'); return; }
  const client=getSbAuth();
  if(!client){ toast('Librairie Supabase non chargée (réseau ?)','err'); return; }
  if(!(await isDiscordEnabled())){ toast("Discord n'est pas encore activé dans Supabase — voir la configuration à faire",'err'); return; }
  try{ localStorage.setItem('xdez_discord_return',JSON.stringify({uid:session.uid})); }catch(e){}
  const { error }=await client.auth.signInWithOAuth({
    provider:'discord',
    options:{ redirectTo: location.origin+location.pathname }
  });
  if(error){
    localStorage.removeItem('xdez_discord_return');
    if(/provider is not enabled|not enabled|unsupported/i.test(error.message||''))
      toast("Discord n'est pas activé dans Supabase (voir la config)",'err');
    else toast('Erreur Discord : '+(error.message||'inconnue'),'err');
  }
}
// Au retour d'OAuth, la lib échange le code (PKCE) automatiquement ; on lit la session,
// on extrait l'identité Discord et on la lie au profil. On ne conserve pas la session Auth.
async function handleDiscordCallback(){
  const isReturn = location.search.indexOf('code=')>=0 || location.hash.indexOf('access_token')>=0 || location.hash.indexOf('error')>=0;
  let ret=null; try{ ret=JSON.parse(localStorage.getItem('xdez_discord_return')||'null'); }catch(e){}
  if(!isReturn && !ret) return false;
  const client=getSbAuth();
  if(!client){ return false; }
  if(location.hash.indexOf('error')>=0){
    localStorage.removeItem('xdez_discord_return');
    history.replaceState(null,'',location.pathname);
    toast('Discord : connexion annulée ou refusée','err');
    return false;
  }
  let sess=null;
  try{ const { data }=await client.auth.getSession(); sess=data && data.session; }catch(e){}
  if(!sess || !ret || !ret.uid){ return false; }
  try{
    const u=sess.user||{};
    const m=u.user_metadata||{};
    const ident=(u.identities||[]).find(i=>i.provider==='discord');
    const discordId=m.provider_id||m.sub||(ident&&ident.id)||'';
    const globalName=(m.custom_claims&&m.custom_claims.global_name)||'';
    const username=m.full_name||m.name||m.user_name||m.preferred_username||'';
    const avatar=m.avatar_url||m.picture||'';
    if(discordId){
      await pgFetch('/profiles?uid=eq.'+ret.uid,{method:'PATCH',body:JSON.stringify({discord_id:discordId,discord_username:username,discord_global_name:globalName||username,discord_avatar:avatar})});
      toast('Compte Discord lié ✓','ok');
    } else { toast('Liaison Discord incomplète (identité manquante)','err'); }
  }catch(e){ toast('Liaison Discord échouée','err'); }
  try{ await client.auth.signOut(); }catch(e){}       // on ne garde pas la session Supabase Auth
  localStorage.removeItem('xdez_discord_return');
  history.replaceState(null,'',location.pathname);
  return true;
}
function renderDiscordLinkBox(p){
  const box=document.getElementById('discordLinkBox'); if(!box) return;
  const name=p.discordGlobalName||p.discordUsername||'';
  if(name||p.discordAvatar){
    box.innerHTML=`<div class="discord-card" style="margin-bottom:8px;">
      <div class="dav">${p.discordAvatar?`<img src="${esc(p.discordAvatar)}" alt="">`:''}</div>
      <div class="dinfo"><div class="dname">${esc(name||'Discord lié')}</div><div class="dact">compte Discord lié</div></div></div>
    <div class="row"><button class="btn-discord" id="dcResync">${ICONS.discord} Resynchroniser</button><button class="btn ghost" id="dcUnlink">Délier</button></div>`;
    box.querySelector('#dcResync').onclick=()=>startDiscordLink();
    box.querySelector('#dcUnlink').onclick=async()=>{
      try{ await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({discord_id:'',discord_username:'',discord_global_name:'',discord_avatar:''})}); }catch(e){}
      p.discordId='';p.discordUsername='';p.discordGlobalName='';p.discordAvatar='';
      const dEl=document.getElementById('eDiscord'); if(dEl) dEl.value='';
      toast('Discord délié','ok'); renderDiscordLinkBox(p);
    };
  } else {
    box.innerHTML=`<button class="btn-discord" id="dcLink">${ICONS.discord} Se connecter avec Discord</button>`;
    box.querySelector('#dcLink').onclick=()=>startDiscordLink();
  }
}
async function loadDiscord(id){
  const card=document.getElementById('discordCard'); if(!card) return;
  try{
    const res=await fetch('https://api.lanyard.rest/v1/users/'+id);
    const j=await res.json();
    if(!j.success){ card.querySelector('.dact').textContent='utilisateur introuvable'; return; }
    const d=j.data; const u=d.discord_user;
    const av=u.avatar?`https://cdn.discordapp.com/avatars/${id}/${u.avatar}.png?size=64`:'https://cdn.discordapp.com/embed/avatars/0.png';
    const status=d.discord_status||'offline';
    const davEl=card.querySelector('.dav'); davEl.innerHTML=`<img src="${av}" alt=""><div class="dstatus ${status}"></div>`;
    card.querySelector('.dname').textContent=u.global_name||u.username||'Discord';
    let act='hors ligne';
    const statusMap={online:'en ligne',idle:'absent',dnd:'ne pas déranger',offline:'hors ligne'};
    act=statusMap[status]||status;
    const activity=(d.activities||[]).find(a=>a.type===0);
    if(activity) act='🎮 '+activity.name;
    else if(d.listening_to_spotify && d.spotify) act='🎵 '+d.spotify.song;
    card.querySelector('.dact').textContent=act;
  }catch(e){ card.querySelector('.dact').textContent='Lanyard non connecté'; }
}

// ===== effects engine =====
let particleRAF=null;
function startParticles(enabled, accent){
  const cv=document.getElementById('particles'); if(!cv) return;
  if(particleRAF){ cancelAnimationFrame(particleRAF); particleRAF=null; }
  const ctx=cv.getContext('2d');
  if(!enabled){ ctx.clearRect(0,0,cv.width,cv.height); return; }
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize(); window.onresize=resize;
  const N=Math.min(60, Math.floor(innerWidth/22));
  const parts=Array.from({length:N},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2+.6,vy:Math.random()*.5+.15,vx:(Math.random()-.5)*.3,a:Math.random()*.5+.2}));
  const col=accent||'#8fb39d';
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{ p.y+=p.vy; p.x+=p.vx; if(p.y>cv.height){p.y=-5;p.x=Math.random()*cv.width;} 
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fillStyle=col; ctx.globalAlpha=p.a; ctx.fill(); });
    ctx.globalAlpha=1; particleRAF=requestAnimationFrame(draw);
  }
  draw();
}
// ===== lecteur vinyle unifié (mp3 direct ou YouTube) =====
function ytIdFromUrl(url){ const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/); return m?m[1]:null; }
function iconPlaySvg(){ return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'; }
function iconPauseSvg(){ return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'; }
let mediaPlayer=null, vinylProgressRAF=null;
function teardownMusic(){
  const mount=document.getElementById('vinylMount'); if(mount) mount.innerHTML='';
  document.getElementById('ytHost')?.remove();
  if(vinylProgressRAF){ cancelAnimationFrame(vinylProgressRAF); vinylProgressRAF=null; }
  if(mediaPlayer){
    try{
      if(mediaPlayer.kind==='audio' && mediaPlayer.el) mediaPlayer.el.pause();
      if(mediaPlayer.kind==='yt' && mediaPlayer.ytPlayer) mediaPlayer.ytPlayer.destroy();
    }catch(e){}
    mediaPlayer=null;
  }
}
function setupMusic(p){
  teardownMusic();
  const mount=document.getElementById('vinylMount');
  if(!mount || !p.music) return;
  const fx=p.effects||{};
  const autoplayWanted=fx.autoplay!==false;
  const rotateWanted=fx.discRotate!==false;
  const coverUrl=fx.musicCover||p.avatar||'';
  const manualTitle=fx.musicTitle||'';

  mount.innerHTML=`<div class="vinyl-player">
    <div class="vinyl-disc-wrap">
      <div class="vinyl-disc" id="vinylDisc">${coverUrl?`<img src="${esc(coverUrl)}" alt="">`:''}<div class="vinyl-hole"></div></div>
      <button class="vinyl-playbtn" id="vinylBtn" aria-label="lecture/pause">${iconPlaySvg()}</button>
    </div>
    <div class="vinyl-meta">
      <div class="vinyl-title" id="vinylTitle">${esc(manualTitle||'♪ chargement...')}</div>
      <div class="vinyl-progress"><div class="vinyl-progress-bar" id="vinylProgress"></div></div>
      <div class="vinyl-hint" id="vinylHint" style="display:none;">▸ cliquer pour lancer le son</div>
    </div>
  </div>`;

  const disc=document.getElementById('vinylDisc'), btn=document.getElementById('vinylBtn');
  const titleEl=document.getElementById('vinylTitle'), progEl=document.getElementById('vinylProgress'), hintEl=document.getElementById('vinylHint');
  function setPlayingUI(playing){ disc.classList.toggle('spinning', !!playing && rotateWanted); btn.innerHTML=playing?iconPauseSvg():iconPlaySvg(); }
  function hideHint(){ hintEl.style.display='none'; }
  function showHint(){ hintEl.style.display='block'; }
  function tick(){ if(mediaPlayer){ const pct=mediaPlayer.getProgress(); if(pct!=null) progEl.style.width=(Math.max(0,Math.min(1,pct))*100)+'%'; } vinylProgressRAF=requestAnimationFrame(tick); }
  tick();

  let unlockArmed=false;
  function armUnlockOnFirstInteraction(){
    if(unlockArmed) return; unlockArmed=true;
    const unlock=()=>{ if(!mediaPlayer) return; const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); };
    document.addEventListener('click',unlock,{once:true});
    document.addEventListener('touchstart',unlock,{once:true});
  }
  function attemptAutoplay(){
    const res=mediaPlayer.play();
    if(res && typeof res.catch==='function'){ res.catch(()=>{ showHint(); armUnlockOnFirstInteraction(); }); }
    else { setTimeout(()=>{ if(mediaPlayer && !mediaPlayer.playing){ showHint(); armUnlockOnFirstInteraction(); } },1200); }
  }

  const ytId=ytIdFromUrl(p.music);
  if(ytId){
    const host=document.createElement('div'); host.id='ytHost'; host.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-100px;top:-100px;'; document.body.appendChild(host);
    mediaPlayer={ kind:'yt', playing:false, ytPlayer:null,
      play(){ if(this.ytPlayer) this.ytPlayer.playVideo(); },
      pause(){ if(this.ytPlayer) this.ytPlayer.pauseVideo(); },
      getProgress(){ if(!this.ytPlayer||typeof this.ytPlayer.getDuration!=='function') return null; const d=this.ytPlayer.getDuration(); if(!d) return 0; return (this.ytPlayer.getCurrentTime()||0)/d; }
    };
    const makePlayer=()=>{
      mediaPlayer.ytPlayer=new YT.Player('ytHost',{ videoId:ytId, playerVars:{autoplay:0,loop:1,playlist:ytId}, events:{
        onReady:(e)=>{ e.target.setVolume(45); if(!manualTitle){ const t=e.target.getVideoData(); if(t&&t.title) titleEl.textContent='♪ '+t.title; } if(autoplayWanted) attemptAutoplay(); },
        onStateChange:(e)=>{ const playing=e.data===1; mediaPlayer.playing=playing; setPlayingUI(playing); if(playing) hideHint(); }
      }});
    };
    if(window.YT&&window.YT.Player) makePlayer();
    else{ const tag=document.createElement('script'); tag.src='https://www.youtube.com/iframe_api'; document.head.appendChild(tag); window.onYouTubeIframeAPIReady=makePlayer; }
  } else {
    const audioEl=new Audio(p.music); audioEl.loop=true; audioEl.volume=.45; audioEl.preload='auto';
    if(!manualTitle) titleEl.textContent='♪ '+decodeURIComponent((p.music.split('/').pop()||'musique').split('?')[0]);
    mediaPlayer={ kind:'audio', playing:false, el:audioEl,
      play(){ return audioEl.play(); },
      pause(){ audioEl.pause(); },
      getProgress(){ if(!audioEl.duration) return 0; return audioEl.currentTime/audioEl.duration; }
    };
    audioEl.addEventListener('play',()=>{ mediaPlayer.playing=true; setPlayingUI(true); hideHint(); });
    audioEl.addEventListener('pause',()=>{ mediaPlayer.playing=false; setPlayingUI(false); });
    if(autoplayWanted) attemptAutoplay();
  }

  btn.onclick=()=>{ if(!mediaPlayer) return; if(mediaPlayer.playing) mediaPlayer.pause(); else { const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); hideHint(); } };
}
function showSplash(username, cb){
  const existing=document.getElementById('splash'); if(existing) existing.remove();
  const s=document.createElement('div'); s.id='splash';
  s.innerHTML='<div class="stitle">'+esc(username||'xdez')+'</div><div class="ssub">[ clique pour entrer ]</div>';
  document.body.appendChild(s);
  const enter=()=>{ s.classList.add('hide'); setTimeout(()=>s.remove(),600); if(mediaPlayer){ const r=mediaPlayer.play(); if(r&&r.catch) r.catch(()=>{}); } if(cb)cb(); };
  s.onclick=enter;
}

(async function(){
  // 1) retour d'un login OAuth Discord (tokens dans le hash) → lier au profil
  await handleDiscordCallback();
  // 2) restaurer la session persistée (corrige la déconnexion au refresh)
  const restored=await restoreSession();
  if(restored) session=restored;
  // 3) déterminer la vue initiale
  viewingUid=getUrlUid(); view='profile';
  if(!viewingUid && session) viewingUid=session.uid;
  // splash uniquement si on arrive directement sur un profil partagé
  if(viewingUid){
    try{ const pre=await getProfile(viewingUid); if(pre && !pre.banned && pre.effects && pre.effects.splash){ showSplash(pre.username); } }catch(e){}
  }
  await render();
})();
