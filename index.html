<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>xvy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --accent:#8fb39d; --bg:#0d0f13; --text:#edece8; --text-dim:#9a9ea6;
    --op-card:1; --op-links:1; --op-avatar:1; --op-text:1; --op-wall:1; --op-overlay:1;
    --profile-blur:20px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; min-height:100dvh; overflow-x:hidden; }

  #wallpaper{ position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; opacity:0; transition:opacity .5s ease; }
  #wallpaper.active{ opacity:var(--op-wall); }
  #wallpaperVideo{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .5s ease; }
  #wallpaperVideo.active{ opacity:var(--op-wall); }
  #wallpaper-overlay{ position:fixed; inset:0; z-index:1; pointer-events:none; background:linear-gradient(to bottom, rgba(13,15,19,.5), rgba(13,15,19,.78)); opacity:var(--op-overlay); transition:opacity .3s ease; }
  #aurora-bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  #aurora-bg .blob{ position:absolute; border-radius:50%; filter:blur(30px); }
  #aurora-bg .blob-a{ width:60vw; height:60vw; left:-10vw; top:-14vw; background:radial-gradient(circle, color-mix(in srgb,var(--accent) 40%,transparent), transparent 62%); animation:auroraA 16s ease-in-out infinite; }
  #aurora-bg .blob-b{ width:52vw; height:52vw; right:-12vw; bottom:-16vw; background:radial-gradient(circle, color-mix(in srgb,#f0abfc 34%,transparent), transparent 62%); filter:blur(34px); animation:auroraB 20s ease-in-out infinite; }
  body.no-wall #wallpaper-overlay{ background:radial-gradient(600px circle at 30% 20%, color-mix(in srgb,var(--accent) 10%,transparent), transparent 60%), radial-gradient(500px circle at 70% 80%, color-mix(in srgb,var(--accent) 7%,transparent), transparent 60%); }

  .topbar{ position:fixed; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:8px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
  .topbar .who{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar .acts{ display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .topbar button{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 10px; border-radius:8px; cursor:pointer; transition:all .15s ease; backdrop-filter:blur(10px); }
  .topbar button:hover, .topbar button:active{ color:var(--text); border-color:var(--accent); }
  .topbar button.admin{ color:#e0b05e; border-color:rgba(224,176,94,.4); }

  .wrap{ position:relative; z-index:5; min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:70px 18px 40px; }
  .card{ width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:20px; animation:rise .5s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }

  /* themes */
  .theme-glass .profilebox{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(var(--profile-blur,20px)); border-radius:24px; padding:32px 24px; }
  .theme-glass .link{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(10px); }
  .theme-neon .profilebox{ background:rgba(10,4,20,.5); border:1px solid var(--accent); border-radius:20px; padding:32px 24px; box-shadow:0 0 30px color-mix(in srgb,var(--accent) 40%,transparent), inset 0 0 20px color-mix(in srgb,var(--accent) 10%,transparent); }
  .theme-neon .name{ text-shadow:0 0 12px var(--accent); }
  .theme-neon .link{ background:rgba(10,4,20,.6); border:1px solid color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-neon .link:hover{ box-shadow:0 0 16px color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-minimal .profilebox{ background:rgba(20,22,27,.7); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:30px 24px; }
  .theme-minimal .link{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
  .theme-mono .profilebox{ background:rgba(8,10,8,.8); border:1px solid #2a3a2a; border-radius:8px; padding:28px 22px; font-family:'JetBrains Mono',monospace; }
  .theme-mono .name{ font-family:'JetBrains Mono',monospace; }
  .theme-mono .link{ background:rgba(12,16,12,.7); border:1px solid #2a3a2a; border-radius:6px; }
  .theme-sunset .profilebox{ background:linear-gradient(160deg, rgba(60,20,40,.55), rgba(20,15,40,.55)); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(var(--profile-blur,16px)); border-radius:26px; padding:32px 24px; }
  .theme-sunset .link{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); }
  .theme-aurora .profilebox{ background:linear-gradient(165deg, rgba(32,24,52,.58), rgba(13,10,22,.66)); border:1px solid color-mix(in srgb, var(--accent) 30%, rgba(255,255,255,.08)); backdrop-filter:blur(var(--profile-blur,22px)); border-radius:26px; padding:32px 24px; box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 24px 60px -20px rgba(0,0,0,.85), 0 0 70px -26px color-mix(in srgb,var(--accent) 70%, transparent); }
  .theme-aurora .name{ text-shadow:0 0 20px color-mix(in srgb,var(--accent) 45%,transparent); }
  .theme-aurora .link{ background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.09); }
  .theme-aurora .link:hover{ box-shadow:0 8px 22px -10px var(--accent); }
  .theme-aurora .avatar-ring{ background:conic-gradient(from 210deg, var(--accent), transparent 52%, color-mix(in srgb,#f0abfc 70%,transparent) 78%, var(--accent)); box-shadow:0 0 26px color-mix(in srgb,var(--accent) 30%,transparent); animation:auroraFloat 6s ease-in-out infinite; }
  #aurora-bg{ display:none; }
  body.theme-aurora #aurora-bg{ display:block; }
  @keyframes auroraFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
  @keyframes auroraA{ 0%,100%{ transform:translate(-8%,-6%) scale(1); } 50%{ transform:translate(6%,8%) scale(1.15); } }
  @keyframes auroraB{ 0%,100%{ transform:translate(6%,4%) scale(1.1); } 50%{ transform:translate(-6%,-8%) scale(1); } }
  @media (prefers-reduced-motion:reduce){ .theme-aurora .avatar-ring{ animation:none; } #aurora-bg *{ animation:none !important; } }
  .copy-link{ cursor:copy; }

  /* ================= Dashboard d'édition (façon guns.lol) ================= */
  .dash{ width:100%; max-width:1100px; margin:0 auto; animation:rise .4s ease; }
  .dash-layout{ display:flex; align-items:flex-start; min-height:70vh; }
  .dash-side{ width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:16px; padding:18px 14px;
    background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.08); border-right:none; border-radius:18px 0 0 18px; align-self:stretch; }
  .dash-logo{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; padding:2px 6px; }
  .dash-search input{ width:100%; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:9px; padding:8px 10px; color:var(--text-dim); font-size:12px; font-family:'Inter',sans-serif; }
  .dash-nav{ display:flex; flex-direction:column; gap:2px; }
  .dash-navbtn{ text-align:left; background:none; border:none; color:var(--text-dim); padding:9px 10px; border-radius:9px; cursor:pointer; font-size:13.5px; font-family:'Inter',sans-serif; transition:all .15s ease; }
  .dash-navbtn:hover{ background:rgba(255,255,255,.05); color:var(--text); }
  .dash-navbtn.active{ background:color-mix(in srgb,var(--accent) 18%,transparent); color:var(--text); font-weight:600; }
  .dash-side-bottom{ margin-top:auto; display:flex; flex-direction:column; gap:8px; }
  .dash-content{ flex:1; min-width:0; padding:22px 24px; background:rgba(14,15,19,.55); border-radius:0 18px 18px 0;
    border:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; gap:20px; }
  .dash-card{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:18px 20px; }
  .dash-card h3{ font-family:'Space Grotesk',sans-serif; font-size:14px; margin-bottom:14px; color:var(--text); }
  .dash-grid4{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .dash-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .dash-grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .dash-stat{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:16px 18px; display:flex; flex-direction:column; gap:6px; }
  .dash-stat .lbl{ font-size:11.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.4px; }
  .dash-stat .val{ font-size:20px; font-weight:700; font-family:'Space Grotesk',sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dash-check{ display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; background:rgba(94,201,143,.08); border:1px solid rgba(94,201,143,.25); font-size:13px; }
  .dash-check.off{ background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.1); color:var(--text-dim); }
  .media-box{ position:relative; aspect-ratio:16/10; border-radius:12px; border:1px dashed rgba(255,255,255,.15); background:rgba(0,0,0,.2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; overflow:hidden; }
  .media-box img,.media-box video{ width:100%; height:100%; object-fit:cover; }
  .media-box .mb-label{ position:absolute; top:8px; left:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); background:rgba(0,0,0,.5); padding:2px 8px; border-radius:999px; }
  .media-box .mb-empty{ font-size:11px; color:var(--text-dim); text-align:center; padding:0 10px; }
  .togglesw{ position:relative; width:40px; height:22px; border-radius:999px; background:rgba(255,255,255,.14); cursor:pointer; flex-shrink:0; transition:background .15s ease; }
  .togglesw.on{ background:var(--accent); }
  .togglesw::after{ content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .15s ease; }
  .togglesw.on::after{ transform:translateX(18px); }
  .tglrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .tglrow:last-child{ border-bottom:none; }
  .tglrow .tglabel{ font-size:13px; }
  .linkgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(46px,1fr)); gap:10px; }
  .linkgrid .gi{ aspect-ratio:1; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s ease; }
  .linkgrid .gi:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .linkgrid .gi .ico{ width:19px; height:19px; }
  .linkcards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  .linkcard{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
  .linkcard .lchead{ display:flex; align-items:center; justify-content:space-between; font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.4px; }
  .linkcard .lchead .plat{ display:flex; align-items:center; gap:6px; }
  .linkcard .lchead .ico{ width:14px; height:14px; }
  .linkcard .lcacts{ display:flex; gap:2px; }
  .linkcard .lcacts button{ background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:13px; padding:2px 5px; border-radius:5px; }
  .linkcard .lcacts button:hover{ color:var(--accent); background:rgba(255,255,255,.06); }
  .linkcard input{ background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:8px; padding:8px 10px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif; width:100%; }
  .hexrow{ display:flex; align-items:center; gap:8px; }
  .hexrow .swdot{ width:20px; height:20px; border-radius:50%; flex-shrink:0; border:1px solid rgba(255,255,255,.2); }
  @media (max-width:820px){
    .dash-layout{ flex-direction:column; }
    .dash-side{ width:100%; border-radius:18px 18px 0 0; border-right:1px solid rgba(255,255,255,.08); border-bottom:none; flex-direction:row; flex-wrap:wrap; align-items:center; }
    .dash-nav{ flex-direction:row; flex-wrap:wrap; }
    .dash-side-bottom{ margin-top:0; flex-direction:row; flex-wrap:wrap; }
    .dash-content{ border-radius:0 0 18px 18px; }
    .dash-grid4{ grid-template-columns:repeat(2,1fr); }
    .dash-grid2,.dash-grid3{ grid-template-columns:1fr; }
  }
  /* bouton like (cœur) */
  .likebtn{ display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:999px; cursor:pointer;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:12px; transition:all .15s ease; }
  .likebtn svg{ width:16px; height:16px; transition:transform .2s cubic-bezier(.2,.8,.2,1); }
  .likebtn:hover{ border-color:#ff5e8a; color:#ff9db6; }
  .likebtn.liked{ border-color:#ff2d6f; color:#ff5e8a; background:rgba(255,45,111,.12); }
  .likebtn.liked svg{ fill:#ff2d6f; transform:scale(1.15); }
  @keyframes likepop{ 0%{transform:scale(1);} 40%{transform:scale(1.4);} 100%{transform:scale(1.15);} }
  .likebtn.pop svg{ animation:likepop .35s ease; }

  .profilebox{ width:100%; display:flex; flex-direction:column; align-items:center; gap:16px; opacity:var(--op-card); backdrop-filter:blur(var(--profile-blur)); }
  .avatar{ width:96px; height:96px; border-radius:50%; background:linear-gradient(160deg, color-mix(in srgb,var(--accent) 30%,#1a1d22), #0f1113); border:2px solid color-mix(in srgb,var(--accent) 40%,transparent); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:600; color:var(--text); overflow:hidden; opacity:var(--op-avatar); }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  .identity{ text-align:center; display:flex; flex-direction:column; gap:8px; align-items:center; opacity:var(--op-text); }
  .name{ font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; letter-spacing:-.3px; position:relative; cursor:default; }
  .badge-admin{ font-size:11px; color:#e0b05e; font-family:'JetBrains Mono',monospace; border:1px solid rgba(224,176,94,.4); padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle; }
  .badge-demo{ font-size:11px; color:#b57edc; font-family:'JetBrains Mono',monospace; border:1px dashed rgba(181,126,220,.5); padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle; text-transform:uppercase; letter-spacing:.5px; }
  .tag{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,transparent); border:1px solid color-mix(in srgb,var(--accent) 25%,transparent); padding:4px 12px; border-radius:999px; }
  .bio{ font-size:13.5px; color:var(--text-dim); max-width:320px; line-height:1.55; }
  .customtext{ font-size:14px; color:var(--text); max-width:320px; line-height:1.6; white-space:pre-wrap; opacity:var(--op-text); text-align:center; }

  .links{ width:100%; display:flex; flex-direction:column; gap:10px; margin-top:2px; opacity:var(--op-links); }
  .link{ display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:12px; color:var(--text); text-decoration:none; font-size:14px; font-weight:500; transition:transform .15s ease, border-color .15s ease; }
  .link:hover, .link:active{ transform:translateY(-2px); border-color:var(--accent); }
  .link .ico{ width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .link .ico svg{ width:100%; height:100%; }
  .link .lbl{ display:flex; flex-direction:column; gap:1px; overflow:hidden; }
  .link .plat{ font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.5px; }
  .link .txt{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .link .arrow{ margin-left:auto; color:var(--text-dim); font-size:16px; }

  .sharebtn{ margin-top:4px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); background:none; border:1px dashed rgba(255,255,255,.15); padding:8px 14px; border-radius:8px; cursor:pointer; transition:all .15s ease; }
  .sharebtn:hover{ color:var(--accent); border-color:var(--accent); }
  footer{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#565a63; text-align:center; }

  .panel{ width:100%; max-width:400px; background:rgba(20,22,27,.9); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(20px); border-radius:20px; padding:26px; display:flex; flex-direction:column; gap:16px; animation:rise .4s ease; }
  .panel h2{ font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; }
  .panel h3{ font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:var(--text-dim); margin-top:4px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
  .field input, .field textarea{ background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.12); border-radius:10px; color:var(--text); padding:12px 14px; font-size:15px; font-family:'Inter',sans-serif; outline:none; width:100%; transition:border-color .15s ease; }
  .field input:focus, .field textarea:focus{ border-color:var(--accent); }
  .field textarea{ resize:vertical; min-height:64px; }
  .row{ display:flex; gap:8px; } .row>*{ flex:1; }

  .btn{ background:var(--accent); color:#0a0d0a; border:none; border-radius:10px; padding:13px 16px; font-size:15px; font-weight:600; cursor:pointer; transition:opacity .15s ease, transform .1s ease; font-family:'Inter',sans-serif; }
  .btn:hover{ opacity:.9; } .btn:active{ transform:scale(.98); }
  .btn.ghost{ background:transparent; border:1px solid rgba(255,255,255,.15); color:var(--text); }
  .btn.ghost:hover{ border-color:var(--accent); }
  .btn.danger{ background:transparent; border:1px solid #c96a5e; color:#c96a5e; }
  .btn.danger:hover{ background:rgba(201,106,94,.1); }
  .btn.small{ padding:8px 12px; font-size:12px; border-radius:8px; }

  .tabs{ display:flex; gap:6px; }
  .tabs button{ flex:1; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); padding:10px; border-radius:10px; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; font-weight:500; }
  .tabs button.active{ background:var(--accent); color:#0a0d0a; border-color:transparent; font-weight:600; }

  .error{ color:#e08a7e; font-size:12.5px; font-family:'JetBrains Mono',monospace; line-height:1.4; }
  .hint{ color:var(--text-dim); font-size:11.5px; line-height:1.5; }

  .chooser{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ display:flex; align-items:center; gap:7px; padding:8px 12px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.12); border-radius:10px; cursor:pointer; font-size:13px; transition:all .15s ease; }
  .chip:hover{ border-color:var(--accent); }
  .chip .ico{ width:18px; height:18px; } .chip .ico svg{ width:100%; height:100%; }

  .swatches{ display:flex; gap:8px; flex-wrap:wrap; }
  .swatch{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s ease; }
  .swatch:hover{ transform:scale(1.1); } .swatch.active{ border-color:var(--text); }

  .themegrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
  .themecell{ padding:14px 8px; border-radius:12px; text-align:center; cursor:pointer; font-size:12px; font-weight:600; border:2px solid transparent; transition:all .15s ease; }
  .themecell.active{ border-color:var(--text); }

  .slider{ display:flex; flex-direction:column; gap:4px; }
  .slider .lbl{ display:flex; justify-content:space-between; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }
  .slider input[type=range]{ width:100%; accent-color:var(--accent); }

  .linkeditor{ display:flex; flex-direction:column; gap:8px; }
  .linkrow{ display:flex; gap:6px; align-items:center; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:8px; }
  .linkrow .plat-ico{ width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

  .adminrow{ display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:10px; }

  .adminrow .aact button:hover{ border-color:var(--accent); color:var(--text); }
  .adminrow .aact button.d{ border-color:rgba(201,106,94,.4); color:#c96a5e; }

  .loading{ color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:13px; }
  @media (max-width:420px){ .card, .panel, .directory{ max-width:100%; } .name{ font-size:24px; } .topbar button{ padding:6px 8px; font-size:10px; } }

  /* guns.lol-style effects */
  #splash{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:rgba(8,9,12,.92); backdrop-filter:blur(8px); cursor:pointer; transition:opacity .6s ease; }
  #splash.hide{ opacity:0; pointer-events:none; }
  #splash .stitle{ font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:700; letter-spacing:1px; color:var(--text); }
  #splash .ssub{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink{ 0%,100%{opacity:.4;} 50%{opacity:1;} }
  #particles{ position:fixed; inset:0; z-index:2; pointer-events:none; }
  .views{ display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
  .tw-cursor{ display:inline-block; width:2px; height:1em; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:blink .9s step-end infinite; }
  /* lecteur vinyle */
  .vinyl-player{ display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; margin:2px 0; }
  .vinyl-disc-wrap{ position:relative; width:150px; height:150px; }
  .vinyl-disc{ width:100%; height:100%; border-radius:50%; overflow:hidden; position:relative; box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 0 6px rgba(0,0,0,.35), 0 0 0 7px rgba(255,255,255,.06); background:radial-gradient(circle at center, #161616 0 17%, #050505 17% 19%, #1c1c1c 19% 100%); animation:vinylspin 6s linear infinite; animation-play-state:paused; }
  .vinyl-disc.spinning{ animation-play-state:running; }
  .vinyl-disc img{ width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
  .vinyl-disc::after{ content:''; position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.18), transparent 55%); pointer-events:none; }
  @keyframes vinylspin{ to{ transform:rotate(360deg); } }
  @media (prefers-reduced-motion:reduce){ .vinyl-disc{ animation:none; } }
  .vinyl-hole{ position:absolute; top:50%; left:50%; width:13px; height:13px; background:var(--bg); border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 0 2px rgba(255,255,255,.15); z-index:2; }
  .vinyl-playbtn{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:rgba(10,10,12,.78); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; z-index:5; transition:transform .15s ease, background .15s ease; }
  .vinyl-playbtn:hover{ transform:translate(-50%,-50%) scale(1.08); background:rgba(10,10,12,.92); }
  .vinyl-playbtn svg{ width:20px; height:20px; }
  .vinyl-meta{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .vinyl-title{ font-size:12.5px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .vinyl-progress{ width:170px; height:3px; border-radius:999px; background:rgba(255,255,255,.12); overflow:hidden; }
  .vinyl-progress-bar{ height:100%; width:0%; background:var(--accent); transition:width .2s linear; }
  .vinyl-hint{ font-size:10.5px; color:var(--accent); font-family:'JetBrains Mono',monospace; opacity:.9; cursor:pointer; animation:blink 1.4s ease-in-out infinite; }

  /* social icons inline (guns.lol style) */
  .social-inline{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:2px 0; opacity:var(--op-links); }
  .social-inline a{ width:26px; height:26px; color:var(--text-dim); transition:transform .15s ease, color .15s ease, filter .15s ease; }
  .social-inline a:hover{ transform:translateY(-3px) scale(1.15); }
  .social-inline a svg{ width:100%; height:100%; }
  /* badges */
  .badges{ display:inline-flex; gap:5px; margin-left:7px; vertical-align:middle; }
  .badge{ display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; }
  .badge svg{ width:100%; height:100%; }
  .badge.verified{ color:#4a9eff; } .badge.founder{ color:#e0b05e; } .badge.staff{ color:#e05e9e; } .badge.og{ color:#5ec9b8; } .badge.premium{ color:#b57edc; }
  /* tilt */
  .tiltwrap{ perspective:900px; width:100%; display:flex; justify-content:center; }
  .profilebox{ transition:transform .12s ease; transform-style:preserve-3d; }
  /* discord presence */
  .discord-card{ display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; background:rgba(88,101,242,.12); border:1px solid rgba(88,101,242,.3); width:100%; }
  .discord-card .dav{ width:38px; height:38px; border-radius:50%; position:relative; flex-shrink:0; }
  .discord-card .dav img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .discord-card .dstatus{ position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid #16181d; }
  .dstatus.online{ background:#3ba55d; } .dstatus.idle{ background:#faa81a; } .dstatus.dnd{ background:#ed4245; } .dstatus.offline{ background:#747f8d; }
  .discord-card .dinfo{ overflow:hidden; } .discord-card .dname{ font-size:13px; font-weight:600; } .discord-card .dact{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* live preview badge in editor */
  .previewtag{ position:fixed; top:52px; left:50%; transform:translateX(-50%); z-index:15; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); background:rgba(0,0,0,.5); border:1px solid var(--accent); padding:3px 10px; border-radius:999px; backdrop-filter:blur(6px); }

  /* === HUD futuriste === */
  .badge{ position:relative; }
  .badge::after{ content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) translateY(4px); background:rgba(10,12,16,.95); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; padding:5px 9px; border-radius:7px; white-space:nowrap; opacity:0; pointer-events:none; transition:all .18s cubic-bezier(.2,.8,.2,1); border:1px solid rgba(255,255,255,.15); box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:30; }
  .badge::before{ content:''; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:rgba(10,12,16,.95); opacity:0; transition:opacity .18s ease; }
  .badge:hover::after{ opacity:1; transform:translateX(-50%) translateY(0); }
  .badge:hover::before{ opacity:1; }
  .badge:hover{ filter:drop-shadow(0 0 6px currentColor); transform:scale(1.15); }
  .badge{ transition:transform .15s ease, filter .15s ease; }
  .rarity-legendary{ animation:shimmer 2.5s linear infinite; }
  @keyframes shimmer{ 0%,100%{filter:drop-shadow(0 0 2px currentColor);} 50%{filter:drop-shadow(0 0 8px currentColor);} }

  /* modal */
  .modal-bg{ position:fixed; inset:0; z-index:200; background:rgba(6,7,10,.75); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadein .2s ease; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }
  .modal{ width:100%; max-width:440px; max-height:85vh; overflow-y:auto; background:linear-gradient(160deg, rgba(24,27,34,.98), rgba(16,18,24,.98)); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); animation:rise .3s ease; }
  .modal h2{ font-family:'Space Grotesk',sans-serif; font-size:19px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .modal .close{ margin-left:auto; cursor:pointer; color:var(--text-dim); background:none; border:none; font-size:22px; }

  /* toast */
  #toastWrap{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .toast{ background:rgba(20,24,30,.96); border:1px solid var(--accent); color:var(--text); padding:11px 18px; border-radius:10px; font-size:13px; font-family:'Inter',sans-serif; box-shadow:0 6px 24px rgba(0,0,0,.5); animation:toastin .3s ease; backdrop-filter:blur(10px); max-width:90vw; }
  .toast.err{ border-color:#e05e5e; } .toast.ok{ border-color:#5ec98f; }
  @keyframes toastin{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  /* role chip */
  .rolechip{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 7px; border-radius:5px; text-transform:uppercase; letter-spacing:.5px; }
  .role-user{ color:var(--text-dim); border:1px solid rgba(255,255,255,.15); }
  .role-staff{ color:#e05e9e; border:1px solid rgba(224,94,158,.4); }
  .role-admin{ color:#e0b05e; border:1px solid rgba(224,176,94,.4); }
  .role-superadmin{ color:#4a9eff; border:1px solid rgba(74,158,255,.5); box-shadow:0 0 8px rgba(74,158,255,.2); }

  /* admin subtabs */
  .subtabs{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
  .subtabs button{ background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-family:'JetBrains Mono',monospace; }
  .subtabs button.active{ background:var(--accent); color:#0a0d0a; border-color:transparent; }
  .logrow{ font-family:'JetBrains Mono',monospace; font-size:11px; padding:8px 10px; background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.06); border-radius:8px; line-height:1.5; }
  .logrow .la{ color:var(--accent); } .logrow .lt{ color:var(--text-dim); }

  /* ============================================================
     HUD v2 — carte profil premium (avatar + badges + UID séparés)
     ============================================================ */
  .avatar-wrap{ position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .avatar-ring{ position:relative; width:104px; height:104px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:conic-gradient(from 180deg, color-mix(in srgb,var(--accent) 65%,transparent), transparent 55%, color-mix(in srgb,var(--accent) 45%,transparent));
    box-shadow:0 0 24px color-mix(in srgb,var(--accent) 22%,transparent); }
  .avatar-ring::before{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--bg); z-index:0; }
  .avatar-wrap .avatar{ position:relative; z-index:1; width:96px; height:96px; margin:0; border:none;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), 0 10px 30px rgba(0,0,0,.45); }
  /* badges = ligne dédiée, pills icône + NOM toujours lisible, jamais recouvert par l'avatar */
  .badge-strip{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; max-width:330px; margin:2px auto 0; }
  .badge-pill{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px 5px 9px; border-radius:999px;
    background:rgba(255,255,255,.05); border:1px solid color-mix(in srgb,currentColor 30%,rgba(255,255,255,.12));
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; cursor:default;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
  .badge-pill:hover{ transform:translateY(-2px); border-color:currentColor; box-shadow:0 5px 16px color-mix(in srgb,currentColor 28%,transparent); }
  .badge-pill .bico{ width:15px; height:15px; display:flex; flex-shrink:0; }
  .badge-pill .bico svg{ width:100%; height:100%; }
  .badge-pill .bname{ color:var(--text); white-space:nowrap; }
  .badge-pill.rarity-legendary{ animation:shimmer 2.5s linear infinite; }
  @media (max-width:420px){ .badge-strip{ max-width:90vw; } }
  /* n'affiche l'ancienne infobulle .badge que si data-tip présent (évite les boîtes vides en admin) */
  .badge:not([data-tip])::after, .badge:not([data-tip])::before{ display:none; }

  .name-row{ display:flex; align-items:center; gap:8px; justify-content:center; flex-wrap:wrap; }
  .name-row .name{ font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; letter-spacing:-.3px; }
  .id-row{ display:flex; align-items:center; gap:8px; justify-content:center; flex-wrap:wrap; }
  .uid-chip{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); padding:3px 10px; border-radius:999px; letter-spacing:.5px; cursor:pointer; transition:all .15s ease; }
  .uid-chip:hover{ color:var(--text); border-color:var(--accent); }
  .stat-row{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:2px; }
  .stat-pill{ display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
    background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.08); padding:5px 11px; border-radius:999px; }
  .stat-pill b{ color:var(--text); font-weight:600; }

  /* boutons premium */
  .btn{ position:relative; box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 22%,transparent); }
  .btn:hover{ box-shadow:0 6px 22px color-mix(in srgb,var(--accent) 32%,transparent); }
  .btn.ghost, .btn.danger{ box-shadow:none; }
  .btn-discord{ display:flex; align-items:center; justify-content:center; gap:9px; width:100%; background:#5865F2; color:#fff; border:none;
    border-radius:10px; padding:12px 16px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
    box-shadow:0 4px 16px rgba(88,101,242,.35); transition:transform .1s ease, box-shadow .15s ease; }
  .btn-discord:hover{ box-shadow:0 6px 22px rgba(88,101,242,.5); } .btn-discord:active{ transform:scale(.98); }
  .btn-discord svg{ width:20px; height:20px; }

  /* loader propre */
  .loader-dots{ display:inline-flex; gap:5px; align-items:center; }
  .loader-dots i{ width:7px; height:7px; border-radius:50%; background:var(--accent); animation:ld 1s ease-in-out infinite; }
  .loader-dots i:nth-child(2){ animation-delay:.15s; } .loader-dots i:nth-child(3){ animation-delay:.3s; }
  @keyframes ld{ 0%,100%{opacity:.25; transform:translateY(0);} 50%{opacity:1; transform:translateY(-4px);} }
  @media (prefers-reduced-motion:reduce){ .loader-dots i{ animation:none; opacity:.6; } }
  /* ===== xvy features ===== */
  .ach-strip{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
  .ach-pill{ font-size:15px; cursor:default; filter:grayscale(0); transition:transform .15s; }
  .ach-pill:hover{ transform:scale(1.25); }
  .xvy-block{ width:100%; text-align:left; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px; }
  .xvy-block h4{ font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
  .gb-item{ padding:8px 10px; border-radius:10px; background:rgba(255,255,255,.04); margin-bottom:6px; }
  .gb-item .gb-head{ display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-bottom:3px; }
  .gb-item .gb-msg{ font-size:13px; word-break:break-word; }
  .gb-del{ cursor:pointer; opacity:.6; } .gb-del:hover{ opacity:1; color:#e08a7e; }
  .gb-form{ display:flex; gap:6px; margin-top:8px; }
  .gb-form input{ flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:9px 11px; color:var(--text); font-size:13px; outline:none; }
  .gb-form input:focus{ border-color:var(--accent); }
  .poll-opt{ display:block; width:100%; text-align:left; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:9px 12px; color:var(--text); font-size:13px; cursor:pointer; margin-bottom:6px; position:relative; overflow:hidden; }
  .poll-opt:hover{ border-color:var(--accent); }
  .poll-opt .fillbar{ position:absolute; inset:0; background:var(--accent); opacity:.18; transform-origin:left; }
  .poll-opt .row-in{ position:relative; display:flex; justify-content:space-between; }
  .game-btns{ display:flex; gap:8px; flex-wrap:wrap; }
  .game-btn{ flex:1; min-width:110px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:10px; color:var(--text); cursor:pointer; font-size:13px; transition:all .15s; }
  .game-btn:hover{ border-color:var(--accent); transform:translateY(-1px); }
  .lb-row{ display:flex; justify-content:space-between; font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); padding:3px 2px; }
  .lb-row b{ color:var(--text); font-weight:500; }
  .lb-row.me{ color:var(--accent); }
  .game-arena{ height:210px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; cursor:pointer; user-select:none; font-size:15px; text-align:center; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); transition:background .1s; }
  .game-arena.wait{ background:rgba(224,110,94,.25); } .game-arena.go{ background:rgba(94,201,143,.3); }
  .game-arena .big{ font-size:34px; font-weight:700; font-family:'Space Grotesk',sans-serif; }
  .secret-box{ text-align:center; }
  .secret-box input{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:9px 11px; color:var(--text); font-size:13px; outline:none; text-align:center; }
  .statbar-wrap{ display:flex; align-items:flex-end; gap:3px; height:90px; margin:8px 0 2px; }
  .statbar{ flex:1; background:var(--accent); opacity:.75; border-radius:3px 3px 0 0; min-height:2px; position:relative; }
  .statbar:hover{ opacity:1; }
  .statbar .tip{ position:absolute; bottom:100%; left:50%; transform:translateX(-50%); font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); white-space:nowrap; margin-bottom:2px; }
  .statbar-labels{ display:flex; gap:3px; } .statbar-labels span{ flex:1; text-align:center; font-size:8px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
  .presence-live{ animation:pulseLive 2s ease-in-out infinite; }
  @keyframes pulseLive{ 0%,100%{opacity:1;} 50%{opacity:.55;} }

  /* ===== design system avancé (variables gated par classes sx-* : rien ne change tant que l'user ne personnalise pas) ===== */
  body.sx-font .profilebox{ font-family:var(--font-body, 'Inter', sans-serif); }
  body.sx-font .profilebox .name, body.sx-font .profilebox .dname{ font-family:var(--font-heading, 'Space Grotesk', sans-serif); }
  body.sx-fscale .profilebox .name{ font-size:calc(28px * var(--font-scale,1)); }
  body.sx-fscale .profilebox .bio{ font-size:calc(14px * var(--font-scale,1)); }
  body.sx-fscale .profilebox .link .txt{ font-size:calc(13px * var(--font-scale,1)); }
  body.sx-fweight .profilebox{ font-weight:var(--font-weight,400); }

// contraste WCAG (accent vs fond sombre) pour recommandation
function contrastRatio(hex){
  const c=hex.replace('#',''); if(c.length!==6) return 0;
  const rgb=[0,2,4].map(i=>parseInt(c.substr(i,2),16)/255).map(v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4));
  const L=0.2126*rgb[0]+0.7152*rgb[1]+0.0722*rgb[2];
  return (L+0.05)/(0.05); // vs noir pur (approx du fond sombre)
}

async function uploadBgVideo(file,uid){

// ===== disponibilité pseudo / uid (correction du faux "déjà pris") =====
// Comparaison en JS insensible à la casse, sans ilike (donc aucun faux positif
// dû aux jokers %/_ dans un pseudo) et en excluant TOUJOURS le compte courant.
async function isUsernameAvailable(name, excludeUid){
  const target=(name||'').trim().toLowerCase();
  if(!target) return false;
  const r=await pgFetch('/profiles?select=uid,username');
  return !(r||[]).some(row=>row.username.toLowerCase()===target && row.uid!==excludeUid);
}
async function isUidAvailable(uid, excludeUid){
  const n=parseInt(uid,10); if(!n||n<1) return false;
  // pas de filtre deleted_at : un uid tenu par un compte en corbeille reste pris.
  const r=await pgFetch('/profiles?uid=eq.'+n+'&select=uid');
  return !(r||[]).some(row=>row.uid!==excludeUid);
}
async function createAccount(u,p){
  const uname=(u||'').trim();
  if(uname.length<2) return {ok:false,error:'Pseudo trop court (2 caractères min).'};
  if(!(await isUsernameAvailable(uname,null))) return {ok:false,error:'Ce pseudo est déjà pris.'};
  const hash=await sha256(p);
  try{
    const r=await pgFetch('/profiles',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({username:uname,password_hash:hash,tag:'@'+uname.toLowerCase(),bio:'Nouveau membre.',accent:ACCENTS[0],links:[],wallpaper:'',theme:'glass',avatar:'',custom_text:'',opacity:DEFAULT_OP,music:'',effects:DEFAULT_EFFECTS,badges:[],cursor_url:'',discord_id:''})});
    return {ok:true,profile:mapRow(r[0])};
  }catch(e){ return {ok:false,error:'Ce pseudo est déjà pris.'}; }
}
async function login(u,p){
  const uname=(u||'').trim().toLowerCase();
  if(!uname) return {ok:false,error:'Compte introuvable.'};
  const all=await pgFetch('/profiles?select=*');
  const row=(all||[]).find(x=>x.username.toLowerCase()===uname);
  if(!row) return {ok:false,error:'Compte introuvable.'};
  if(row.banned) return {ok:false,error:'Ce compte est banni.'};
  if(row.deleted_at) return {ok:false,error:'Ce compte n\'existe plus.'};
  if(await sha256(p)!==row.password_hash) return {ok:false,error:'Mot de passe incorrect.'};
  return {ok:true,profile:mapRow(row)};
}

const SESSION_KEY='xdez_session_v1';
function saveSession(p){ try{ localStorage.setItem(SESSION_KEY,JSON.stringify({uid:p.uid,hash:p.hash})); }catch(e){} }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }
async function restoreSession(){
  let raw; try{ raw=localStorage.getItem(SESSION_KEY); }catch(e){ return null; }
  if(!raw) return null;
  let s; try{ s=JSON.parse(raw); }catch(e){ clearSession(); return null; }
  if(!s||!s.uid){ clearSession(); return null; }
  try{
    const p=await getProfile(s.uid);
    // session invalide si le compte a disparu, est banni, supprimé, ou si le hash a changé
    if(!p || p.banned || p.deletedAt || p.hash!==s.hash){ clearSession(); return null; }
    return p;
  }catch(e){ return null; } // souci réseau : on ne restaure pas mais on ne casse pas non plus
}

function tr(s){ if(LANG!=='en'||s==null) return s; const k=(''+s).trim(); const e=I18N[k]; return e!==undefined?(''+s).replace(k,e):s; }
function applyLang(root){
  if(LANG!=='en') return;
  root=root||document.body;
  try{
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
    const arr=[]; let n; while(n=w.nextNode()) arr.push(n);
    arr.forEach(node=>{ const raw=node.nodeValue; if(!raw) return; const k=raw.trim(); if(!k) return; const e=I18N[k]; if(e!==undefined && e!==k) node.nodeValue=raw.replace(k,e); });
    root.querySelectorAll('[placeholder]').forEach(el=>{ const k=(el.getAttribute('placeholder')||'').trim(); if(I18N[k]!==undefined) el.setAttribute('placeholder',I18N[k]); });
    root.querySelectorAll('[title]').forEach(el=>{ const k=(el.getAttribute('title')||'').trim(); if(I18N[k]!==undefined) el.setAttribute('title',I18N[k]); });
  }catch(e){}
}
function toggleLang(){ LANG=(LANG==='en'?'fr':'en'); try{ localStorage.setItem('xvy_lang',LANG); }catch(e){} if(typeof render==='function') render(); }
function openModal(title, bodyHtml, onReady){
  closeModal();
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML=`<div class="modal"><h2>${title}<button class="close" id="modalClose">×</button></h2><div id="modalBody">${bodyHtml}</div></div>`;
  bg.onclick=(e)=>{ if(e.target===bg) closeModal(); };
  document.body.appendChild(bg);
  document.getElementById('modalClose').onclick=closeModal;
  if(onReady) onReady(document.getElementById('modalBody'));
}
function confirmModal(msg, onYes){
  openModal('Confirmation', `<p class="hint" style="font-size:13px;margin-bottom:16px;">${msg}</p><div class="row"><button class="btn danger" id="cfYes">Confirmer</button><button class="btn ghost" id="cfNo">Annuler</button></div>`, (body)=>{
    body.querySelector('#cfYes').onclick=()=>{ closeModal(); onYes(); };
    body.querySelector('#cfNo').onclick=closeModal;
  });
}
function getUrlUid(){ const u=new URLSearchParams(location.search).get('uid'); return u?parseInt(u,10):null; }
function normalizeUrl(platform,val){
  val=(val||'').trim(); if(!val) return '';
  if(/^https?:\/\//i.test(val)) return val;
  const maps={twitch:'https://twitch.tv/',youtube:'https://youtube.com/',tiktok:'https://tiktok.com/@',instagram:'https://instagram.com/',twitter:'https://x.com/',kick:'https://kick.com/',github:'https://github.com/',telegram:'https://t.me/',spotify:'https://open.spotify.com/',steam:'https://steamcommunity.com/id/'};
  const clean=val.replace(/^@/,'');
  if(platform==='discord') return val.startsWith('discord')?('https://'+val):('https://discord.gg/'+clean);
  return (maps[platform]||'https://')+clean;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function applyVisual(p){
  const r=document.documentElement;
  r.style.setProperty('--accent',p.accent||'#8fb39d');
  const o=p.opacity||DEFAULT_OP;
  r.style.setProperty('--op-card',(o.card??100)/100);
  r.style.setProperty('--op-links',(o.links??100)/100);
  r.style.setProperty('--op-avatar',(o.avatar??100)/100);
  r.style.setProperty('--op-text',(o.text??100)/100);
  r.style.setProperty('--op-wall',(o.wallpaper??100)/100);
  r.style.setProperty('--op-overlay',(o.overlay??DEFAULT_OP.overlay)/100);
  r.style.setProperty('--profile-blur',(o.blur??DEFAULT_OP.blur)+'px');
  applyBackground(p);
  const bgType=(p.effects&&p.effects.bgType)||'image';
  const hasBg=bgType==='video'?!!(p.effects&&p.effects.bgVideo):!!p.wallpaper;
  document.body.className='theme-'+(p.theme||'glass')+(hasBg?'':' no-wall');
  applyStyle(p);
}
// applique les design tokens avancés : pose des variables CSS + active les classes sx-* correspondantes.
// Chaque token n'agit QUE si l'utilisateur l'a explicitement réglé (sinon le thème garde son rendu d'origine).
function applyStyle(p){
  const s={...DEFAULT_STYLE,...(p&&p.style||{})};
  const r=document.documentElement, b=document.body, cl=b.classList;
  const on=(name,cond)=>cl.toggle(name,!!cond);
  // polices
  const hasFont=!!(s.fontHeading||s.fontBody);
  if(s.fontHeading) ensureFont(s.fontHeading); if(s.fontBody) ensureFont(s.fontBody);
  if(s.fontHeading) r.style.setProperty('--font-heading',fontStack(s.fontHeading));
  if(s.fontBody) r.style.setProperty('--font-body',fontStack(s.fontBody));
  on('sx-font',hasFont);
  on('sx-fscale', s.fontScale && s.fontScale!==100); r.style.setProperty('--font-scale',(s.fontScale||100)/100);
  on('sx-fweight', !!s.fontWeight); if(s.fontWeight) r.style.setProperty('--font-weight',s.fontWeight);
  on('sx-lspace', !!s.letterSpacing); r.style.setProperty('--letter-spacing',(s.letterSpacing||0)+'px');
  on('sx-lheight', !!s.lineHeight); if(s.lineHeight) r.style.setProperty('--line-height',(s.lineHeight/100));
  // formes
  on('sx-radius', s.radius>=0); if(s.radius>=0) r.style.setProperty('--radius',s.radius+'px');
  on('sx-border', s.borderWidth>=0); if(s.borderWidth>=0) r.style.setProperty('--border-w',s.borderWidth+'px');
  on('sx-shadow', s.shadow>=0); if(s.shadow>=0) r.style.setProperty('--shadow-i',(s.shadow/100*0.95).toFixed(3));
  // layout
  on('sx-width', s.contentWidth>=320); if(s.contentWidth>=320) r.style.setProperty('--content-w',s.contentWidth+'px');
  on('sx-tight', s.density<0); on('sx-airy', s.density>0);
  on('sx-left', s.align==='left');
  // ambiance
  on('sx-glow', s.glow>0); r.style.setProperty('--glow',((s.glow||0)/100).toFixed(2));
  cl.remove('sx-anim-float','sx-anim-breathe','sx-anim-pop'); if(s.cardAnim&&s.cardAnim!=='none'&&!s.safeMode) cl.add('sx-anim-'+s.cardAnim);
  on('sx-grain', s.grain && !s.safeMode);
  on('sx-vignette', s.vignette);
  on('sx-safe', !!s.safeMode);
  // fond dégradé (uniquement si pas d'image/vidéo)
  const bgType=(p&&p.effects&&p.effects.bgType)||'image';
  const hasMedia=bgType==='video'?!!(p&&p.effects&&p.effects.bgVideo):!!(p&&p.wallpaper);
  const useGrad=!!s.gradient && !hasMedia;
  on('sx-gradient', useGrad);
  const gEl=document.getElementById('sx-gradient'); if(gEl) gEl.style.background=useGrad?s.gradient:'';
  if(useGrad) cl.remove('no-wall');
  // teinte d'overlay
  on('sx-tint', !!s.overlayTint);
  if(s.overlayTint) r.style.setProperty('--overlay-tint',s.overlayTint);
  // intensité d'animation → pilote la densité des particules (lu par startParticles)
  window.__animIntensity=s.safeMode?0:((s.animIntensity==null?100:s.animIntensity)/100);
}
function resetStyleClasses(){
  const cl=document.body.classList;
  [...cl].filter(c=>c.indexOf('sx-')===0).forEach(c=>cl.remove(c));
}
function resetVisual(){
  const r=document.documentElement;
  ['card','links','avatar','text','wall'].forEach(k=>r.style.setProperty('--op-'+k,1));
  r.style.setProperty('--op-overlay',1);
  r.style.setProperty('--profile-blur','20px');
  r.style.setProperty('--accent','#8fb39d');
  applyWallpaper('');
  const v=document.getElementById('wallpaperVideo');
  if(v){ v.pause(); v.classList.remove('active'); v.removeAttribute('src'); v.dataset.src=''; }
  document.body.className='theme-glass no-wall';
}
function applyWallpaper(url){
  const w=document.getElementById('wallpaper');
  if(url){ w.style.backgroundImage='url("'+url+'")'; w.classList.add('active'); document.body.classList.remove('no-wall'); }
  else{ w.classList.remove('active'); w.style.backgroundImage=''; document.body.classList.add('no-wall'); }
}
// fond image OU vidéo : la vidéo est toujours muette/loop/playsinline ; l'image sert d'affiche
// de secours si la vidéo ne charge pas ou si l'autoplay est bloqué (ex: certains navigateurs mobiles).
function applyBackground(p){
  const type=(p.effects&&p.effects.bgType)||'image';
  const videoUrl=(p.effects&&p.effects.bgVideo)||'';
  const posterUrl=p.wallpaper||'';
  const v=document.getElementById('wallpaperVideo');
  if(type==='video' && videoUrl){
    applyWallpaper('');
    if(posterUrl) v.poster=posterUrl; else v.removeAttribute('poster');
    if(v.dataset.src!==videoUrl){ v.dataset.src=videoUrl; v.src=videoUrl; v.load(); }
    v.muted=true;
    v.classList.add('active');
    document.body.classList.remove('no-wall');
    v.onerror=()=>{
      v.classList.remove('active');
      if(posterUrl){ applyWallpaper(posterUrl); } else { document.body.classList.add('no-wall'); }
    };
    const pr=v.play();
    if(pr && typeof pr.catch==='function') pr.catch(()=>{ /* autoplay bloqué : le poster reste affiché, pas d'erreur visible */ });
  } else {
    v.classList.remove('active'); v.pause(); v.removeAttribute('src'); v.dataset.src='';
    applyWallpaper(p.wallpaper);
  }
}

function renderTopbar(){
  const info=document.getElementById('sessionInfo'),acts=document.getElementById('topbarActions');
  info.textContent=session?('● '+session.username+(isStaffPlus(session)?' ['+ROLE_LABELS[session.role]+']':'')):'○ non connecté';
  info.style.color=session?'var(--accent)':'var(--text-dim)';
  acts.innerHTML='';
  const mk=(label,fn,cls)=>{ const b=document.createElement('button'); b.textContent=label; b.onclick=fn; if(cls)b.className=cls; return b; };
  if(session){
    acts.append(mk('profil',()=>{view='profile';viewingUid=session.uid;render();}),mk('éditer',()=>{view='edit';render();}),mk('membres',()=>{view='directory';render();}));
    if(isStaffPlus(session)) acts.append(mk('⚡ panel',()=>{view='admin';render();},'admin'));
    acts.append(mk('quitter',()=>{session=null;clearSession();view='profile';viewingUid=null;resetVisual();render();}));
  }else{
    acts.append(mk('se connecter',()=>{view='auth';render();}),mk('membres',()=>{view='directory';render();}));
  }
  acts.append(mk(LANG==='en'?'FR':'EN',toggleLang));
}

function commitDraft(p,d){
  p.avatar=d.avatar; p.bio=d.bio; p.customText=d.customText; p.wallpaper=d.wallpaper;
  p.music=d.music; p.cursorUrl=d.cursorUrl; p.discordId=d.discordId;
  p.theme=d.theme; p.accent=d.accent; p.opacity=d.opacity; p.effects=d.effects; p.style=d.style; p.games=d.games; p.gaming=d.gaming;
  p.links=d.links.filter(l=>(l.raw||'').trim()).map(l=>({platform:l.platform,label:(PLATFORMS[l.platform]||PLATFORMS.link).name,raw:l.raw,copy:!!l.copy,url:normalizeUrl(l.platform,l.raw)}));
}
function mountActionBar(el,p,d){
  const bar=document.createElement('div'); bar.style.marginTop='4px';
  bar.innerHTML=`${formError?`<div class="error" style="margin-bottom:10px;">${formError}</div>`:''}<div class="row"><button class="btn" id="saveBtn">Enregistrer</button><button class="btn ghost" id="previewBtn">Aperçu</button><button class="btn ghost" id="cancelBtn">Annuler</button></div>`;
  el.appendChild(bar);
  document.getElementById('previewBtn').onclick=()=>{
    const tmp={...p}; commitDraft(tmp,d);
    window.__previewProfile=tmp; view='previewProfile'; render();
  };
  document.getElementById('cancelBtn').onclick=()=>{ editDraft=null; formError=''; view='profile'; viewingUid=session.uid; render(); };
  document.getElementById('saveBtn').onclick=async()=>{
    commitDraft(p,d);
    document.getElementById('saveBtn').textContent='...';
    try{ await saveProfile(p); session=p; editDraft=null; formError=''; view='profile'; viewingUid=session.uid; render(); }
    catch(e){ formError='Erreur de sauvegarde.'; render(); }
  };
}

    <div class="dash-card">
      <h3>🔒 Contenu secret</h3>
      <p class="hint" style="margin-bottom:10px;">Un bloc caché sur ton profil, déblocable avec un mot de passe. Laisse vide pour désactiver.</p>
      <div class="field"><label>Contenu à révéler</label><textarea id="secretText" rows="3" maxlength="500" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;resize:vertical;">${esc((p.secret&&p.secret.text)||'')}</textarea></div>

    </div>
  `;
  const savePoll=async(newId)=>{
    const q=(document.getElementById('pollQ').value||'').trim();
    const opts=(document.getElementById('pollOpts').value||'').split('\n').map(s=>s.trim()).filter(Boolean).slice(0,6);
    const poll=(q&&opts.length>=2)?{id:newId||((p.poll&&p.poll.id)||'p1'),q,opts}:null;
    try{ await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({poll})}); p.poll=poll; if(session&&session.uid===p.uid) session.poll=poll; toast(poll?'Sondage enregistré ✓':'Sondage désactivé','ok'); }
    catch(e){ toast('Erreur de sauvegarde.','err'); }
  };
  document.getElementById('pollSave').onclick=()=>savePoll();
  document.getElementById('pollReset').onclick=()=>savePoll('p'+Date.now().toString(36));
  document.getElementById('secretSave').onclick=async()=>{
    const text=(document.getElementById('secretText').value||'').trim();
    const pw=(document.getElementById('secretPwEdit').value||'').trim();
    const hint=(document.getElementById('secretHint').value||'').trim();
    const secret=(text&&pw)?{text,pw,hint}:null;
    try{ await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({secret})}); p.secret=secret; if(session&&session.uid===p.uid) session.secret=secret; toast(secret?'Secret enregistré ✓':'Secret désactivé','ok'); }
    catch(e){ toast('Erreur de sauvegarde.','err'); }
  };
  document.getElementById('chUser').onclick=()=>{
    openModal('Changer de nom d’utilisateur',
      `<div class="field"><label>nouveau pseudo</label><input id="mUser" value="${esc(p.username)}" autocomplete="off"></div><p class="hint" id="mUserHint">Ton identifiant de connexion.</p><div class="row"><button class="btn" id="mUserSave">Enregistrer</button></div>`,
      (body)=>{
        const inp=body.querySelector('#mUser'), hint=body.querySelector('#mUserHint'); let t=null;
        inp.oninput=()=>{ const v=inp.value.trim(); hint.style.color='';
          if(v===p.username){ hint.textContent='Ton pseudo actuel.'; return; }
          if(v.length<2){ hint.textContent='2 caractères minimum.'; hint.style.color='#e08a7e'; return; }
          hint.textContent='vérification...'; clearTimeout(t);
          t=setTimeout(async()=>{ try{ const ok=await isUsernameAvailable(v,p.uid); hint.textContent=ok?'✓ disponible':'✗ déjà pris'; hint.style.color=ok?'#5ec98f':'#e08a7e'; }catch(e){ hint.textContent=''; } },350); };
        body.querySelector('#mUserSave').onclick=async()=>{
          const v=inp.value.trim();
          if(v.length<2){ hint.textContent='2 caractères minimum.'; hint.style.color='#e08a7e'; return; }
          if(v!==p.username && !(await isUsernameAvailable(v,p.uid))){ hint.textContent='✗ déjà pris.'; hint.style.color='#e08a7e'; return; }
          try{ await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({username:v})}); p.username=v; closeModal(); toast('Pseudo mis à jour','ok'); render(); }
          catch(e){ hint.textContent='Erreur, réessaie.'; hint.style.color='#e08a7e'; }
        };
      });
  };
  document.getElementById('chTag').onclick=()=>{
    openModal('Changer le nom d’affichage',
      `<div class="field"><label>tag affiché</label><input id="mTag" value="${esc(p.tag)}"></div><div class="row"><button class="btn" id="mTagSave">Enregistrer</button></div>`,
      (body)=>{
        body.querySelector('#mTagSave').onclick=async()=>{
          const v=body.querySelector('#mTag').value.trim()||p.tag;
          try{ await pgFetch('/profiles?uid=eq.'+p.uid,{method:'PATCH',body:JSON.stringify({tag:v})}); p.tag=v; closeModal(); toast('Nom d’affichage mis à jour','ok'); render(); }
          catch(e){ toast('Erreur','err'); }
        };
      });
  };
  renderDiscordLinkBox(p);
}

function mountLinksTab(el,p,d){
  el.innerHTML=`
    <div class="dash-card">
      <h3>Connectez vos profils de réseaux sociaux</h3>
      <p class="hint" style="margin-bottom:14px;">Clique une plateforme pour l'ajouter, puis renseigne ton pseudo ou lien dans sa carte. Le bouton 🔗/📋 de chaque carte bascule entre « ouvrir le lien » et « copier le texte au clic » (ex. pseudo Discord copié au lieu d'ouvrir une page).</p>
      <div class="linkgrid" id="platGrid"></div>
    </div>
    <div class="dash-card">
      <h3>Vos liens</h3>
      <div class="linkcards" id="linkCards"></div>
    </div>
  `;
  const grid=document.getElementById('platGrid');
  Object.keys(PLATFORMS).forEach(id=>{ const plat=PLATFORMS[id]; const gi=document.createElement('div'); gi.className='gi'; gi.title=plat.name;
    gi.innerHTML=`<span class="ico" style="color:${plat.color}">${iconFor(id)}</span>`;
    gi.onclick=()=>{ d.links.push({platform:id,raw:'',label:plat.name,copy:false}); drawCards(); const inp=document.querySelector('#linkCards .linkcard:last-child input'); if(inp) inp.focus(); };
    grid.appendChild(gi); });
  const lc=document.getElementById('linkCards');
  function drawCards(){
    if(!d.links.length){ lc.innerHTML='<p class="hint">Aucun lien pour le moment — clique une plateforme ci-dessus.</p>'; return; }
    lc.innerHTML='';
    d.links.forEach((l,i)=>{ const plat=PLATFORMS[l.platform]||PLATFORMS.link; const card=document.createElement('div'); card.className='linkcard';
      card.innerHTML=`<div class="lchead"><span class="plat"><span class="ico" style="color:${plat.color}">${iconFor(l.platform)}</span>${plat.name}</span>
        <span class="lcacts"><button data-cp="${i}" title="${l.copy?'copie au clic':'ouvre au clic'}">${l.copy?'📋':'🔗'}</button><button data-rm="${i}" title="supprimer">✕</button></span></div>
        <input data-i="${i}" placeholder="${plat.ph}" value="${esc(l.raw||'')}">`;
      lc.appendChild(card); });
    lc.querySelectorAll('input').forEach(inp=>{ inp.oninput=()=>{ d.links[+inp.dataset.i].raw=inp.value; }; });
    lc.querySelectorAll('[data-cp]').forEach(b=>{ b.onclick=()=>{ d.links[+b.dataset.cp].copy=!d.links[+b.dataset.cp].copy; drawCards(); }; });
    lc.querySelectorAll('[data-rm]').forEach(b=>{ b.onclick=()=>{ d.links.splice(+b.dataset.rm,1); drawCards(); }; });
  }
  drawCards();
  mountActionBar(el,p,d);
}

  document.getElementById('ghNpCover').oninput=e=>g.nowPlaying.cover=e.target.value;

  const bindList=(id,key)=>{ document.getElementById(id).oninput=e=>g[key]=parseLines(e.target.value); };

  Object.entries(GH_IDS).forEach(([k,label])=>{ const f=document.createElement('div'); f.className='field'; f.innerHTML=`<label>${label}</label><input value="${esc(g.ids[k]||'')}">`;
    f.querySelector('input').oninput=e=>{ g.ids[k]=e.target.value.trim(); }; idsBox.appendChild(f); });
  // setup
  const setupBox=document.getElementById('ghSetup');
  [['cpu','CPU'],['gpu','GPU'],['ram','RAM'],['monitor','Écran'],['mouse','Souris'],['keyboard','Clavier'],['headset','Casque'],['res','Résolution'],['sens','Sensibilité'],['dpi','DPI']].forEach(([k,label])=>{

  document.getElementById('ghCross').oninput=e=>g.setup.crosshair=e.target.value;
  // reviews (repeatable)

    row.querySelectorAll('[data-f]').forEach(inp=>inp.oninput=()=>{ r[inp.dataset.f]=inp.dataset.f==='rating'?+inp.value:inp.value; });
    row.querySelector('.gh-ed-rm').onclick=()=>{ g.reviews.splice(i,1); drawReviews(); };
    rv.appendChild(row); }); rv.className='gh-ed-list'; }
  drawReviews();
  document.getElementById('ghAddReview').onclick=()=>{ g.reviews.push({game:'',rating:5,text:''}); drawReviews(); };
  // links (repeatable)
  const lk=document.getElementById('ghLinks');
  function drawLinks(){ lk.innerHTML=''; g.links.forEach((l,i)=>{ const row=document.createElement('div'); row.className='gh-ed-item';

    row.querySelectorAll('[data-f]').forEach(inp=>inp.oninput=()=>{ l[inp.dataset.f]=inp.value; });
    row.querySelector('.gh-ed-rm').onclick=()=>{ g.links.splice(i,1); drawLinks(); };
    lk.appendChild(row); }); lk.className='gh-ed-list'; }
  drawLinks();
  document.getElementById('ghAddLink').onclick=()=>{ g.links.push({label:'',url:''}); drawLinks(); };
  mountActionBar(el,p,d);
}

// ===== onglet 🧩 Interface : réordonner et masquer les blocs du profil =====
function mountInterfaceTab(el,p,d){
  d.style={...DEFAULT_STYLE,...(d.style||{})};
  if(!Array.isArray(d.style.blocks)) d.style.blocks=resolveBlocks(d.style);
  el.innerHTML=`
    <div class="dash-card">
      <h3>🧩 Blocs du profil</h3>
      <p class="hint" style="margin-bottom:12px;">Réorganise (▲▼) et affiche/masque chaque bloc de ta page. L'en-tête (avatar, pseudo, bio, badges) reste toujours en haut.</p>
      <div id="blockList"></div>
      <button class="btn ghost small" id="blkReset" style="margin-top:10px;">↺ Ordre par défaut</button>
    </div>
  `;
  const list=document.getElementById('blockList');
  function draw(){
    d.style.blocks=resolveBlocks(d.style);
    list.innerHTML='';
    d.style.blocks.forEach((b,i)=>{
      const row=document.createElement('div'); row.className='blk-row';
      row.innerHTML=`<span class="blk-move" data-up="${i}">▲</span><span class="blk-move" data-down="${i}">▼</span>
        <span class="blk-name">${BLOCK_META[b.k]}</span>
        <div class="togglesw${b.on!==false?' on':''}" data-tg="${i}"></div>`;
      list.appendChild(row);
    });
    list.querySelectorAll('[data-up]').forEach(x=>x.onclick=()=>{ const i=+x.dataset.up; if(i>0){ const a=d.style.blocks; [a[i-1],a[i]]=[a[i],a[i-1]]; draw(); } });
    list.querySelectorAll('[data-down]').forEach(x=>x.onclick=()=>{ const i=+x.dataset.down; const a=d.style.blocks; if(i<a.length-1){ [a[i+1],a[i]]=[a[i],a[i+1]]; draw(); } });
    list.querySelectorAll('[data-tg]').forEach(t=>t.onclick=()=>{ const i=+t.dataset.tg; d.style.blocks[i].on=!(d.style.blocks[i].on!==false); t.classList.toggle('on',d.style.blocks[i].on!==false); });
  }
  draw();
  document.getElementById('blkReset').onclick=()=>{ d.style.blocks=DEFAULT_BLOCK_ORDER.map(k=>({k,on:true})); draw(); toast('Ordre réinitialisé','ok'); };
  mountActionBar(el,p,d);
}

// ===== onglet 🎨 Design : personnalisation avancée + presets + polices =====

  // --- presets ---
  const cats=document.getElementById('presetCats');
  const grid=document.getElementById('presetGrid');
  function drawCats(){ cats.innerHTML=''; Object.entries(PRESET_CATS).forEach(([k,label])=>{ const c=document.createElement('button'); c.className='chip'+(presetCat===k?' on':''); c.textContent=label; c.onclick=()=>{ presetCat=k; drawCats(); drawPresets(); }; cats.appendChild(c); }); }
  function drawPresets(){
    grid.innerHTML='';
    PRESETS.filter(pr=>presetCat==='all'||pr.cat===presetCat).forEach(pr=>{
      const th=THEMES.find(t=>t.id===pr.theme)||THEMES[0];
      const cell=document.createElement('button'); cell.className='preset-cell';
      cell.style.background=(pr.style&&pr.style.gradient)||th.bg;
      cell.innerHTML=`<span class="pc-emo">${pr.emo}</span><span class="pc-name">${pr.name}</span><span class="pc-dot" style="background:${pr.accent}"></span>`;

  function applyPreset(pr){
    d.theme=pr.theme; d.accent=pr.accent;
    d.style={...DEFAULT_STYLE,...(pr.style||{})};
    toast('Preset « '+pr.name+' » appliqué','ok');
    mountDesignTab(el,p,d); // re-render pour refléter tous les contrôles
  }
  drawCats(); drawPresets();

  // --- polices ---
  const selH=document.getElementById('fontHeading'), selB=document.getElementById('fontBody');
  function fillFontSelect(sel,val){ sel.innerHTML='<option value="">Défaut du thème</option>'+
    Object.keys(FONT_CATS).map(cat=>`<optgroup label="${FONT_CATS[cat]}">`+FONTS.filter(f=>f.cat===cat).map(f=>`<option value="${f.f}"${val===f.f?' selected':''}>${f.f}</option>`).join('')+`</optgroup>`).join(''); }
  fillFontSelect(selH,s.fontHeading); fillFontSelect(selB,s.fontBody);
  const fpH=document.getElementById('fpH'), fpB=document.getElementById('fpB');
  function previewFonts(){ if(s.fontHeading){ ensureFont(s.fontHeading); fpH.style.fontFamily=fontStack(s.fontHeading);} else fpH.style.fontFamily='';
    if(s.fontBody){ ensureFont(s.fontBody); fpB.style.fontFamily=fontStack(s.fontBody);} else fpB.style.fontFamily=''; }
  previewFonts();
  selH.onchange=()=>{ s.fontHeading=selH.value; previewFonts(); live(); };
  selB.onchange=()=>{ s.fontBody=selB.value; previewFonts(); live(); };

  // --- helper sliders ---
  function buildSliders(mountId,defs){

    defs.forEach(cfg=>{
      const wrap=document.createElement('div'); wrap.className='slider';

      box.appendChild(wrap);
      const inp=wrap.querySelector('input');
      inp.oninput=()=>{ cfg.set(+inp.value); document.getElementById('sv-'+cfg.k).textContent=cfg.disp(+inp.value); live(); };
    });

  buildSliders('typoSliders',[
    {k:'fontScale',label:'Taille du texte',min:80,max:130,get:()=>s.fontScale||100,set:v=>s.fontScale=v,disp:v=>v+'%'},

  ]);
  buildSliders('shapeSliders',[
    {k:'radius',label:'Coins arrondis (-1 = défaut)',min:-1,max:32,get:()=>s.radius,set:v=>s.radius=v,disp:v=>v<0?'défaut':v+'px'},
    {k:'borderWidth',label:'Épaisseur des bordures (-1 = défaut)',min:-1,max:4,get:()=>s.borderWidth,set:v=>s.borderWidth=v,disp:v=>v<0?'défaut':v+'px'},
    {k:'shadow',label:'Intensité de l\'ombre (-1 = défaut)',min:-1,max:100,get:()=>s.shadow,set:v=>s.shadow=v,disp:v=>v<0?'défaut':v+'%'},
    {k:'contentWidth',label:'Largeur du contenu (0 = défaut)',min:0,max:560,step:20,get:()=>s.contentWidth||0,set:v=>s.contentWidth=v<320?0:v,disp:v=>v<320?'défaut':v+'px'}
  ]);
  buildSliders('ambSliders',[
    {k:'glow',label:'Halo lumineux (accent)',min:0,max:100,get:()=>s.glow||0,set:v=>s.glow=v,disp:v=>v+'%'},
    {k:'animIntensity',label:'Intensité des animations',min:0,max:150,step:10,get:()=>s.animIntensity==null?100:s.animIntensity,set:v=>s.animIntensity=v,disp:v=>v+'%'}
  ]);

  // segmented density / align
  function seg(id,val,set){ const box=document.getElementById(id); const draw=()=>[...box.children].forEach(b=>b.classList.toggle('active',String(b.dataset.v)===String(val()))); draw();
    [...box.children].forEach(b=>b.onclick=()=>{ set(b.dataset.v); draw(); live(); }); }
  seg('segDensity',()=>s.density,v=>s.density=+v);
  seg('segAlign',()=>s.align,v=>s.align=v);

  // card anim + tint
  const ca=document.getElementById('cardAnim'); ca.value=s.cardAnim||'none'; ca.onchange=()=>{ s.cardAnim=ca.value; live(); };
  const tint=document.getElementById('overlayTint');
  tint.onchange=()=>{ const v=tint.value.trim(); s.overlayTint=/^#[0-9a-fA-F]{6}$/.test(v)?v:''; document.getElementById('tintDot').style.background=s.overlayTint||'transparent'; live(); };

  // tools
  document.getElementById('btnRandom').onclick=()=>{ const pr=PRESETS[Math.floor(Math.random()*PRESETS.length)]; applyPreset(pr); };
