<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>xvy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --accent:#8b7cf6; --bg:#0c0d12; --text:#edece8; --text-dim:#9a9ea6;
    --op-card:1; --op-links:1; --op-avatar:1; --op-text:1; --op-wall:1; --op-overlay:1;
    --profile-blur:20px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; min-height:100dvh; overflow-x:hidden; }

  #wallpaper{ position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; opacity:0; transition:opacity .5s ease; }
  #wallpaper.active{ opacity:var(--op-wall); }
  #wallpaperVideo{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .5s ease; }
  #wallpaperVideo.active{ opacity:var(--op-wall); }
  #wallpaper-overlay{ position:fixed; inset:0; z-index:1; pointer-events:none; background:linear-gradient(to bottom, rgba(13,15,19,.5), rgba(13,15,19,.78)); opacity:var(--op-overlay); transition:opacity .3s ease; }
  #aurora-bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  #aurora-bg .blob{ position:absolute; border-radius:50%; filter:blur(30px); }
  #aurora-bg .blob-a{ width:60vw; height:60vw; left:-10vw; top:-14vw; background:radial-gradient(circle, color-mix(in srgb,var(--accent) 40%,transparent), transparent 62%); animation:auroraA 16s ease-in-out infinite; }
  #aurora-bg .blob-b{ width:52vw; height:52vw; right:-12vw; bottom:-16vw; background:radial-gradient(circle, color-mix(in srgb,#f0abfc 34%,transparent), transparent 62%); filter:blur(34px); animation:auroraB 20s ease-in-out infinite; }
  body.no-wall #wallpaper-overlay{ background:radial-gradient(600px circle at 30% 20%, color-mix(in srgb,var(--accent) 10%,transparent), transparent 60%), radial-gradient(500px circle at 70% 80%, color-mix(in srgb,var(--accent) 7%,transparent), transparent 60%); }

  .topbar{ position:fixed; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:8px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
  .topbar .who{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar .acts{ display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .topbar button{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 10px; border-radius:8px; cursor:pointer; transition:all .15s ease; backdrop-filter:blur(10px); }
  .topbar button:hover, .topbar button:active{ color:var(--text); border-color:var(--accent); }
  .topbar button.admin{ color:#e0b05e; border-color:rgba(224,176,94,.4); }

  .wrap{ position:relative; z-index:5; min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:70px 18px 40px; }
  .card{ width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; gap:20px; animation:rise .5s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }

  /* themes */
  .theme-glass .profilebox{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(var(--profile-blur,20px)); border-radius:24px; padding:32px 24px; }
  .theme-glass .link{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(10px); }
  .theme-neon .profilebox{ background:rgba(10,4,20,.5); border:1px solid var(--accent); border-radius:20px; padding:32px 24px; box-shadow:0 0 30px color-mix(in srgb,var(--accent) 40%,transparent), inset 0 0 20px color-mix(in srgb,var(--accent) 10%,transparent); }
  .theme-neon .name{ text-shadow:0 0 12px var(--accent); }
  .theme-neon .link{ background:rgba(10,4,20,.6); border:1px solid color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-neon .link:hover{ box-shadow:0 0 16px color-mix(in srgb,var(--accent) 50%,transparent); }
  .theme-minimal .profilebox{ background:rgba(20,22,27,.7); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:30px 24px; }
  .theme-minimal .link{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
  .theme-mono .profilebox{ background:rgba(8,10,8,.8); border:1px solid #2a3a2a; border-radius:8px; padding:28px 22px; font-family:'JetBrains Mono',monospace; }
  .theme-mono .name{ font-family:'JetBrains Mono',monospace; }
  .theme-mono .link{ background:rgba(12,16,12,.7); border:1px solid #2a3a2a; border-radius:6px; }
  .theme-sunset .profilebox{ background:linear-gradient(160deg, rgba(60,20,40,.55), rgba(20,15,40,.55)); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(var(--profile-blur,16px)); border-radius:26px; padding:32px 24px; }
  .theme-sunset .link{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); }
  .theme-aurora .profilebox{ background:linear-gradient(165deg, rgba(32,24,52,.58), rgba(13,10,22,.66)); border:1px solid color-mix(in srgb, var(--accent) 30%, rgba(255,255,255,.08)); backdrop-filter:blur(var(--profile-blur,22px)); border-radius:26px; padding:32px 24px; box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 24px 60px -20px rgba(0,0,0,.85), 0 0 70px -26px color-mix(in srgb,var(--accent) 70%, transparent); }
  .theme-aurora .name{ text-shadow:0 0 20px color-mix(in srgb,var(--accent) 45%,transparent); }
  .theme-aurora .link{ background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.09); }
  .theme-aurora .link:hover{ box-shadow:0 8px 22px -10px var(--accent); }
  .theme-aurora .avatar-ring{ background:conic-gradient(from 210deg, var(--accent), transparent 52%, color-mix(in srgb,#f0abfc 70%,transparent) 78%, var(--accent)); box-shadow:0 0 26px color-mix(in srgb,var(--accent) 30%,transparent); animation:auroraFloat 6s ease-in-out infinite; }
  #aurora-bg{ display:none; }
  body.theme-aurora #aurora-bg{ display:block; }
  @keyframes auroraFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
  @keyframes auroraA{ 0%,100%{ transform:translate(-8%,-6%) scale(1); } 50%{ transform:translate(6%,8%) scale(1.15); } }
  @keyframes auroraB{ 0%,100%{ transform:translate(6%,4%) scale(1.1); } 50%{ transform:translate(-6%,-8%) scale(1); } }
  @media (prefers-reduced-motion:reduce){ .theme-aurora .avatar-ring{ animation:none; } #aurora-bg *{ animation:none !important; } }
  /* thèmes additionnels */
  .theme-cyber .profilebox{ background:linear-gradient(160deg, rgba(10,26,52,.6), rgba(10,8,24,.7)); border:1px solid color-mix(in srgb,var(--accent) 50%,transparent); border-radius:14px; padding:32px 24px; box-shadow:0 0 34px -6px color-mix(in srgb,var(--accent) 45%,transparent), inset 0 0 0 1px rgba(255,255,255,.03); }
  .theme-cyber .name{ text-shadow:0 0 14px color-mix(in srgb,var(--accent) 60%,transparent); letter-spacing:.5px; }
  .theme-cyber .link{ background:rgba(10,20,40,.6); border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); }
  .theme-cyber .link:hover{ box-shadow:0 0 16px color-mix(in srgb,var(--accent) 45%,transparent); }
  .theme-crimson .profilebox{ background:linear-gradient(160deg, rgba(58,10,20,.55), rgba(16,4,8,.72)); border:1px solid color-mix(in srgb,var(--accent) 34%,rgba(255,255,255,.08)); backdrop-filter:blur(var(--profile-blur,18px)); border-radius:22px; padding:32px 24px; box-shadow:0 24px 60px -22px rgba(0,0,0,.85), 0 0 60px -30px color-mix(in srgb,var(--accent) 70%,transparent); }
  .theme-crimson .link{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
  .theme-sakura .profilebox{ background:linear-gradient(165deg, rgba(58,24,38,.55), rgba(16,10,18,.66)); border:1px solid color-mix(in srgb,#fb7185 30%,rgba(255,255,255,.08)); backdrop-filter:blur(var(--profile-blur,20px)); border-radius:28px; padding:34px 26px; box-shadow:0 24px 60px -22px rgba(0,0,0,.8), 0 0 70px -28px color-mix(in srgb,#fb7185 55%,transparent); }
  .theme-sakura .name{ text-shadow:0 0 18px color-mix(in srgb,#fb7185 40%,transparent); }
  .theme-sakura .link{ background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.1); }
  .copy-link{ cursor:copy; }

  /* ================= Landing — interface d'entrée (scroll 3D) ================= */
  .landing{ width:100%; max-width:1150px; margin:0 auto; animation:rise .5s ease; }
  .ls-scroll{ height:60rem; display:flex; align-items:center; justify-content:center; position:relative; padding:8px; }
  .ls-stage{ width:100%; position:relative; perspective:1000px; padding:40px 0; }
  .ls-head{ max-width:64rem; margin:0 auto; text-align:center; will-change:transform; }
  .ls-head h1{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(20px,4vw,34px); color:var(--text); }
  .ls-head .big{ display:block; font-size:clamp(58px,11vw,100px); font-weight:700; line-height:1; margin-top:10px;
    background:linear-gradient(120deg, var(--accent) 20%, #f0abfc 85%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .ls-head .sub{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); margin-bottom:14px; }
  .ls-card{ max-width:64rem; margin:-48px auto 0; height:30rem; width:100%; border:4px solid #6C6C6C; padding:8px; background:#222222; border-radius:30px; will-change:transform;
    box-shadow:0 0 #0000004d,0 9px 20px #0000004a,0 37px 37px #00000042,0 84px 50px #00000026,0 149px 60px #0000000a,0 233px 65px #00000003; }
  .ls-inner{ height:100%; width:100%; overflow:hidden; border-radius:16px; background:#101014; display:flex; flex-direction:column; }
  @media(min-width:769px){
    .ls-scroll{ height:80rem; padding:20px 80px; }
    .ls-stage{ padding:160px 0; }
    .ls-card{ height:40rem; padding:24px; }
  }
  .ls-ed-bar{ display:flex; align-items:center; gap:7px; padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.07); flex-shrink:0; }
  .ls-dot{ width:11px; height:11px; border-radius:50%; }
  .ls-ed-tab{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); margin-left:10px; padding:4px 10px; background:rgba(255,255,255,.05); border-radius:6px; }
  .ls-code{ flex:1; overflow:auto; padding:16px 20px; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.8; color:#c9d1d9; text-align:left; white-space:pre; }
  .ls-code .ln{ display:inline-block; width:2.1em; color:#3f4652; user-select:none; }
  .tk-c{ color:#6a737d; font-style:italic; } .tk-k{ color:#c792ea; } .tk-s{ color:#a5d6a7; } .tk-f{ color:#82aaff; } .tk-p{ color:#8fb39d; } .tk-n{ color:#f78c6c; }
  .ls-why{ padding:10px 12px 20px; text-align:center; }
  .ls-why h2{ font-family:'Space Grotesk',sans-serif; font-size:clamp(26px,4vw,40px); }
  .ls-why .lead{ color:var(--text-dim); max-width:560px; margin:12px auto 30px; font-size:14.5px; line-height:1.6; }
  .ls-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; text-align:left; }
  .ls-feat{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:16px; padding:18px; backdrop-filter:blur(10px); transition:all .2s ease; }
  .ls-feat:hover{ border-color:color-mix(in srgb,var(--accent) 55%,transparent); transform:translateY(-3px); box-shadow:0 14px 30px -18px var(--accent); }
  .ls-feat .ic{ font-size:22px; }
  .ls-feat h3{ font-size:15px; margin:8px 0 5px; font-family:'Space Grotesk',sans-serif; }
  .ls-feat p{ font-size:13px; color:var(--text-dim); line-height:1.55; }
  .ls-mini{ max-width:620px; margin:34px auto 0; text-align:left; background:#101014; border:1px solid rgba(255,255,255,.1); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
  .ls-mini .ls-code{ font-size:12px; overflow-x:auto; }
  .ls-cta{ display:flex; gap:12px; justify-content:center; margin:38px 0 30px; flex-wrap:wrap; }
  .ls-cta .btn{ width:auto; padding:13px 28px; }
  @media (prefers-reduced-motion:reduce){ .ls-card,.ls-head{ transform:none !important; } }

  /* ================= Assistant IA flottant ================= */
  #aiFab{ position:fixed; bottom:22px; right:22px; z-index:60; width:60px; height:60px; border-radius:50%; border:2px solid rgba(255,255,255,.2); cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#fff; transition:transform .4s ease, box-shadow .4s ease;
    background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 85%,#6366f1) 0%, #a855f7 100%);
    box-shadow:0 0 20px color-mix(in srgb,var(--accent) 60%,#8b5cf6), 0 0 44px rgba(124,58,237,.45); }
  #aiFab:hover{ transform:scale(1.08) rotate(4deg); box-shadow:0 0 32px color-mix(in srgb,var(--accent) 80%,#8b5cf6), 0 0 60px rgba(124,58,237,.6); }
  #aiFab.open{ transform:rotate(90deg); }
  #aiFab svg{ width:28px; height:28px; }
  #aiFab .ping{ position:absolute; inset:0; border-radius:50%; background:var(--accent); opacity:.18; animation:aiPing 2.4s cubic-bezier(0,0,.2,1) infinite; }
  @keyframes aiPing{ 75%,100%{ transform:scale(1.5); opacity:0; } }
  #aiPanel{ position:fixed; bottom:92px; right:22px; z-index:60; width:min(400px,calc(100vw - 44px)); display:flex; flex-direction:column;
    background:linear-gradient(160deg, rgba(30,30,38,.92), rgba(16,16,22,.95)); border:1px solid rgba(255,255,255,.16); border-radius:22px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8); backdrop-filter:blur(20px); overflow:hidden; transform-origin:bottom right; animation:aiPop .28s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes aiPop{ 0%{ opacity:0; transform:scale(.85) translateY(16px); } 100%{ opacity:1; transform:none; } }
  .ai-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px; }
  .ai-head .t{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--text-dim); }
  .ai-head .t .dot{ width:8px; height:8px; border-radius:50%; background:#28c840; animation:aiPulse 2s infinite; }
  @keyframes aiPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }
  .ai-head .x{ background:none; border:none; color:var(--text-dim); cursor:pointer; padding:6px; border-radius:8px; }
  .ai-head .x:hover{ background:rgba(255,255,255,.08); color:var(--text); }
  .ai-modes{ display:flex; gap:6px; padding:2px 16px 10px; }
  .ai-mode{ flex:1; font-size:12px; padding:7px 8px; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:var(--text-dim); transition:all .15s ease; }
  .ai-mode.active{ background:color-mix(in srgb,var(--accent) 22%,transparent); border-color:color-mix(in srgb,var(--accent) 55%,transparent); color:var(--text); font-weight:600; }
  .ai-log{ padding:4px 16px; max-height:290px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .ai-msg{ font-size:13px; line-height:1.5; padding:10px 12px; border-radius:14px; max-width:90%; white-space:pre-wrap; word-break:break-word; }
  .ai-msg.me{ align-self:flex-end; background:color-mix(in srgb,var(--accent) 26%,transparent); border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); }
  .ai-msg.bot{ align-self:flex-start; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:var(--text); }
  .ai-msg.err{ align-self:flex-start; background:rgba(224,104,94,.12); border:1px solid rgba(224,104,94,.35); color:#f0a89e; }
  .ai-msg .copybtn{ display:inline-block; margin-top:8px; font-size:11px; padding:4px 10px; border-radius:8px; cursor:pointer; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); color:var(--text-dim); }
  .ai-msg .copybtn:hover{ color:var(--text); }
  .ai-hint{ align-self:flex-start; font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
  .ai-input{ display:flex; align-items:flex-end; gap:8px; padding:10px 12px 12px; border-top:1px solid rgba(255,255,255,.07); }
  .ai-input textarea{ flex:1; resize:none; min-height:42px; max-height:120px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:10px 12px; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; outline:none; }
  .ai-input textarea:focus{ border-color:color-mix(in srgb,var(--accent) 55%,transparent); }
  .ai-send{ flex-shrink:0; width:42px; height:42px; border-radius:12px; border:none; cursor:pointer; color:#0a0d0a; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--accent), #a855f7); box-shadow:0 8px 20px -8px color-mix(in srgb,var(--accent) 80%,#8b5cf6); transition:transform .15s ease; }
  .ai-send:hover{ transform:scale(1.08) rotate(-4deg); } .ai-send:disabled{ opacity:.5; cursor:default; transform:none; }
  .ai-send svg{ width:18px; height:18px; }
  .ai-spin{ width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:aiSpin .7s linear infinite; }
  @keyframes aiSpin{ to{ transform:rotate(360deg); } }

  /* ================= Dashboard d'édition (façon guns.lol) ================= */
  .dash{ width:100%; max-width:1100px; margin:0 auto; animation:rise .4s ease; }
  .dash-layout{ display:flex; align-items:flex-start; min-height:70vh; }
  .dash-side{ width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:16px; padding:18px 14px;
    background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.08); border-right:none; border-radius:18px 0 0 18px; align-self:stretch; }
  .dash-logo{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; padding:2px 6px; }
  .dash-search input{ width:100%; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.1); border-radius:9px; padding:8px 10px; color:var(--text-dim); font-size:12px; font-family:'Inter',sans-serif; }
  .dash-nav{ display:flex; flex-direction:column; gap:2px; }
  .dash-navbtn{ text-align:left; background:none; border:none; color:var(--text-dim); padding:9px 10px; border-radius:9px; cursor:pointer; font-size:13.5px; font-family:'Inter',sans-serif; transition:all .15s ease; }
  .dash-navbtn:hover{ background:rgba(255,255,255,.05); color:var(--text); }
  .dash-navbtn.active{ background:color-mix(in srgb,var(--accent) 18%,transparent); color:var(--text); font-weight:600; }
  .dash-side-bottom{ margin-top:auto; display:flex; flex-direction:column; gap:8px; }
  .dash-content{ flex:1; min-width:0; padding:22px 24px; background:rgba(14,15,19,.55); border-radius:0 18px 18px 0;
    border:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; gap:20px; }
  .dash-card{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:18px 20px; }
  .dash-card h3{ font-family:'Space Grotesk',sans-serif; font-size:14px; margin-bottom:14px; color:var(--text); }
  .dash-grid4{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .dash-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .dash-grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .dash-stat{ background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:16px 18px; display:flex; flex-direction:column; gap:6px; }
  .dash-stat .lbl{ font-size:11.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.4px; }
  .dash-stat .val{ font-size:20px; font-weight:700; font-family:'Space Grotesk',sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dash-check{ display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; background:rgba(94,201,143,.08); border:1px solid rgba(94,201,143,.25); font-size:13px; }
  .dash-check.off{ background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.1); color:var(--text-dim); }
  .media-box{ position:relative; aspect-ratio:16/10; border-radius:12px; border:1px dashed rgba(255,255,255,.15); background:rgba(0,0,0,.2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; overflow:hidden; }
  .media-box img,.media-box video{ width:100%; height:100%; object-fit:cover; }
  .media-box .mb-label{ position:absolute; top:8px; left:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); background:rgba(0,0,0,.5); padding:2px 8px; border-radius:999px; }
  .media-box .mb-empty{ font-size:11px; color:var(--text-dim); text-align:center; padding:0 10px; }

  /* ============================================================

  .avatar-wrap{ position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; }

  /* badges = ligne dédiée, pills icône + NOM toujours lisible, jamais recouvert par l'avatar */
  .badge-strip{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; max-width:330px; margin:2px auto 0; }

  .badge:not([data-tip])::after, .badge:not([data-tip])::before{ display:none; }

// contraste WCAG (accent vs fond sombre) pour recommandation
function contrastRatio(hex){
  const c=hex.replace('#',''); if(c.length!==6) return 0;
  const rgb=[0,2,4].map(i=>parseInt(c.substr(i,2),16)/255).map(v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4));
  const L=0.2126*rgb[0]+0.7152*rgb[1]+0.0722*rgb[2];
  return (L+0.05)/(0.05); // vs noir pur (approx du fond sombre)
}

async function pgFetch(path,options={}){
  const bearer = accessToken || SUPABASE_KEY; // JWT utilisateur si connecté, sinon clé anon
  const res=await fetch(REST+path,{...options,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+bearer,'Content-Type':'application/json',...(options.headers||{})}});
  if(!res.ok){ const t=await res.text().catch(()=>''); throw new Error(res.status+': '+t); }
  const t=await res.text(); return t?JSON.parse(t):null;
}

// Comparaison en JS insensible à la casse, sans ilike (donc aucun faux positif
// dû aux jokers %/_ dans un pseudo) et en excluant TOUJOURS le compte courant.
async function isUsernameAvailable(name, excludeUid){
  const target=(name||'').trim().toLowerCase();
  if(!target) return false;
  const r=await pgFetch('/profiles?select=uid,username');
  return !(r||[]).some(row=>row.username.toLowerCase()===target && row.uid!==excludeUid);
}
async function isUidAvailable(uid, excludeUid){
  const n=parseInt(uid,10); if(!n||n<1) return false;
  // pas de filtre deleted_at : un uid tenu par un compte en corbeille reste pris.
  const r=await pgFetch('/profiles?uid=eq.'+n+'&select=uid');
  return !(r||[]).some(row=>row.uid!==excludeUid);
}
async function createAccount(u,p,email){
  const uname=(u||'').trim();
  if(uname.length<2) return {ok:false,error:'Pseudo trop court (2 caractères min).'};
  if(uname.length>20) return {ok:false,error:'Pseudo trop long (20 max).'};
  if(!/^[A-Za-z0-9_.]+$/.test(uname)) return {ok:false,error:'Lettres, chiffres, _ et . uniquement.'};
  if((p||'').length<6) return {ok:false,error:'Mot de passe : 6 caractères minimum.'};
  if(!sb) return {ok:false,error:'Librairie Supabase non chargée (réseau ?).'};
  if(!(await isUsernameAvailable(uname,null))) return {ok:false,error:'Ce pseudo est déjà pris.'};
  try{
    // création via la fonction serveur (compte déjà confirmé, indépendant du réglage dashboard)
    const res=await fetch(SUPABASE_URL+'/functions/v1/signup',{method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({username:uname,password:p,email:email||''})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok) return {ok:false,error:data.error||'Inscription impossible.'};
    const { error }=await sb.auth.signInWithPassword({ email:data.email, password:p });
    if(error) return {ok:false,error:'Compte créé ✓ — connecte-toi avec ton pseudo.'};
    accessToken=(await sb.auth.getSession()).data.session?.access_token||null;
    const prof=await loadMyProfile();
    return prof?{ok:true, profile:prof}:{ok:false,error:'Compte créé — reconnecte-toi.'};
  }catch(e){ return {ok:false,error:String(e.message||e)}; }
}
async function login(u,p){
  const id=(u||'').trim();
  if(!id||!p) return {ok:false,error:'Remplis les deux champs.'};
  if(!sb) return {ok:false,error:'Librairie Supabase non chargée (réseau ?).'};
  try{
    let email=id;
    if(!id.includes('@')){
      const r=await callRpc('auth_email_for_login',{ p_login:id });
      const resolved=Array.isArray(r)?r[0]:r;
      if(!resolved) return {ok:false,error:'Compte introuvable.'};
      email=resolved;
    }
    const { error }=await sb.auth.signInWithPassword({ email, password:p });
    if(error){ return {ok:false,error:/invalid login/i.test(error.message)?'Identifiants incorrects.':error.message}; }
    accessToken=(await sb.auth.getSession()).data.session?.access_token||null;
    const prof=await loadMyProfile();
    if(!prof) return {ok:false,error:'Profil introuvable.'};
    if(prof.banned){ await sb.auth.signOut(); return {ok:false,error:'Ce compte est banni.'}; }
    if(prof.deletedAt){ await sb.auth.signOut(); return {ok:false,error:'Ce compte n\'existe plus.'}; }
    return {ok:true, profile:prof};
  }catch(e){ return {ok:false,error:String(e.message||e)}; }
}

// graphique d'aire SVG (série unique, couleur accent) pour l'analytics créateur
function areaChartSVG(series, opts={}){
  const W=640,H=150,pl=6,pr=6,pt=12,pb=18; const n=series.length; if(!n) return '';
  const max=Math.max(1,...series.map(s=>s.v));
  const xw=W-pl-pr, xh=H-pt-pb;
  const X=i=> pl + (n===1?xw/2:(i/(n-1))*xw);
  const Y=v=> pt + xh - (v/max)*xh;
  let line='', area='';
  series.forEach((s,i)=>{ const x=X(i).toFixed(1), y=Y(s.v).toFixed(1); line+=(i?'L':'M')+x+' '+y+' '; });
  area='M'+X(0).toFixed(1)+' '+(pt+xh)+' '+series.map((s,i)=>'L'+X(i).toFixed(1)+' '+Y(s.v).toFixed(1)).join(' ')+' L'+X(n-1).toFixed(1)+' '+(pt+xh)+' Z';
  const grid=[0,.5,1].map(f=>{ const y=(pt+xh-f*xh).toFixed(1); return `<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`; }).join('');
  const labelIdx=[0,Math.floor((n-1)/2),n-1];
  const labels=labelIdx.map(i=>`<text x="${X(i).toFixed(1)}" y="${H-4}" fill="var(--text-dim)" font-size="9" font-family="'JetBrains Mono',monospace" text-anchor="${i===0?'start':i===n-1?'end':'middle'}">${series[i].label}</text>`).join('');
  const gid='gr'+Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block;height:150px;">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".38"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="${pl}" y="10" fill="var(--text-dim)" font-size="9" font-family="'JetBrains Mono',monospace">max ${max}</text>${labels}</svg>`;
}

function tr(s){ if(LANG!=='en'||s==null) return s; const k=(''+s).trim(); const e=I18N[k]; return e!==undefined?(''+s).replace(k,e):s; }
function applyLang(root){
  if(LANG!=='en') return;
  root=root||document.body;
  try{
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
    const arr=[]; let n; while(n=w.nextNode()) arr.push(n);
    arr.forEach(node=>{ const raw=node.nodeValue; if(!raw) return; const k=raw.trim(); if(!k) return; const e=I18N[k]; if(e!==undefined && e!==k) node.nodeValue=raw.replace(k,e); });
    root.querySelectorAll('[placeholder]').forEach(el=>{ const k=(el.getAttribute('placeholder')||'').trim(); if(I18N[k]!==undefined) el.setAttribute('placeholder',I18N[k]); });
    root.querySelectorAll('[title]').forEach(el=>{ const k=(el.getAttribute('title')||'').trim(); if(I18N[k]!==undefined) el.setAttribute('title',I18N[k]); });
  }catch(e){}
}
function toggleLang(){ LANG=(LANG==='en'?'fr':'en'); try{ localStorage.setItem('xvy_lang',LANG); }catch(e){} if(typeof render==='function') render(); }

function normalizeUrl(platform,val){
  val=(val||'').trim(); if(!val) return '';
  if(/^https?:\/\//i.test(val)) return val;
  const maps={twitch:'https://twitch.tv/',youtube:'https://youtube.com/',tiktok:'https://tiktok.com/@',instagram:'https://instagram.com/',twitter:'https://x.com/',kick:'https://kick.com/',github:'https://github.com/',telegram:'https://t.me/',spotify:'https://open.spotify.com/',steam:'https://steamcommunity.com/id/'};
  const clean=val.replace(/^@/,'');
  if(platform==='discord') return val.startsWith('discord')?('https://'+val):('https://discord.gg/'+clean);
  return (maps[platform]||'https://')+clean;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// applique les design tokens avancés : pose des variables CSS + active les classes sx-* correspondantes.
// Chaque token n'agit QUE si l'utilisateur l'a explicitement réglé (sinon le thème garde son rendu d'origine).
function applyStyle(p){
  const s={...DEFAULT_STYLE,...(p&&p.style||{})};
  const r=document.documentElement, b=document.body, cl=b.classList;
  const on=(name,cond)=>cl.toggle(name,!!cond);
  // polices
  const hasFont=!!(s.fontHeading||s.fontBody);
  if(s.fontHeading) ensureFont(s.fontHeading); if(s.fontBody) ensureFont(s.fontBody);
  if(s.fontHeading) r.style.setProperty('--font-heading',fontStack(s.fontHeading));
  if(s.fontBody) r.style.setProperty('--font-body',fontStack(s.fontBody));
  on('sx-font',hasFont);
  on('sx-fscale', s.fontScale && s.fontScale!==100); r.style.setProperty('--font-scale',(s.fontScale||100)/100);
  on('sx-fweight', !!s.fontWeight); if(s.fontWeight) r.style.setProperty('--font-weight',s.fontWeight);
  on('sx-lspace', !!s.letterSpacing); r.style.setProperty('--letter-spacing',(s.letterSpacing||0)+'px');
  on('sx-lheight', !!s.lineHeight); if(s.lineHeight) r.style.setProperty('--line-height',(s.lineHeight/100));
  // formes
  on('sx-radius', s.radius>=0); if(s.radius>=0) r.style.setProperty('--radius',s.radius+'px');
  on('sx-border', s.borderWidth>=0); if(s.borderWidth>=0) r.style.setProperty('--border-w',s.borderWidth+'px');
  on('sx-shadow', s.shadow>=0); if(s.shadow>=0) r.style.setProperty('--shadow-i',(s.shadow/100*0.95).toFixed(3));
  // layout
  on('sx-width', s.contentWidth>=320); if(s.contentWidth>=320) r.style.setProperty('--content-w',s.contentWidth+'px');
  on('sx-tight', s.density<0); on('sx-airy', s.density>0);
  on('sx-left', s.align==='left');
  // ambiance
  on('sx-glow', s.glow>0); r.style.setProperty('--glow',((s.glow||0)/100).toFixed(2));
  cl.remove('sx-anim-float','sx-anim-breathe','sx-anim-pop'); if(s.cardAnim&&s.cardAnim!=='none'&&!s.safeMode) cl.add('sx-anim-'+s.cardAnim);
  on('sx-grain', s.grain && !s.safeMode);
  on('sx-vignette', s.vignette);
  on('sx-safe', !!s.safeMode);
  // fond dégradé (uniquement si pas d'image/vidéo)
  const bgType=(p&&p.effects&&p.effects.bgType)||'image';
  const hasMedia=bgType==='video'?!!(p&&p.effects&&p.effects.bgVideo):!!(p&&p.wallpaper);
  const useGrad=!!s.gradient && !hasMedia;
  on('sx-gradient', useGrad);
  const gEl=document.getElementById('sx-gradient'); if(gEl) gEl.style.background=useGrad?s.gradient:'';
  if(useGrad) cl.remove('no-wall');
  // teinte d'overlay
  on('sx-tint', !!s.overlayTint);
  if(s.overlayTint) r.style.setProperty('--overlay-tint',s.overlayTint);
  // intensité d'animation → pilote la densité des particules (lu par startParticles)
  window.__animIntensity=s.safeMode?0:((s.animIntensity==null?100:s.animIntensity)/100);
}
function resetStyleClasses(){
  const cl=document.body.classList;
  [...cl].filter(c=>c.indexOf('sx-')===0).forEach(c=>cl.remove(c));
}
function resetVisual(){
  const r=document.documentElement;
  ['card','links','avatar','text','wall'].forEach(k=>r.style.setProperty('--op-'+k,1));
  r.style.setProperty('--op-overlay',1);
  r.style.setProperty('--profile-blur','20px');
  r.style.setProperty('--accent','#8fb39d');
  applyWallpaper('');
  const v=document.getElementById('wallpaperVideo');
  if(v){ v.pause(); v.classList.remove('active'); v.removeAttribute('src'); v.dataset.src=''; }
  document.body.className='theme-glass no-wall';
}
function applyWallpaper(url){
  const w=document.getElementById('wallpaper');
  if(url){ w.style.backgroundImage='url("'+url+'")'; w.classList.add('active'); document.body.classList.remove('no-wall'); }
  else{ w.classList.remove('active'); w.style.backgroundImage=''; document.body.classList.add('no-wall'); }
}
// fond image OU vidéo : la vidéo est toujours muette/loop/playsinline ; l'image sert d'affiche
// de secours si la vidéo ne charge pas ou si l'autoplay est bloqué (ex: certains navigateurs mobiles).
function applyBackground(p){
  const type=(p.effects&&p.effects.bgType)||'image';
  const videoUrl=(p.effects&&p.effects.bgVideo)||'';
  const posterUrl=p.wallpaper||'';
  const v=document.getElementById('wallpaperVideo');
  if(type==='video' && videoUrl){
    applyWallpaper('');
    if(posterUrl) v.poster=posterUrl; else v.removeAttribute('poster');
    if(v.dataset.src!==videoUrl){ v.dataset.src=videoUrl; v.src=videoUrl; v.load(); }
    v.muted=true;
    v.classList.add('active');
    document.body.classList.remove('no-wall');
    v.onerror=()=>{
      v.classList.remove('active');
      if(posterUrl){ applyWallpaper(posterUrl); } else { document.body.classList.add('no-wall'); }
    };
    const pr=v.play();
    if(pr && typeof pr.catch==='function') pr.catch(()=>{ /* autoplay bloqué : le poster reste affiché, pas d'erreur visible */ });
  } else {
    v.classList.remove('active'); v.pause(); v.removeAttribute('src'); v.dataset.src='';
    applyWallpaper(p.wallpaper);
  }
}

}

      <div class="field"><label>Options (une par ligne, 2 à 6)</label><textarea id="pollOpts" rows="4" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;resize:vertical;">${esc(((p.poll&&p.poll.opts)||[]).join('\n'))}</textarea></div>
      <div class="row"><button class="btn small" id="pollSave">Enregistrer le sondage</button><button class="btn ghost small" id="pollReset">Nouveau sondage (remet les votes à zéro)</button></div>
    </div>
    <div class="dash-card">
      <h3>🔒 Contenu secret</h3>
      <p class="hint" style="margin-bottom:10px;">Un bloc caché sur ton profil, déblocable avec un mot de passe. Laisse vide pour désactiver.</p>
      <div class="field"><label>Contenu à révéler</label><textarea id="secretText" rows="3" maxlength="500" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;resize:vertical;">${esc((p.secret&&p.secret.text)||'')}</textarea></div>
      <div class="field"><label>Mot de passe</label><input id="secretPwEdit" maxlength="60" value="${esc((p.secret&&p.secret.pw)||'')}" placeholder="ex: le nom de mon chat"></div>
      <div class="field"><label>Indice affiché (optionnel)</label><input id="secretHint" maxlength="120" value="${esc((p.secret&&p.secret.hint)||'')}" placeholder="ex: mon premier pseudo…"></div>
      <div class="row"><button class="btn small" id="secretSave">Enregistrer le secret</button></div>
    </div>
  `;
  const savePoll=async(newId)=>{
    const q=(document.getElementById('pollQ').value||'').trim();
    const opts=(document.getElementById('pollOpts').value||'').split('\n').map(s=>s.trim()).filter(Boolean).slice(0,6);
    const poll=(q&&opts.length>=2)?{id:newId||((p.poll&&p.poll.id)||'p1'),q,opts}:null;
    try{ await callRpc('update_my_profile',{payload:{poll}}); p.poll=poll; if(session&&session.uid===p.uid) session.poll=poll; toast(poll?'Sondage enregistré ✓':'Sondage désactivé','ok'); }
    catch(e){ toast('Erreur de sauvegarde.','err'); }
  };
  document.getElementById('idSave').onclick=async()=>{
    const payload={ display_name:document.getElementById('idDisplay').value.trim(), pronouns:document.getElementById('idPronouns').value.trim(), location:document.getElementById('idLocation').value.trim(), banner:document.getElementById('idBanner').value.trim() };
    if(payload.banner && premiumTierOf(session)==='free'){ toast('La bannière est réservée aux membres Premium ✨','err'); payload.banner=''; document.getElementById('idBanner').value=''; }
    try{ await callRpc('update_my_profile',{payload});
      Object.assign(p,{displayName:payload.display_name,pronouns:payload.pronouns,location:payload.location,banner:payload.banner});
      if(session&&session.uid===p.uid) Object.assign(session,{displayName:payload.display_name,pronouns:payload.pronouns,location:payload.location,banner:payload.banner});
      if(d){ d.displayName=payload.display_name; d.pronouns=payload.pronouns; d.location=payload.location; d.banner=payload.banner; }
      toast('Identité mise à jour ✓','ok'); }
    catch(e){ toast('Erreur de sauvegarde','err'); }
  };
  const cbSave=document.getElementById('cbSave');
  if(cbSave) cbSave.onclick=async()=>{
    try{ const r=await callRpc('set_custom_badge',{payload:{icon:document.getElementById('cbIcon').value.trim(),text:document.getElementById('cbText').value.trim(),color:document.getElementById('cbColor').value}});
      const np=mapRow(Array.isArray(r)?r[0]:r); session.customBadge=np.customBadge; p.customBadge=np.customBadge; toast('Badge enregistré ✓','ok'); }
    catch(e){ toast('Erreur (premium requis ?)','err'); }
  };
  const cbUpsell=document.getElementById('cbUpsell'); if(cbUpsell) cbUpsell.onclick=()=>{ view='premium'; render(); };
  document.getElementById('pwSave').onclick=async()=>{
    const np=document.getElementById('pwNew').value; if(np.length<6){ toast('6 caractères minimum','err'); return; }
    document.getElementById('pwSave').textContent='...';
    try{ const {error}=await sb.auth.updateUser({password:np}); if(error) throw error; document.getElementById('pwNew').value=''; toast('Mot de passe changé ✓','ok'); }
    catch(e){ toast('Erreur : '+(e.message||''),'err'); }
    const b=document.getElementById('pwSave'); if(b) b.textContent='Changer';
  };
  document.getElementById('pollSave').onclick=()=>savePoll();
  document.getElementById('pollReset').onclick=()=>savePoll('p'+Date.now().toString(36));
  document.getElementById('secretSave').onclick=async()=>{
    const text=(document.getElementById('secretText').value||'').trim();
    const pw=(document.getElementById('secretPwEdit').value||'').trim();
    const hint=(document.getElementById('secretHint').value||'').trim();
    const secret=(text&&pw)?{text,pw,hint}:null;
    try{ await callRpc('update_my_profile',{payload:{secret}}); p.secret=secret; if(session&&session.uid===p.uid) session.secret=secret; toast(secret?'Secret enregistré ✓':'Secret désactivé','ok'); }
    catch(e){ toast('Erreur de sauvegarde.','err'); }
  };
  document.getElementById('chUser').onclick=()=>{
    openModal('Changer de nom d’utilisateur',
      `<div class="field"><label>nouveau pseudo</label><input id="mUser" value="${esc(p.username)}" autocomplete="off"></div><p class="hint" id="mUserHint">Ton identifiant de connexion.</p><div class="row"><button class="btn" id="mUserSave">Enregistrer</button></div>`,
      (body)=>{
        const inp=body.querySelector('#mUser'), hint=body.querySelector('#mUserHint'); let t=null;
        inp.oninput=()=>{ const v=inp.value.trim(); hint.style.color='';
          if(v===p.username){ hint.textContent='Ton pseudo actuel.'; return; }
          if(v.length<2){ hint.textContent='2 caractères minimum.'; hint.style.color='#e08a7e'; return; }
          hint.textContent='vérification...'; clearTimeout(t);
          t=setTimeout(async()=>{ try{ const ok=await isUsernameAvailable(v,p.uid); hint.textContent=ok?'✓ disponible':'✗ déjà pris'; hint.style.color=ok?'#5ec98f':'#e08a7e'; }catch(e){ hint.textContent=''; } },350); };
        body.querySelector('#mUserSave').onclick=async()=>{
          const v=inp.value.trim();
          if(v.length<2){ hint.textContent='2 caractères minimum.'; hint.style.color='#e08a7e'; return; }
          if(v!==p.username && !(await isUsernameAvailable(v,p.uid))){ hint.textContent='✗ déjà pris.'; hint.style.color='#e08a7e'; return; }
          try{ await callRpc('rename_me',{new_username:v}); p.username=v; closeModal(); toast('Pseudo mis à jour','ok'); render(); }
          catch(e){ hint.textContent='Erreur, réessaie.'; hint.style.color='#e08a7e'; }
        };
      });
  };
  document.getElementById('chTag').onclick=()=>{
    openModal('Changer le nom d’affichage',
      `<div class="field"><label>tag affiché</label><input id="mTag" value="${esc(p.tag)}"></div><div class="row"><button class="btn" id="mTagSave">Enregistrer</button></div>`,
      (body)=>{
        body.querySelector('#mTagSave').onclick=async()=>{
          const v=body.querySelector('#mTag').value.trim()||p.tag;
          try{ await callRpc('update_my_profile',{payload:{tag:v}}); p.tag=v; closeModal(); toast('Nom d’affichage mis à jour','ok'); render(); }
          catch(e){ toast('Erreur','err'); }
        };
      });
  };
  renderDiscordLinkBox(p);
}

function mountLinksTab(el,p,d){
  el.innerHTML=`
    <div class="dash-card">
      <h3>Connectez vos profils de réseaux sociaux</h3>
      <p class="hint" style="margin-bottom:14px;">Clique une plateforme pour l'ajouter, puis renseigne ton pseudo ou lien dans sa carte. Le bouton 🔗/📋 de chaque carte bascule entre « ouvrir le lien » et « copier le texte au clic » (ex. pseudo Discord copié au lieu d'ouvrir une page).</p>
      <div class="linkgrid" id="platGrid"></div>
    </div>
    <div class="dash-card">
      <h3>Vos liens</h3>
      <div class="linkcards" id="linkCards"></div>
    </div>
  `;
  const grid=document.getElementById('platGrid');
  Object.keys(PLATFORMS).forEach(id=>{ const plat=PLATFORMS[id]; const gi=document.createElement('div'); gi.className='gi'; gi.title=plat.name;
    gi.innerHTML=`<span class="ico" style="color:${plat.color}">${iconFor(id)}</span>`;
    gi.onclick=()=>{ d.links.push({platform:id,raw:'',label:plat.name,copy:false}); drawCards(); const inp=document.querySelector('#linkCards .linkcard:last-child input'); if(inp) inp.focus(); };
    grid.appendChild(gi); });
  const lc=document.getElementById('linkCards');
  function drawCards(){
    if(!d.links.length){ lc.innerHTML='<p class="hint">Aucun lien pour le moment — clique une plateforme ci-dessus.</p>'; return; }
    lc.innerHTML='';
    d.links.forEach((l,i)=>{ const plat=PLATFORMS[l.platform]||PLATFORMS.link; const card=document.createElement('div'); card.className='linkcard';
      card.innerHTML=`<div class="lchead"><span class="plat"><span class="ico" style="color:${plat.color}">${iconFor(l.platform)}</span>${plat.name}</span>
        <span class="lcacts"><button data-cp="${i}" title="${l.copy?'copie au clic':'ouvre au clic'}">${l.copy?'📋':'🔗'}</button><button data-rm="${i}" title="supprimer">✕</button></span></div>
        <input data-i="${i}" placeholder="${plat.ph}" value="${esc(l.raw||'')}">`;
      lc.appendChild(card); });
    lc.querySelectorAll('input').forEach(inp=>{ inp.oninput=()=>{ d.links[+inp.dataset.i].raw=inp.value; }; });
    lc.querySelectorAll('[data-cp]').forEach(b=>{ b.onclick=()=>{ d.links[+b.dataset.cp].copy=!d.links[+b.dataset.cp].copy; drawCards(); }; });
    lc.querySelectorAll('[data-rm]').forEach(b=>{ b.onclick=()=>{ d.links.splice(+b.dataset.rm,1); drawCards(); }; });
  }
  drawCards();
  mountActionBar(el,p,d);
}

// ===== onglet 🧩 Interface : réordonner et masquer les blocs du profil =====
function mountInterfaceTab(el,p,d){
  d.style={...DEFAULT_STYLE,...(d.style||{})};
  if(!Array.isArray(d.style.blocks)) d.style.blocks=resolveBlocks(d.style);
  el.innerHTML=`
    <div class="dash-card">
      <h3>🧩 Blocs du profil</h3>
      <p class="hint" style="margin-bottom:12px;">Réorganise (▲▼) et affiche/masque chaque bloc de ta page. L'en-tête (avatar, pseudo, bio, badges) reste toujours en haut.</p>
      <div id="blockList"></div>
      <button class="btn ghost small" id="blkReset" style="margin-top:10px;">↺ Ordre par défaut</button>
    </div>
  `;
  const list=document.getElementById('blockList');
  function draw(){
    d.style.blocks=resolveBlocks(d.style);
    list.innerHTML='';
    d.style.blocks.forEach((b,i)=>{
      const row=document.createElement('div'); row.className='blk-row';
      row.innerHTML=`<span class="blk-move" data-up="${i}">▲</span><span class="blk-move" data-down="${i}">▼</span>
        <span class="blk-name">${BLOCK_META[b.k]}</span>
        <div class="togglesw${b.on!==false?' on':''}" data-tg="${i}"></div>`;
      list.appendChild(row);
    });
    list.querySelectorAll('[data-up]').forEach(x=>x.onclick=()=>{ const i=+x.dataset.up; if(i>0){ const a=d.style.blocks; [a[i-1],a[i]]=[a[i],a[i-1]]; draw(); } });
    list.querySelectorAll('[data-down]').forEach(x=>x.onclick=()=>{ const i=+x.dataset.down; const a=d.style.blocks; if(i<a.length-1){ [a[i+1],a[i]]=[a[i],a[i+1]]; draw(); } });
    list.querySelectorAll('[data-tg]').forEach(t=>t.onclick=()=>{ const i=+t.dataset.tg; d.style.blocks[i].on=!(d.style.blocks[i].on!==false); t.classList.toggle('on',d.style.blocks[i].on!==false); });
  }
  draw();
  document.getElementById('blkReset').onclick=()=>{ d.style.blocks=DEFAULT_BLOCK_ORDER.map(k=>({k,on:true})); draw(); toast('Ordre réinitialisé','ok'); };
  mountActionBar(el,p,d);
}

// ===== éditeur d'interface : ordre + visibilité des blocs du profil =====
const BLOCK_META={ music:'🎵 Musique', socials:'🔗 Icônes sociales', discord:'💬 Carte Discord', gamehub:'🎮 Game Hub', customtext:'📝 Texte libre', links:'🔘 Boutons de liens', likes:'❤️ Likes', poll:'📊 Sondage', secret:'🔒 Secret', games:'🕹️ Défis', guestbook:'📖 Livre d\'or' };
const DEFAULT_BLOCK_ORDER=['music','socials','discord','gamehub','customtext','links','likes','poll','secret','games','guestbook'];
// résout la config de blocs d'un profil, en complétant les blocs manquants (compat ascendante)
function resolveBlocks(style){
  const cfg=(style&&Array.isArray(style.blocks))?style.blocks.slice():[];
  const seen=new Set(cfg.map(b=>b.k));
  DEFAULT_BLOCK_ORDER.forEach(k=>{ if(!seen.has(k)) cfg.push({k,on:true}); });
  return cfg.filter(b=>BLOCK_META[b.k]);
}
function renderBlocks(p,parts){
  return resolveBlocks(p.style).filter(b=>b.on!==false).map(b=>parts[b.k]||'').join('\n    ');
}
function profileHTML(p,isOwner){

function fmtN(n){ n=+n||0; return n>=1000?(n/1000).toFixed(n>=10000?0:1).replace('.0','')+'k':String(n); }
function pcard(p){
  const el=document.createElement('div'); el.className='pcard';
  const av=p.avatar?`<img src="${esc(p.avatar)}" alt="">`:esc((p.username||'?')[0].toUpperCase());
  const verified=(p.badges||[]).includes('verified')?`<span class="pc-verified">${ICONS.verified}</span>`:'';
  const crown=isPremium(p)?`<span class="pc-crown">${premiumTierOf(p)==='pro'?'💎':'⭐'}</span>`:'';
  const banner = p.banner?`style="background-image:url('${esc(p.banner)}')"`
    :(p.wallpaper?`style="background-image:url('${esc(p.wallpaper)}')"`
    :`style="background:linear-gradient(135deg, color-mix(in srgb,${esc(p.accent)} 55%,#1a1d22), #0f1113)"`);
  el.innerHTML=`<div class="pc-banner" ${banner}></div>${crown}
    <div class="pc-av">${av}</div>
    <div class="pc-body">
      <div class="pc-name">${esc(p.displayName||p.username)} ${verified}</div>
      <div class="pc-tag">@${esc(p.username)}</div>
      <div class="pc-bio">${esc(p.bio||'')}</div>
      <div class="pc-stats"><span><b>${fmtN(p.followerCount)}</b> abonnés</span><span><b>${fmtN(p.likes)}</b> ❤</span><span><b>${fmtN((p.views||0)+(p.viewsBonus||0))}</b> vues</span></div>
    </div>`;
  el.onclick=()=>{ view='profile'; viewingUid=p.uid; window.scrollTo(0,0); render(); };
  return el;
}
async function renderDiscover(app){
  const list=await listDirectory();
  const showDemo=isStaffPlus(session);
  const all=list.filter(p=>!p.banned && p.deletedAt==null && (showDemo || !isDemo(p)));
  const following = session ? await myFollowingSet() : new Set();
  if(discoverTab==='following' && !session) discoverTab='popular';
  app.innerHTML=`<div class="page">
    <div class="page-head">
      <div><h1>Découvrir</h1><div class="sub">${all.length} profil${all.length>1?'s':''} dans la communauté xvy</div></div>
      <div class="seg2" id="discSeg"><button data-t="popular">🔥 Populaires</button><button data-t="new">✨ Nouveaux</button><button data-t="featured">⭐ À la une</button>${session?'<button data-t="following">👥 Abonnements</button>':''}</div>
    </div>
    <div class="searchbar"><span class="si">🔍</span><input id="discSearch" placeholder="Chercher un pseudo, un nom, une bio…"></div>
    <div class="pgrid" id="discGrid"></div>
  </div>`;
  const grid=document.getElementById('discGrid');
  const draw=()=>{
    const q=(document.getElementById('discSearch').value||'').trim().toLowerCase();
    let items=all.slice();
    if(discoverTab==='popular') items.sort((a,b)=>((b.likes+b.followerCount*3+b.views*0.1)-(a.likes+a.followerCount*3+a.views*0.1)));
    else if(discoverTab==='new') items.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
    else if(discoverTab==='following') items=items.filter(p=>following.has(p.uid));
    else items=items.filter(p=>p.featured);
    if(q) items=items.filter(p=>p.username.toLowerCase().includes(q)||(p.displayName||'').toLowerCase().includes(q)||(p.bio||'').toLowerCase().includes(q)||(p.tag||'').toLowerCase().includes(q));
    if(!items.length){ const em={featured:['⭐','Aucun profil à la une pour le moment.'],following:['👥','Tu ne suis personne encore — explore les autres onglets !']}[discoverTab]||['🫥','Aucun profil trouvé.']; grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="es-emo">${em[0]}</div>${em[1]}</div>`; return; }
    grid.innerHTML=''; items.slice(0,60).forEach(p=>grid.appendChild(pcard(p)));
  };
  document.querySelectorAll('#discSeg button').forEach(b=>{ if(b.dataset.t===discoverTab) b.classList.add('on');
    b.onclick=()=>{ discoverTab=b.dataset.t; document.querySelectorAll('#discSeg button').forEach(x=>x.classList.toggle('on',x.dataset.t===discoverTab)); draw(); }; });
  document.getElementById('discSearch').oninput=draw;
  draw();
}

  document.querySelectorAll('#app [data-copy]').forEach(el=>{

      navigator.clipboard.writeText(v).then(()=>toast('Copié : '+v,'ok')).catch(()=>{ prompt('Copie :',v); }); });
  });
  if(isOwner) document.getElementById('editBtn').onclick=()=>{view='edit';render();};
  // bouton like (1 par navigateur, réversible)
  const likeBtn=document.getElementById('likeBtn');
  if(likeBtn){
    let busy=false;
    likeBtn.onclick=async()=>{
      if(busy) return;
      if(!session){ toast('Connecte-toi pour aimer un profil','err'); view='auth'; return render(); }
      busy=true;
      const cnt=document.getElementById('likeCount');
      const willLike=!hasLiked(p.uid);
      // optimiste
      likeBtn.classList.toggle('liked',willLike);
      likeBtn.querySelector('svg').setAttribute('fill',willLike?'currentColor':'none');
      if(willLike) likeBtn.classList.add('pop'); setTimeout(()=>likeBtn.classList.remove('pop'),380);
      let cur=parseInt(cnt.textContent,10)||0; cnt.textContent=Math.max(0,cur+(willLike?1:-1));
      try{ const r=await rpcToggleLike(p.uid); setLiked(p.uid,r.liked);
           likeBtn.classList.toggle('liked',r.liked); likeBtn.querySelector('svg').setAttribute('fill',r.liked?'currentColor':'none'); }
      catch(e){ /* garde l'optimiste */ setLiked(p.uid,willLike); }
      busy=false;
    };
  }
  // bouton suivre
  const followBtn=document.getElementById('followBtn');
  if(followBtn){
    isFollowing(p.uid).then(f=>followBtn.classList.toggle('following',f));
    let fbusy=false;
    followBtn.onclick=async()=>{
      if(fbusy) return; if(!session){ toast('Connecte-toi pour suivre','err'); view='auth'; return render(); }
      fbusy=true; const wasFollowing=followBtn.classList.contains('following');
      followBtn.classList.toggle('following',!wasFollowing);
      try{ const nowF=await toggleFollow(p.uid); followBtn.classList.toggle('following',nowF);
        const fp=document.getElementById('followersPill'); if(fp){ const b=fp.querySelector('b'); const base=p.followerCount+(nowF?1:0)-(wasFollowing?1:0); b.textContent=fmtN(Math.max(0,base)); } }
      catch(e){ followBtn.classList.toggle('following',wasFollowing); toast('Erreur','err'); }
      fbusy=false;
    };
  }
  // signaler
  const reportBtn=document.getElementById('reportBtn');
  if(reportBtn) reportBtn.onclick=async()=>{
    if(!session){ view='auth'; return render(); }
    const reason=prompt('Raison du signalement (spam, contenu inapproprié, usurpation…) :'); if(!reason) return;
    try{ await callRpc('report_profile',{p_target:p.uid,p_reason:reason,p_detail:''}); toast('Signalement envoyé, merci','ok'); }catch(e){ toast('Erreur','err'); }
  };
  // listes abonnés / abonnements
  const openFollowList=async(title,uidsPromise)=>{
    openModal(title, '<p class="loading">…</p>', async(body)=>{
      const uids=await uidsPromise; const profs=await resolveProfiles(uids);
      if(!profs.length){ body.innerHTML='<p class="hint">Personne pour l\'instant.</p>'; return; }
      body.innerHTML=''; profs.forEach(pr=>{ const e=document.createElement('div'); e.className='direntry'; e.style.marginBottom='6px';
        const av=pr.avatar?`<img src="${esc(pr.avatar)}" alt="">`:esc((pr.username||'?')[0].toUpperCase());
        e.innerHTML=`<div class="av">${av}</div><div><div>${esc(pr.display_name||pr.username)}</div><div class="hint">@${esc(pr.username)}</div></div><span class="uidbadge">${fmtN(pr.follower_count||0)} 👥</span>`;
        e.onclick=()=>{ closeModal(); view='profile'; viewingUid=pr.uid; render(); }; body.appendChild(e); });
    });
  };
  const fpe=document.getElementById('followersPill'); if(fpe) fpe.onclick=()=>openFollowList('Abonnés de '+p.username, listFollowers(p.uid));
  const fpg=document.getElementById('followingPill'); if(fpg) fpg.onclick=()=>openFollowList(p.username+' suit', listFollowingUids(p.uid));
  const uidChip=document.getElementById('uidChip');
  if(uidChip) uidChip.onclick=()=>{ navigator.clipboard.writeText(String(p.uid)).then(()=>toast('UID copié','ok')).catch(()=>{}); };
  document.getElementById('shareBtn').onclick=()=>{
    const shareUrl=location.origin+location.pathname+'?uid='+p.uid;
    const b=document.getElementById('shareBtn'); const orig=b?b.textContent:'';
    navigator.clipboard.writeText(shareUrl).then(()=>{ if(b){ b.textContent='✓ lien copié !'; setTimeout(()=>b.textContent=orig,1800); } }).catch(()=>{ prompt('Copie ce lien :',shareUrl); });
  };
  // typewriter bio
  const bioEl=document.getElementById('bioEl');
  if(bioEl && p.effects.typewriter){
    const full=bioEl.dataset.full||''; bioEl.innerHTML='<span class="tw-cursor"></span>'; let i=0;
    const tick=()=>{ if(i<=full.length){ bioEl.innerHTML=esc(full.slice(0,i))+'<span class="tw-cursor"></span>'; i++; setTimeout(tick,38); } else { bioEl.textContent=full; } };
    setTimeout(tick,300);
  } else if(bioEl){ bioEl.textContent=bioEl.dataset.full||''; }
  // particles
  startParticles(p.effects.particles, p.accent);
  // music
  setupMusic(p);
  // views: incrémenter si ce n'est pas mon propre profil, max 1 vue / navigateur / profil / 30 min
  // (évite qu'un simple rafraîchissement compte une nouvelle vue)
  if(!isOwner && !p.excludeFromStats && viewCooldownOk(p.uid)){
    incrementViews(p.uid); markViewed(p.uid);
    const nv=(p.views||0)+(p.viewsBonus||0)+1; const vc=document.getElementById('viewCount'); if(vc) vc.textContent=nv;
    trackEvent(p.uid,'view',{viewer_uid:session?session.uid:null,viewer_name:session?session.username:null,ref:document.referrer||''});
  }
  // curseur personnalisé
  applyCursor(p.cursorUrl);
  // tilt 3D
  setupTilt(p.effects.tilt!==false);
  // discord presence via Lanyard
  if(p.discordId) loadDiscord(p.discordId);
  // features xvy : présence live, sondage, secret, mini-jeux, livre d'or, succès, tracking clics
  mountPresence(p);
  mountGameHub(p);
  mountPoll(p);
  mountSecret(p);
  mountGameBlock(p,isOwner);
  mountGuestbook(p,isOwner);
  trackLinkClicks(p,isOwner);
  if(isOwner) checkAchievements(p);
}

// Applique la traduction EN après chaque rendu complet (couvre tous les return anticipés)
const _xvyRender=render;
render=function(){ const r=_xvyRender.apply(this,arguments); Promise.resolve(r).then(()=>applyLang()).catch(()=>{}); return r; };

// ===== xvy features : anti-refresh vues, analytics, présence live, guestbook, succès, mini-jeux, sondage, secret =====
const VIEW_COOLDOWN_MS=30*60*1000; // 1 vue max par navigateur / profil / 30 min
function viewCooldownOk(uid){ try{ const t=parseInt(localStorage.getItem('xvy_seen_'+uid)||'0',10); return (Date.now()-t)>VIEW_COOLDOWN_MS; }catch(e){ return true; } }
function markViewed(uid){ try{ localStorage.setItem('xvy_seen_'+uid,String(Date.now())); }catch(e){} }

const isMobileDevice=()=>/Android|iPhone|iPad|Mobi/i.test(navigator.userAgent);
// événement analytics (best-effort, jamais bloquant)
function trackEvent(profileUid,type,meta){
  callRpc('track_event',{p_profile:profileUid,p_type:type,p_meta:meta||{},p_device:isMobileDevice()?'mobile':'desktop'}).catch(()=>{});
}
// clics sur les liens du profil → analytics
function trackLinkClicks(p,isOwner){
  if(isOwner) return;
  document.querySelectorAll('#app .links a, #app .social-inline a').forEach(a=>{
    a.addEventListener('click',()=>{ const lbl=a.querySelector('.plat'); trackEvent(p.uid,'link_click',{label:(lbl?lbl.textContent:(a.getAttribute('title')||'lien')),url:a.getAttribute('href')||''}); });
  });
}

// ----- succès automatiques (achievements) -----
const ACH_DEFS=[
  {id:'starter',emo:'🌱',name:'Premiers pas',desc:'Avatar + bio + 1 lien'},
  {id:'links5',emo:'🔗',name:'Connecté',desc:'5 liens ou plus'},
  {id:'discord',emo:'💬',name:'Discord lié',desc:'Compte Discord lié'},
  {id:'v10',emo:'👁',name:'Découvert',desc:'10 vues'},
  {id:'v100',emo:'🔥',name:'Populaire',desc:'100 vues'},
  {id:'v1000',emo:'🌟',name:'Star',desc:'1000 vues'},
  {id:'likes10',emo:'❤️',name:'Aimé',desc:'10 likes'},
  {id:'gb5',emo:'📖',name:'Livre d\'or actif',desc:'5 messages reçus'},
  {id:'gamer',emo:'🎮',name:'Joueur',desc:'A joué à un mini-jeu'},
];
function achievementsStripHTML(p){
  const earned=(p.achievements||[]).map(id=>ACH_DEFS.find(a=>a.id===id)).filter(Boolean);
  if(!earned.length) return '';
  return `<div class="ach-strip">${earned.map(a=>`<span class="ach-pill" title="${esc(a.name)} — ${esc(a.desc)}">${a.emo}</span>`).join('')}</div>`;
}
async function checkAchievements(p){
  const tv=(p.views||0)+(p.viewsBonus||0);
  let gbCount=0; try{ const r=await pgFetch('/guestbook?profile_uid=eq.'+p.uid+'&select=id&limit=100'); gbCount=(r||[]).length; }catch(e){}
  let played=false; try{ const r=await pgFetch('/game_scores?player_uid=eq.'+p.uid+'&select=id&limit=1'); played=(r||[]).length>0; }catch(e){}
  const tests={
    starter:!!p.avatar&&!!p.bio&&(p.links||[]).length>=1,
    links5:(p.links||[]).length>=5,
    discord:!!(p.discordId||p.discordGlobalName),
    v10:tv>=10, v100:tv>=100, v1000:tv>=1000,
    likes10:(p.likes||0)>=10, gb5:gbCount>=5, gamer:played
  };
  const have=new Set(p.achievements||[]);
  const fresh=ACH_DEFS.filter(a=>tests[a.id]&&!have.has(a.id));
  if(!fresh.length) return;
  const next=[...have,...fresh.map(a=>a.id)];
  try{
    await callRpc('update_my_profile',{payload:{achievements:next}});
    p.achievements=next; if(session&&session.uid===p.uid) session.achievements=next;
    fresh.forEach((a,i)=>setTimeout(()=>toast(a.emo+' Succès débloqué : '+a.name,'ok'),400+i*900));
  }catch(e){}
}

// ----- présence live (Supabase Realtime) -----
let presenceChannel=null;
function mountPresence(p){
  const el=document.getElementById('presencePill'); if(!el) return;
  const client=getSbAuth(); if(!client) return;
  if(presenceChannel){ try{ presenceChannel.unsubscribe(); }catch(e){} presenceChannel=null; }
  const key=session?('u'+session.uid):('a'+Math.random().toString(36).slice(2,10));
  const ch=client.channel('presence-profile-'+p.uid,{config:{presence:{key}}});
  presenceChannel=ch;
  const update=()=>{ try{ const n=Object.keys(ch.presenceState()||{}).length; if(n>0){ el.textContent='👀 '+n+' en ce moment'; el.style.display=''; } else el.style.display='none'; }catch(e){} };
  ch.on('presence',{event:'sync'},update);
  ch.subscribe(status=>{ if(status==='SUBSCRIBED') ch.track({t:Date.now()}); });
}

// ----- sondage sur le profil -----
async function mountPoll(p){
  const box=document.getElementById('pollBlock'); if(!box) return;
  const poll=p.poll; if(!poll||!poll.q||!(poll.opts||[]).length){ box.innerHTML=''; return; }
  const pollId=poll.id||'p1';
  let votes=[]; try{ votes=await pgFetch('/poll_votes?profile_uid=eq.'+p.uid+'&poll_id=eq.'+encodeURIComponent(pollId)+'&select=choice&limit=2000')||[]; }catch(e){}
  const counts=poll.opts.map((_,i)=>votes.filter(v=>v.choice===i).length);
  const total=counts.reduce((a,b)=>a+b,0);
  let voted=false; try{ voted=localStorage.getItem('xvy_voted_'+p.uid+'_'+pollId)==='1'; }catch(e){}
  const showResults=voted;
  box.innerHTML=`<div class="xvy-block"><h4>📊 ${esc(poll.q)}</h4>
    ${poll.opts.map((o,i)=>{
      const pct=total?Math.round(counts[i]/total*100):0;
      return `<button class="poll-opt" data-i="${i}" ${showResults?'disabled':''}>
        ${showResults?`<span class="fillbar" style="transform:scaleX(${pct/100});"></span>`:''}
        <span class="row-in"><span>${esc(o)}</span>${showResults?`<span>${pct}% (${counts[i]})</span>`:''}</span>
      </button>`;
    }).join('')}
    <div class="hint" style="font-size:10px;">${total} vote${total>1?'s':''}</div></div>`;
  applyLang(box);
  if(!showResults){
    box.querySelectorAll('.poll-opt').forEach(b=>{
      b.onclick=async()=>{
        const i=parseInt(b.dataset.i,10);
        try{
          await callRpc('vote_poll',{p_profile:p.uid,p_poll:pollId,p_choice:i});
          try{ localStorage.setItem('xvy_voted_'+p.uid+'_'+pollId,'1'); }catch(e){}
          toast('Vote enregistré ✓','ok'); mountPoll(p);
        }catch(e){ toast('Erreur, réessaie.','err'); }
      };
    });
  }
}

// ----- contenu secret déblocable -----
function mountSecret(p){
  const box=document.getElementById('secretBlock'); if(!box) return;
  const s=p.secret; if(!s||!s.text){ box.innerHTML=''; return; }
  let unlocked=false; try{ unlocked=localStorage.getItem('xvy_secret_'+p.uid)==='1'; }catch(e){}
  if(unlocked){ box.innerHTML=`<div class="xvy-block secret-box"><h4>🔓 Contenu secret</h4><div style="font-size:13px;white-space:pre-wrap;">${esc(s.text)}</div></div>`; return; }
  box.innerHTML=`<div class="xvy-block secret-box"><h4>🔒 Contenu secret</h4>
    <p class="hint" style="margin-bottom:8px;">${s.hint?esc(s.hint):'Trouve le mot de passe pour débloquer.'}</p>
    <div style="display:flex;gap:6px;justify-content:center;"><input id="secretPw" type="password" placeholder="mot de passe"><button class="btn small" id="secretGo">Débloquer</button></div></div>`;
  const tryUnlock=()=>{
    const v=(document.getElementById('secretPw').value||'').trim();
    if(v && s.pw && v.toLowerCase()===String(s.pw).toLowerCase()){
      try{ localStorage.setItem('xvy_secret_'+p.uid,'1'); }catch(e){}
      toast('🔓 Contenu débloqué !','ok'); mountSecret(p);
    } else toast('Mauvais mot de passe','err');
  };
  applyLang(box);
  document.getElementById('secretGo').onclick=tryUnlock;
  document.getElementById('secretPw').onkeydown=e=>{ if(e.key==='Enter') tryUnlock(); };
}

// ----- mini-jeux : le formatage/leaderboard s'appuie sur le registre extensible GAME_REGISTRY -----
const GAME_DEFS=GAME_REGISTRY;
// liste des jeux jouables (status 'live')
const LIVE_GAMES=Object.keys(GAME_REGISTRY).filter(k=>GAME_REGISTRY[k].status==='live');
// ===== Game Hub : rendu public (identité gaming, sous-onglets) =====
function ghStars(n){ n=Math.max(0,Math.min(5,+n||0)); return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n); }
function ghHasContent(g){
  return g.status||g.lfg||g.platforms.length||Object.values(g.ids).some(Boolean)||g.genres.length||g.mode||g.difficulty||
    g.nowPlaying.name||g.favorites.length||g.backlog.length||g.wishlist.length||g.completed.length||g.dropped.length||
    Object.values(g.setup).some(Boolean)||g.reviews.length||g.links.length;
}
function mountGameHub(p){
  const box=document.getElementById('gameHubBlock'); if(!box) return;
  const g=mergeGaming(p.gaming);
  const isOwner=session&&session.uid===p.uid;
  if((!g.enabled||!ghHasContent(g)) && !isOwner){ box.innerHTML=''; return; }
  if(!g.enabled && isOwner){ box.innerHTML=`<div class="ghub"><div class="ghub-top"><span class="gh-title">🎮 Game Hub</span></div><div class="ghub-body"><p class="gh-empty">Ton Game Hub est masqué. Active-le dans l'éditeur → onglet 🎮 Gaming.</p></div></div>`; return; }

  // sections disponibles
  const tabs=[];
  const hasOverview=g.platforms.length||g.genres.length||g.mode||g.difficulty||Object.values(g.ids).some(Boolean);
  if(hasOverview) tabs.push(['overview','Overview']);
  if(g.nowPlaying.name) tabs.push(['now','Now Playing']);
  if(g.favorites.length||g.backlog.length||g.wishlist.length||g.completed.length||g.dropped.length) tabs.push(['games','Games']);
  if(Object.values(g.setup).some(Boolean)) tabs.push(['setup','Setup']);
  if(g.lfg||g.status||Object.values(g.ids).some(Boolean)||g.links.length) tabs.push(['pwm','Play With Me']);
  if(g.reviews.length) tabs.push(['reviews','Reviews']);
  if(!tabs.length){ if(isOwner){ box.innerHTML=`<div class="ghub"><div class="ghub-top"><span class="gh-title">🎮 Game Hub</span></div><div class="ghub-body"><p class="gh-empty">Remplis ton Game Hub dans l'éditeur → onglet 🎮 Gaming.</p></div></div>`; } else box.innerHTML=''; return; }

  const st=g.status&&GH_STATUS[g.status];
  let active=tabs[0][0];
  function chips(items,cls){ return `<div class="gh-chips">${items.map(x=>`<span class="gh-chip${cls?' '+cls:''}">${x}</span>`).join('')}</div>`; }
  function gameList(arr,dot){ return `<div class="gh-list">${arr.map(x=>`<div class="gh-li"><span class="gh-tagdot" style="background:${dot}"></span>${esc(x.name||x)}</div>`).join('')}</div>`; }
  function sectionHTML(tab){
    if(tab==='overview'){
      let h='';
      if(g.platforms.length){ h+=`<div class="gh-sec-title">Plateformes</div>${chips(g.platforms.map(k=>GH_PLATFORMS[k]||k))}`; }
      if(g.mode||g.difficulty){ const t=[]; if(g.mode) t.push(GH_MODES[g.mode]||g.mode); if(g.difficulty) t.push(GH_DIFF[g.difficulty]||g.difficulty); h+=`<div class="gh-sec-title">Style de jeu</div>${chips(t,'accent')}`; }
      if(g.genres.length){ h+=`<div class="gh-sec-title">Genres préférés</div>${chips(g.genres)}`; }
      const ids=Object.entries(g.ids).filter(([k,v])=>v);
      if(ids.length){ h+=`<div class="gh-sec-title">IDs gaming</div>`+ids.map(([k,v])=>`<div class="gh-id-row" data-copy="${esc(v)}"><span>${GH_IDS[k]||k}</span><span class="gh-id-val">${esc(v)} ⧉</span></div>`).join(''); }
      return h;
    }
    if(tab==='now'){
      const n=g.nowPlaying;
      return `<div class="gh-now"><div class="gh-cover">${n.cover?`<img src="${esc(n.cover)}" class="gh-cover" alt="">`:'🎮'}</div><div><div class="gh-np-name">${esc(n.name)}</div>${n.note?`<div class="gh-np-note">${esc(n.note)}</div>`:''}</div></div>`;
    }
    if(tab==='games'){
      let h='';
      if(g.favorites.length){ h+=`<div class="gh-sec-title">⭐ Top jeux</div><div class="gh-games">${g.favorites.map(f=>`<div class="gh-game">${esc(f.name||f)}${f.rating?`<span class="gh-stars">${ghStars(f.rating)}</span>`:''}</div>`).join('')}</div>`; }
      if(g.nowPlaying.name){ h+=`<div class="gh-sec-title">🎯 Du moment</div>${gameList([g.nowPlaying],'var(--accent)')}`; }
      if(g.backlog.length){ h+=`<div class="gh-sec-title">📥 Backlog</div>${gameList(g.backlog,'#7a8fc9')}`; }
      if(g.wishlist.length){ h+=`<div class="gh-sec-title">💜 Wishlist</div>${gameList(g.wishlist,'#b57edc')}`; }
      if(g.completed.length){ h+=`<div class="gh-sec-title">✅ Terminés</div>${gameList(g.completed,'#5ec98f')}`; }
      if(g.dropped.length){ h+=`<div class="gh-sec-title">🚫 Abandonnés</div>${gameList(g.dropped,'#e08a7e')}`; }
      return h;
    }
    if(tab==='setup'){
      const s=g.setup; const specs=[['CPU',s.cpu],['GPU',s.gpu],['RAM',s.ram],['Écran',s.monitor],['Souris',s.mouse],['Clavier',s.keyboard],['Casque',s.headset],['Résolution',s.res],['Sensibilité',s.sens],['DPI',s.dpi]].filter(x=>x[1]);
      let h=specs.length?`<div class="gh-specs">${specs.map(([k,v])=>`<div class="gh-spec"><span>${k}</span><span>${esc(v)}</span></div>`).join('')}</div>`:'';
      if(s.crosshair){ h+=`<div class="gh-sec-title">Crosshair code</div><div class="gh-id-row" data-copy="${esc(s.crosshair)}"><span>Valorant</span><span class="gh-id-val">${esc(s.crosshair)} ⧉</span></div>`; }
      return h;
    }
    if(tab==='pwm'){
      let h='';
      if(g.lfg){ h+=`<div class="gh-lfg">🔵 <b>Cherche des mates</b>${g.lfgNote?' — '+esc(g.lfgNote):''}</div>`; }
      if(st){ h+=`<div class="gh-sec-title">Disponibilité</div><div class="gh-chips"><span class="gh-chip accent">${st[0]} ${st[1]}</span></div>`; }
      const ids=Object.entries(g.ids).filter(([k,v])=>v);
      if(ids.length){ h+=`<div class="gh-sec-title">Ajoute-moi</div>`+ids.map(([k,v])=>`<div class="gh-id-row" data-copy="${esc(v)}"><span>${GH_IDS[k]||k}</span><span class="gh-id-val">${esc(v)} ⧉</span></div>`).join(''); }
      if(g.links.length){ h+=`<div class="gh-sec-title">Liens utiles</div>`+g.links.map(l=>`<div class="gh-li">🔗 <a href="${esc(l.url)}" target="_blank" rel="noopener" style="color:var(--accent);">${esc(l.label||l.url)}</a></div>`).join(''); }
      return h||'<p class="gh-empty">Aucune info pour le moment.</p>';
    }
    if(tab==='reviews'){
      return g.reviews.map(r=>`<div class="gh-review"><div class="gh-rv-head"><b>${esc(r.game)}</b><span class="gh-stars" style="color:var(--accent)">${ghStars(r.rating)}</span></div>${r.text?`<div class="gh-rv-text">${esc(r.text)}</div>`:''}</div>`).join('');
    }
    return '';
  }
  function draw(){
    box.innerHTML=`<div class="ghub">
      <div class="ghub-top"><span class="gh-title">🎮 Game Hub</span>${st?`<span class="gh-status">${st[0]} ${st[1]}</span>`:''}</div>
      <div class="ghub-tabs">${tabs.map(([k,l])=>`<button class="ghub-tab${k===active?' on':''}" data-t="${k}">${l}</button>`).join('')}</div>
      <div class="ghub-body" id="ghBody">${sectionHTML(active)}</div>
    </div>`;
    box.querySelectorAll('.ghub-tab').forEach(b=>b.onclick=()=>{ active=b.dataset.t; draw(); });
    box.querySelectorAll('#ghBody [data-copy]').forEach(el=>el.onclick=()=>{ const v=el.getAttribute('data-copy'); navigator.clipboard.writeText(v).then(()=>toast('Copié : '+v,'ok')).catch(()=>{}); });
    applyLang(box);
  }
  draw();
}

// RECORDS PERSONNELS : on ne lit QUE les scores du propriétaire du profil (player_uid = profile_uid).

function lbHTML(rows,game){

}

// MODÈLE PERSONNEL : un score n'est enregistré QUE sur ton propre profil.
// Jouer sur le profil d'un autre = pour le fun, rien n'est écrit (et le verrou DB le refuserait de toute façon).
async function saveScore(p,game,score){
  if(!session){ toast('Connecte-toi et joue sur ton profil pour enregistrer tes records','err'); return false; }
  if(session.uid!==p.uid){ toast('Records personnels — joue sur TON profil pour les enregistrer'); return false; }
  try{
    await callRpc('submit_score',{p_profile:session.uid,p_game:game,p_score:score});
    const rows=await fetchLeaderboard(p.uid,game);
    const el=document.getElementById('lb-'+game); if(el) el.innerHTML=lbHTML(rows,game);
    if(!(p.achievements||[]).includes('gamer')) checkAchievements(p);
    const best=rows[0]; if(best && +best.score===+score) toast('🏅 Nouveau record perso !','ok');
    return true;
  }catch(e){ return false; }
}
function openGame(p,game){
  if(game==='reaction'){
    openModal('⚡ Réflexe — clique dès que c\'est vert',
      `<div class="game-arena" id="arena"><div class="big">Clique pour démarrer</div><div class="hint">attends le vert, puis clique le plus vite possible</div></div>`,
      (body)=>{
        const a=body.querySelector('#arena'); let st='idle', t0=0, timer=null;
        a.onclick=()=>{
          if(st==='idle'){ st='wait'; a.className='game-arena wait'; a.innerHTML='<div class="big">Attends…</div>';
            timer=setTimeout(()=>{ st='go'; a.className='game-arena go'; a.innerHTML='<div class="big">CLIQUE !</div>'; t0=performance.now(); },800+Math.random()*2500);
          } else if(st==='wait'){ clearTimeout(timer); st='idle'; a.className='game-arena'; a.innerHTML='<div class="big">Trop tôt 😅</div><div class="hint">clique pour réessayer</div>';
          } else if(st==='go'){ const ms=performance.now()-t0; st='idle'; a.className='game-arena';
            a.innerHTML='<div class="big">'+Math.round(ms)+' ms</div><div class="hint">clique pour rejouer</div>';
            saveScore(p,'reaction',Math.round(ms));
          }
        };
      });
  } else {
    openModal('🖱️ Clics par seconde — 5 secondes',
      `<div class="game-arena" id="arena"><div class="big">Clique pour démarrer</div><div class="hint">clique le plus vite possible pendant 5 s</div></div>`,
      (body)=>{
        const a=body.querySelector('#arena'); let running=false, clicks=0, tEnd=0, raf=null;
        a.onclick=()=>{
          if(!running){ running=true; clicks=0; tEnd=performance.now()+5000;
            const tick=()=>{ const left=tEnd-performance.now();
              if(left<=0){ running=false; cancelAnimationFrame(raf); const cps=+(clicks/5).toFixed(1);
                a.innerHTML='<div class="big">'+cps+' cps</div><div class="hint">'+clicks+' clics — clique pour rejouer</div>';
                saveScore(p,'cps',cps); return; }
              a.innerHTML='<div class="big">'+clicks+'</div><div class="hint">'+(left/1000).toFixed(1)+' s restantes</div>';
              raf=requestAnimationFrame(tick); };
            raf=requestAnimationFrame(tick);
          } else clicks++;
        };
      });
  }
}
